            [51, 204, 153],  // teal
            [255, 102, 128]  // pink
        ];
    }

    update(mousePos, dt, dtScale) {
        if (!this.isRunning) return;
        const ds = dtScale;
        const ctx = this.ctx;
        const dx = this.dx;
        const dy = this.dy;
        const areaW = this.areaW;
        const areaH = this.areaH;

        // ---- Update trace buffer ----
        const [traceX, traceY] = this.getTrace(mousePos);
        const nTrace = traceX.length;

        // Compute current finger speed (average over last 3 trace points)
        let slashSpeed = 0;
        if (nTrace >= 3) {
            let sum = 0;
            const count = Math.min(3, nTrace - 1);
            for (let i = nTrace - count - 1; i < nTrace - 1; i++) {
                sum += norm2(traceX[i + 1] - traceX[i], traceY[i + 1] - traceY[i]);
            }
            slashSpeed = sum / count;
        }
        const slashThresh = Math.max(1.5, Math.min(areaW, areaH) * 0.008);

        // ---- Swipe lifecycle ----
        if (slashSpeed > slashThresh) {
            if (!this.swipeActive) {
                this.swipeActive = true;
                this.swipeGen++;
                this.swipeGenSliced = 0;
            }
        } else {
            this.swipeActive = false;
        }

        // ---- Spawn fruits ----
        this.spawnTimer += ds;
        const spawnInterval = Math.max(12, 60 - this.fruitsSliced * 0.36 - this.combo * 3.6);
        if (this.spawnTimer >= spawnInterval) {
            this.spawnTimer = 0;
            const activeCount = this.fruitActive.reduce((a, b) => a + b, 0);
            if (Math.random() < 0.25 && activeCount <= 5) {
                const nSpawn = 2 + (Math.random() < 0.3 ? 1 : 0);
                const clusterCenterX = dx[0] + areaW * (0.25 + Math.random() * 0.5);
                for (let sp = 0; sp < nSpawn; sp++) {
                    this.spawnFruitNear(clusterCenterX);
                }
            } else {
                this.spawnFruit();
            }
        }

        // ---- Update active fruits ----
        for (let kk = 0; kk < 8; kk++) {
            if (!this.fruitActive[kk]) continue;

            let fx = this.fruitX[kk] + this.fruitVx[kk] * ds;
            let fy = this.fruitY[kk] + this.fruitVy[kk] * ds;
            let fvy = this.fruitVy[kk] + this.gravity * ds;
            let fvx = this.fruitVx[kk];
            const fRadius = this.fruitRadius[kk];

            // Wall collision (bounce off top, left, right — not bottom)
            if (fx - fRadius < dx[0]) {
                fx = dx[0] + fRadius;
                fvx = Math.abs(fvx) * 0.8;
            } else if (fx + fRadius > dx[1]) {
                fx = dx[1] - fRadius;
                fvx = -Math.abs(fvx) * 0.8;
            }
            if (fy - fRadius < dy[0]) {
                fy = dy[0] + fRadius;
                fvy = Math.abs(fvy) * 0.8;
            }

            this.fruitX[kk] = fx;
            this.fruitY[kk] = fy;
            this.fruitVx[kk] = fvx;
            this.fruitVy[kk] = fvy;

            // Slash detection: enter/exit through fruit
            if (!isNaN(mousePos[0]) && !isNaN(mousePos[1])) {
                const distToFruit = norm2(mousePos[0] - fx, mousePos[1] - fy);
                if (this.fruitSlashing[kk]) {
                    // Finger was inside — check if exited
                    if (distToFruit > fRadius + 3) {
                        this.sliceFruit(kk, mousePos, slashSpeed, traceX, traceY, nTrace);
                        continue;
                    }
                } else {
                    // Check if finger entered fruit with speed
                    if (distToFruit < fRadius + 3 && slashSpeed > slashThresh) {
                        this.fruitSlashing[kk] = 1;
                        this.fruitEntryPos[kk] = [mousePos[0], mousePos[1]];
                        this.fruitSwipeGen[kk] = this.swipeGen;
                    }
                }
            }

            // Check if fruit fell off screen
            if (fy > dy[1] + fRadius * 2) {
                this.fruitsDropped++;
                this.resetCombo();
                this.fruitActive[kk] = 0;
            }
        }

        // ---- Update split halves ----
        for (let kk = 0; kk < 16; kk++) {
            if (!this.halfActive[kk]) continue;

            this.halfFrames[kk] += ds;
            this.halfVx[kk] *= Math.pow(0.9875, ds);
            this.halfVy[kk] += this.gravity * ds;
            this.halfAlpha[kk] = Math.max(0, this.halfAlpha[kk] - 0.0167 * ds);

            const verts = this.halfVerts[kk];

            // Move vertices
            for (let i = 0; i < verts.length; i++) {
                verts[i][0] += this.halfVx[kk] * ds;
                verts[i][1] += this.halfVy[kk] * ds;
            }

            // Rotate around centroid
            let centX = 0, centY = 0;
            for (let i = 0; i < verts.length; i++) {
                centX += verts[i][0];
                centY += verts[i][1];
            }
            centX /= verts.length;
            centY /= verts.length;
            const ca = Math.cos(this.halfSpin[kk]);
            const sa = Math.sin(this.halfSpin[kk]);
            for (let i = 0; i < verts.length; i++) {
                const rx = verts[i][0] - centX;
                const ry = verts[i][1] - centY;
                verts[i][0] = centX + rx * ca - ry * sa;
                verts[i][1] = centY + rx * sa + ry * ca;
            }

            if (this.halfAlpha[kk] <= 0 || this.halfFrames[kk] > 72) {
                this.halfActive[kk] = 0;
            }
        }

        // ---- Update slash effects ----
        for (let kk = 0; kk < 6; kk++) {
            if (!this.slashActive[kk]) continue;
            this.slashFrames[kk] += ds;
            this.slashAge[kk] += 1;

            if (this.slashFrames[kk] > this.slashFadeFrames[kk]) {
                this.slashActive[kk] = 0;
            }
        }

        // ---- Multi-cut text fade ----
        if (this.multiCutFade > 0) {
            this.multiCutFade -= ds;
            this.multiCutY -= 0.625 * ds;
        }

        // Update hit effects
        this.updateHitEffects(ds);

        this.prevPos = [mousePos[0], mousePos[1]];

        // ---- RENDER ----
        this.render(traceX, traceY, nTrace);
    }

    render(traceX, traceY, nTrace) {
        const ctx = this.ctx;

        // ---- Draw active fruits ----
        for (let kk = 0; kk < 8; kk++) {
            if (!this.fruitActive[kk]) continue;
            const fx = this.fruitX[kk];
            const fy = this.fruitY[kk];
            const r = this.fruitRadius[kk];
            const clr = this.fruitColor[kk];

            // Glow
            ctx.save();
            ctx.globalAlpha = 0.15;
            ctx.shadowBlur = r * 2;
            ctx.shadowColor = rgb(clr, 0.5);
            ctx.fillStyle = rgb(clr);
            ctx.beginPath();
            ctx.arc(fx, fy, r, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();

            // Core
            ctx.save();
            ctx.fillStyle = rgb(clr, 0.5);
            ctx.strokeStyle = rgb(clr);
            ctx.lineWidth = 1.5;
            ctx.shadowBlur = 10;
            ctx.shadowColor = rgb(clr, 0.6);
            ctx.beginPath();
            ctx.arc(fx, fy, r, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();
            ctx.restore();
        }

        // ---- Draw halves ----
        for (let kk = 0; kk < 16; kk++) {
            if (!this.halfActive[kk]) continue;
            const verts = this.halfVerts[kk];
            if (verts.length < 3) continue;
            const clr = this.halfColor[kk];
            const alpha = this.halfAlpha[kk];

            ctx.save();
            ctx.fillStyle = rgb(clr, alpha * 0.6);
            ctx.strokeStyle = rgb(clr, alpha);
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(verts[0][0], verts[0][1]);
            for (let i = 1; i < verts.length; i++) {
                ctx.lineTo(verts[i][0], verts[i][1]);
            }
            ctx.closePath();
            ctx.fill();
            ctx.stroke();
            ctx.restore();
        }

        // ---- Draw slash effects ----
        for (let kk = 0; kk < 6; kk++) {
            if (!this.slashActive[kk]) continue;
            const fadeProgress = this.slashFrames[kk] / this.slashFadeFrames[kk];
            const alphaVal = 1 - Math.sqrt(fadeProgress);

            // Re-read from trace with age offset
            let age = 0;
            if (this.traceBufferIdx >= this.traceBufferMax) {
                age = this.slashAge[kk] - 1;
            }
            const trN = traceX.length;
            const i1 = Math.max(0, Math.round(this.slashIdxStart[kk] - age));
            const i2 = Math.min(trN - 1, Math.round(this.slashIdxEnd[kk] - age));

            if (i1 < i2 && i2 >= 0 && i1 < trN) {
                // Glow
                ctx.save();
                ctx.strokeStyle = rgb(ColorCyan, alphaVal * 0.5);
                ctx.lineWidth = 5;
                ctx.shadowBlur = 12;
                ctx.shadowColor = rgb(ColorCyan, alphaVal * 0.4);
                ctx.beginPath();
                ctx.moveTo(traceX[i1], traceY[i1]);
                for (let i = i1 + 1; i <= i2; i++) {
                    ctx.lineTo(traceX[i], traceY[i]);
                }
                ctx.stroke();
                ctx.restore();

                // Core
                ctx.save();
                ctx.strokeStyle = rgb(ColorWhite, alphaVal * 0.9);
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(traceX[i1], traceY[i1]);
                for (let i = i1 + 1; i <= i2; i++) {
                    ctx.lineTo(traceX[i], traceY[i]);
                }
                ctx.stroke();
                ctx.restore();
            }
        }

        // ---- Multi-cut text ----
        if (this.multiCutFade > 0) {
            const fadeAlpha = Math.min(1, this.multiCutFade / 19);
            ctx.save();
            ctx.fillStyle = rgb(ColorGold, fadeAlpha);
            ctx.font = 'bold 28px monospace';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowBlur = 10;
            ctx.shadowColor = rgb(ColorGold, fadeAlpha * 0.5);
            ctx.fillText(this.multiCutText, this.multiCutX, this.multiCutY);
            ctx.restore();
        }

        // ---- Draw hit effects ----
        this.renderHitEffects(ctx);
    }

    onKeyPress(key) {
        return false;
    }

    onMouseDown() {
        // No special mouse down handling for fruit ninja
    }

    cleanup() {
        this.isRunning = false;
        this.hitEffects = [];
    }

    getResults() {
        let avgCent = 0;
        if (this.sliceHistory.length > 0) {
            avgCent = this.sliceHistory.reduce((a, s) => a + s.centrality, 0) / this.sliceHistory.length;
        }
        return {
            title: "FRUIT NINJA",
            lines: [
                `Sliced: ${this.fruitsSliced}  |  Dropped: ${this.fruitsDropped}  |  Accuracy: ${Math.round(avgCent * 100)}%`
            ]
        };
    }

    // ---- Private methods ----

    getTrace(pos) {
        // Update own shifting trace buffer (same as MATLAB pattern)
        if (!isNaN(pos[0]) && !isNaN(pos[1])) {
            this.traceBufferIdx = Math.min(this.traceBufferIdx + 1, this.traceBufferMax);
            if (this.traceBufferIdx === this.traceBufferMax) {
                // Buffer full — shift left by 1
                this.traceBufferX.copyWithin(0, 1);
                this.traceBufferY.copyWithin(0, 1);
            }
            this.traceBufferX[this.traceBufferIdx - 1] = pos[0];
            this.traceBufferY[this.traceBufferIdx - 1] = pos[1];
        }

        const nValid = this.traceBufferIdx;
        if (nValid < 1) return [[], []];

        const tx = Array.from(this.traceBufferX.subarray(0, nValid));
        const ty = Array.from(this.traceBufferY.subarray(0, nValid));

        // Simple Gaussian-like smoothing (5-point moving average as approximation)
        if (tx.length >= 5) {
            const stx = this.smoothArray(tx, 9);
            const sty = this.smoothArray(ty, 9);
            this.smoothedX = stx;
            this.smoothedY = sty;
            return [stx, sty];
        }

        this.smoothedX = tx;
        this.smoothedY = ty;
        return [tx, ty];
    }

    smoothArray(arr, windowSize) {
        // Gaussian-weighted moving average approximation
        const n = arr.length;
        const result = new Array(n);
        const half = Math.floor(windowSize / 2);
        // Build Gaussian kernel
        const sigma = windowSize / 6;
        const kernel = [];
        let kernelSum = 0;
        for (let i = -half; i <= half; i++) {
            const w = Math.exp(-0.5 * (i / sigma) * (i / sigma));
            kernel.push(w);
            kernelSum += w;
        }
        for (let i = 0; i < kernel.length; i++) kernel[i] /= kernelSum;

        for (let i = 0; i < n; i++) {
            let sum = 0;
            let wSum = 0;
            for (let j = 0; j < kernel.length; j++) {
                const idx = i + j - half;
                if (idx >= 0 && idx < n) {
                    sum += arr[idx] * kernel[j];
                    wSum += kernel[j];
                }
            }
            result[i] = sum / wSum;
        }
        return result;
    }

    spawnFruit() {
        const slot = this.findInactiveSlot(this.fruitActive, 8);
        if (slot < 0) return;
        this.populateFruitSlot(slot, this.dx[0] + this.areaW * (0.15 + Math.random() * 0.7));
    }

    spawnFruitNear(centerX) {
        const slot = this.findInactiveSlot(this.fruitActive, 8);
        if (slot < 0) return;
        const xPos = clamp(
            centerX + (Math.random() - 0.5) * this.areaW * 0.3,
            this.dx[0] + 10, this.dx[1] - 10
        );
        this.populateFruitSlot(slot, xPos, true);
    }

    populateFruitSlot(slot, xPos, isCluster) {
        const dx = this.dx;
        const dy = this.dy;
        const areaW = this.areaW;
        const areaH = this.areaH;

        const clr = this.fruitColors[Math.floor(Math.random() * this.fruitColors.length)];
        const fruitRadius = Math.max(5, Math.round(Math.min(areaW, areaH) * (0.03 + Math.random() * 0.025)));

        const yPos = dy[1] + fruitRadius;
        const velX = (Math.random() - 0.5) * areaW * (isCluster ? 0.0033 : 0.005);
        const minVelY = Math.sqrt(2 * this.gravity * areaH * 0.55);
        const maxVelY = Math.sqrt(2 * this.gravity * areaH * 0.90);
        const velY = -(minVelY + Math.random() * (maxVelY - minVelY));

        this.fruitX[slot] = xPos;
        this.fruitY[slot] = yPos;
        this.fruitVx[slot] = velX;
        this.fruitVy[slot] = velY;
        this.fruitRadius[slot] = fruitRadius;
        this.fruitColor[slot] = [...clr];
        this.fruitSlashing[slot] = 0;
        this.fruitEntryPos[slot] = [NaN, NaN];
        this.fruitSwipeGen[slot] = 0;
        this.fruitActive[slot] = 1;
    }

    findInactiveSlot(activeArr, size) {
        for (let i = 0; i < size; i++) {
            if (!activeArr[i]) return i;
        }
        return -1;
    }

    sliceFruit(fruitSlot, exitPos, slashSpeed, traceX, traceY, nTrace) {
        const fx = this.fruitX[fruitSlot];
        const fy = this.fruitY[fruitSlot];
        const fRadius = this.fruitRadius[fruitSlot];
        const fColor = this.fruitColor[fruitSlot];
        const fvx = this.fruitVx[fruitSlot];
        const fvy = this.fruitVy[fruitSlot];

        this.fruitsSliced++;
        this.incrementCombo();

        // Cut direction from entry/exit positions relative to fruit center
        const entryPos = this.fruitEntryPos[fruitSlot];
        let slashVecX = exitPos[0] - entryPos[0];
        let slashVecY = exitPos[1] - entryPos[1];
        const slashLen = norm2(slashVecX, slashVecY);
        if (slashLen < 0.1) {
            slashVecX = 1; slashVecY = 0;
        } else {
            slashVecX /= slashLen; slashVecY /= slashLen;
        }

        // Project entry/exit onto fruit circle to get cut angles
        const toCenterX = fx - entryPos[0];
        const toCenterY = fy - entryPos[1];
        const projLen = toCenterX * slashVecX + toCenterY * slashVecY;
        const closestX = entryPos[0] + projLen * slashVecX;
        const closestY = entryPos[1] + projLen * slashVecY;
        const perpDist = norm2(fx - closestX, fy - closestY);

        let a1, a2;
        if (perpDist < fRadius) {
            const halfChord = Math.sqrt(fRadius * fRadius - perpDist * perpDist);
            const intPt1X = closestX - halfChord * slashVecX;
            const intPt1Y = closestY - halfChord * slashVecY;
            const intPt2X = closestX + halfChord * slashVecX;
            const intPt2Y = closestY + halfChord * slashVecY;
            a1 = Math.atan2(intPt1Y - fy, intPt1X - fx);
            a2 = Math.atan2(intPt2Y - fy, intPt2X - fx);
        } else {
            a1 = Math.atan2(entryPos[1] - fy, entryPos[0] - fx);
            a2 = Math.atan2(exitPos[1] - fy, exitPos[0] - fx);
        }

        // Centrality
        const mod2pi = (a) => ((a % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI);
        const smallerArc = Math.min(mod2pi(a2 - a1), mod2pi(a1 - a2));
        const centrality = 1 - Math.cos(smallerArc / 2);

        // Multi-cut tracking
        const fruitGen = this.fruitSwipeGen[fruitSlot];
        if (fruitGen > 0 && fruitGen === this.swipeGen) {
            this.swipeGenSliced++;
        }

        // Scoring: base x centrality bonus x combo x multi-cut
        const comboMult = this.comboMultiplier();
        const centralityBonus = 0.5 + centrality; // 0.5 (edge) to 1.5 (center)
        const multiCut = this.swipeGenSliced;
        const points = Math.round(100 * centralityBonus * comboMult * multiCut);
        this.score += points;

        // Multi-cut text
        if (multiCut >= 2) {
            this.multiCutText = `${multiCut}\u00D7`;
            this.multiCutX = fx;
            this.multiCutY = fy - fRadius * 2;
            this.multiCutFade = 48;
        }

        // Store slice diagnostics
        this.sliceHistory.push({
            centrality,
            speed: slashSpeed,
            angle: Math.atan2(Math.sin(a2 - a1), Math.cos(a2 - a1)) * 180 / Math.PI,
            position: [fx, fy]
        });

        // Split normal: perpendicular to slash direction
        const splitNormX = -slashVecY;
        const splitNormY = slashVecX;

        // Build two half-pieces
        for (const side of [1, -1]) {
            let arcSpan, arcStart;
            if (side === 1) {
                arcSpan = mod2pi(a2 - a1);
                arcStart = a1;
            } else {
                arcSpan = mod2pi(a1 - a2);
                arcStart = a2;
            }
            const verts = [];
            for (let i = 0; i < 20; i++) {
                const angle = arcStart + (i / 19) * arcSpan;
                verts.push([
                    fx + fRadius * Math.cos(angle),
                    fy + fRadius * Math.sin(angle)
                ]);
            }

            const halfSlot = this.findInactiveSlot(this.halfActive, 16);
            if (halfSlot < 0) continue;

            const swipePush = Math.min(slashSpeed * 0.125, 2.083 * this.Sc);
            const splitVx = fvx + splitNormX * side * 0.625 * this.Sc + slashVecX * swipePush;
            const splitVy = fvy + splitNormY * side * 0.625 * this.Sc + slashVecY * swipePush;

            this.halfVerts[halfSlot] = verts;
            this.halfColor[halfSlot] = [...fColor];
            this.halfVx[halfSlot] = splitVx;
            this.halfVy[halfSlot] = splitVy;
            this.halfSpin[halfSlot] = side * 0.025;
            this.halfAlpha[halfSlot] = 1.0;
            this.halfFrames[halfSlot] = 0;
            this.halfActive[halfSlot] = 1;
        }

        // Slash animation — find entry/exit in recent trace
        if (nTrace > 0) {
            const searchLen = Math.min(40, nTrace);
            const searchStart = nTrace - searchLen;

            // Entry point on circle
            const entryOnCircleX = fx + fRadius * Math.cos(a1);
            const entryOnCircleY = fy + fRadius * Math.sin(a1);

            let bestEntryDist = Infinity, entryLocal = 0;
            let bestExitDist = Infinity, exitLocal = 0;
            for (let i = searchStart; i < nTrace; i++) {
                const ed = (traceX[i] - entryOnCircleX) ** 2 + (traceY[i] - entryOnCircleY) ** 2;
                if (ed < bestEntryDist) { bestEntryDist = ed; entryLocal = i; }
                const xd = (traceX[i] - exitPos[0]) ** 2 + (traceY[i] - exitPos[1]) ** 2;
                if (xd < bestExitDist) { bestExitDist = xd; exitLocal = i; }
            }

            const padVal = 4;
            const idxStart = Math.max(0, Math.min(entryLocal, exitLocal) - padVal);
            const idxEnd = Math.min(nTrace - 1, Math.max(entryLocal, exitLocal) + padVal);

            const slashSlot = this.findInactiveSlot(this.slashActive, 6);
            if (slashSlot >= 0) {
                this.slashFrames[slashSlot] = 0;
                this.slashAge[slashSlot] = 0;
                this.slashFadeFrames[slashSlot] = 29;
                this.slashIdxStart[slashSlot] = idxStart;
                this.slashIdxEnd[slashSlot] = idxEnd;
                this.slashActive[slashSlot] = 1;
            }
        }

        // Spawn burst effect at fruit center
        this.spawnHitEffect(fx, fy, fColor, points, fRadius);

        // Deactivate original fruit
        this.fruitActive[fruitSlot] = 0;
        this.fruitSlashing[fruitSlot] = 0;
    }

    incrementCombo() {
        this.combo++;
        this.maxCombo = Math.max(this.maxCombo, this.combo);
    }

    resetCombo() {
        this.combo = 0;
    }

    comboMultiplier() {
        return Math.max(1, this.combo / 10);
    }

    // Hit effects (same pattern as FlappyBird)
    spawnHitEffect(x, y, clr, points, effectRadius) {
        if (effectRadius === undefined) effectRadius = 20;
        const nRays = 8;
        const maxFrames = 18;
        const angles = [];
        for (let i = 0; i < nRays; i++) angles.push((i / nRays) * Math.PI * 2);
        this.hitEffects.push({
            x, y, color: [...clr], radius: effectRadius,
            frames: maxFrames, maxFrames,
            nRays, rayCos: angles.map(Math.cos), raySin: angles.map(Math.sin),
            points, type: 'hit'
        });
    }

    updateHitEffects(ds) {
        for (let i = this.hitEffects.length - 1; i >= 0; i--) {
            this.hitEffects[i].frames -= ds;
            if (this.hitEffects[i].frames <= 0) {
                this.hitEffects.splice(i, 1);
            }
        }
    }

    renderHitEffects(ctx) {
        for (const fx of this.hitEffects) {
            const t = 1 - fx.frames / fx.maxFrames;
            const eased = 1 - (1 - t) * (1 - t);
            const alpha = Math.max(0, 1 - eased * 1.5);
            const expandScale = 1 + eased * 2.5;
            const baseR = fx.radius;

            // Expanding ring
            const r = baseR * expandScale;
            ctx.save();
            ctx.strokeStyle = rgb(fx.color, alpha * 0.8);
            ctx.lineWidth = Math.max(0.5, 3 * (1 - eased));
            ctx.shadowBlur = 8;
            ctx.shadowColor = rgb(fx.color, alpha * 0.4);
            ctx.beginPath();
            ctx.arc(fx.x, fx.y, r, 0, Math.PI * 2);
            ctx.stroke();
            ctx.restore();

            // Burst rays
            const r0 = baseR * (0.5 + eased * 1.5);
            const r1 = baseR * (1.0 + eased * 3.0);
            ctx.strokeStyle = rgb(fx.color, alpha * 0.6);
            ctx.lineWidth = Math.max(0.5, 2 * (1 - eased));
            for (let j = 0; j < fx.nRays; j++) {
                ctx.beginPath();
                ctx.moveTo(fx.x + r0 * fx.rayCos[j], fx.y + r0 * fx.raySin[j]);
                ctx.lineTo(fx.x + r1 * fx.rayCos[j], fx.y + r1 * fx.raySin[j]);
                ctx.stroke();
            }

            // Points text
            if (fx.points > 0) {
                ctx.save();
                const textY = fx.y - baseR - 8 - eased * 20;
                ctx.fillStyle = rgb(fx.color, alpha);
                ctx.font = `bold ${Math.round(14 * (1 + eased * 0.3))}px monospace`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'bottom';
                ctx.shadowBlur = 6;
                ctx.shadowColor = rgb(fx.color, alpha * 0.5);
                ctx.fillText(`+${Math.round(fx.points)}`, fx.x, textY);
                ctx.restore();
            }
        }
    }
}


// ============================================================================
// TARGET PRACTICE
// ============================================================================
class TargetPracticeGame {
    constructor() {
        this.name = "Target Practice";
        this.score = 0;
        this.combo = 0;
        this.maxCombo = 0;
        this.isRunning = false;
    }

    init(canvas, ctx, displayRange) {
        this.canvas = canvas;
        this.ctx = ctx;
        this.dx = [displayRange.X[0], displayRange.X[1]];
        this.dy = [displayRange.Y[0], displayRange.Y[1]];
        this.areaW = this.dx[1] - this.dx[0];
        this.areaH = this.dy[1] - this.dy[0];

        this.score = 0;
        this.combo = 0;
        this.maxCombo = 0;
        this.isRunning = true;

        this.Sc = Math.min(this.areaW, this.areaH) / 180;

        this.targetPos = [NaN, NaN];
        this.targetIndex = 0;
        this.targetsHit = 0;
        this.targetsMissed = 0;
        this.pathSinceSpawn = 0;
        this.prevPos = [NaN, NaN];
        this.pulsePhase = 0;
        this.targetRadius = 30;
        this.targetTimeout = 4.0;
        this.targetSpawnTime = 0; // performance.now() based

        // History
        this.targetHistory = [];

        // Hit effects
        this.hitEffects = [];

        // Spawn first target
        this.spawnTarget();
    }

    update(mousePos, dt, dtScale) {
        if (!this.isRunning) return;
        const ds = dtScale;
        const ctx = this.ctx;
        const pos = mousePos;

        // Accumulate path length
        if (!isNaN(pos[0]) && !isNaN(pos[1]) && !isNaN(this.prevPos[0]) && !isNaN(this.prevPos[1])) {
            this.pathSinceSpawn += norm2(pos[0] - this.prevPos[0], pos[1] - this.prevPos[1]);
        }

        // Check hit (swept segment: prevPos -> pos vs target circle)
        if (!isNaN(pos[0]) && !isNaN(pos[1]) && !isNaN(this.targetPos[0]) && !isNaN(this.targetPos[1])) {
            const prevX = isNaN(this.prevPos[0]) ? pos[0] : this.prevPos[0];
            const prevY = isNaN(this.prevPos[1]) ? pos[1] : this.prevPos[1];
            const dist = segmentPointDist(prevX, prevY, pos[0], pos[1],
                this.targetPos[0], this.targetPos[1]);
            if (dist <= this.targetRadius) {
                this.prevPos = [pos[0], pos[1]];
                this.onTargetHit(dist);
                this.updateHitEffects(ds);
                this.render(pos);
                return;
            }
        }

        // Check timeout
        const elapsed = (performance.now() - this.targetSpawnTime) / 1000;
        if (elapsed > this.targetTimeout) {
            this.prevPos = [pos[0], pos[1]];
            this.onTargetMiss();
            this.updateHitEffects(ds);
            this.render(pos);
            return;
        }

        // Animate target
        this.pulsePhase += 0.12 * ds;

        // Update hit effects
        this.updateHitEffects(ds);

        this.prevPos = [pos[0], pos[1]];

        // Render
        this.render(pos, elapsed);
    }

    render(fingerPos, elapsed) {
        const ctx = this.ctx;
        const dx = this.dx;
        const dy = this.dy;

        if (elapsed === undefined) elapsed = (performance.now() - this.targetSpawnTime) / 1000;

        // ---- Draw trail line from finger to target ----
        if (!isNaN(fingerPos[0]) && !isNaN(this.targetPos[0])) {
            const urgency = Math.min(1, elapsed / this.targetTimeout);
            let ringColor;
            if (urgency < 0.6) {
                ringColor = ColorCyan;
            } else {
                const t = Math.min(1, (urgency - 0.6) / 0.4);
                ringColor = lerpColor(ColorCyan, ColorRed, t);
            }
            const trailAlpha = 0.08 + 0.06 * (1 - urgency);

            ctx.save();
            ctx.strokeStyle = rgb(ringColor, trailAlpha);
            ctx.lineWidth = 1;
            ctx.setLineDash([4, 6]);
            ctx.beginPath();
            ctx.moveTo(fingerPos[0], fingerPos[1]);
            ctx.lineTo(this.targetPos[0], this.targetPos[1]);
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.restore();
        }

        // ---- Draw target ----
        if (!isNaN(this.targetPos[0])) {
            const cx = this.targetPos[0];
            const cy = this.targetPos[1];
            const r = this.targetRadius;
            const breathe = 1 + 0.12 * Math.sin(this.pulsePhase);
            const rOuter = r * breathe;
            const rInner = r * 0.5 * breathe;

            // Color shift: cyan -> red as timeout approaches
            const urgency = Math.min(1, elapsed / this.targetTimeout);
            let ringColor;
            if (urgency < 0.6) {
                ringColor = ColorCyan;
            } else {
                const t = Math.min(1, (urgency - 0.6) / 0.4);
                ringColor = lerpColor(ColorCyan, ColorRed, t);
            }

            // Glow
            ctx.save();
            ctx.strokeStyle = rgb(ringColor, 0.1 + 0.08 * Math.sin(this.pulsePhase));
            ctx.lineWidth = 10;
            ctx.shadowBlur = 20;
            ctx.shadowColor = rgb(ringColor, 0.3);
            ctx.beginPath();
            ctx.arc(cx, cy, rOuter, 0, Math.PI * 2);
            ctx.stroke();
            ctx.restore();

            // Outer ring
            ctx.save();
            ctx.strokeStyle = rgb(ringColor, 0.7 + 0.3 * Math.sin(this.pulsePhase));
            ctx.lineWidth = 2.5;
            ctx.shadowBlur = 8;
            ctx.shadowColor = rgb(ringColor, 0.5);
            ctx.beginPath();
            ctx.arc(cx, cy, rOuter, 0, Math.PI * 2);
            ctx.stroke();
            ctx.restore();

            // Inner ring
            ctx.save();
            ctx.strokeStyle = rgb(ColorWhite, 0.9);
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.arc(cx, cy, rInner, 0, Math.PI * 2);
            ctx.stroke();
            ctx.restore();

            // Center dot
            ctx.save();
            ctx.fillStyle = rgb(ColorWhite);
            ctx.beginPath();
            ctx.arc(cx, cy, 2.5, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }

        // ---- Time bar at bottom ----
        if (!isNaN(this.targetPos[0])) {
            const fraction = Math.min(1, elapsed / this.targetTimeout);
            const barY = dy[1] - 8;
            const barH = 4;
            const remaining = 1 - fraction;
            const xEnd = dx[0] + remaining * (dx[1] - dx[0]);

            // Background
            ctx.fillStyle = 'rgba(77,77,77,0.3)';
            ctx.fillRect(dx[0], barY, dx[1] - dx[0], barH);

            // Foreground (color: cyan -> gold -> red)
            let barColor;
            if (fraction < 0.5) {
                barColor = ColorCyan;
            } else if (fraction < 0.8) {
                const t = (fraction - 0.5) / 0.3;
                barColor = lerpColor(ColorCyan, ColorGold, t);
            } else {
                const t = (fraction - 0.8) / 0.2;
                barColor = lerpColor(ColorGold, ColorRed, t);
            }
            ctx.fillStyle = rgb(barColor, 0.7);
            ctx.fillRect(dx[0], barY, xEnd - dx[0], barH);
        }

        // ---- Draw hit effects ----
        this.renderHitEffects(ctx);
    }

    onKeyPress(key) {
        // Block arrow keys (mouse-only game)
        return ['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(key);
    }

    onMouseDown() {
        // No special click handling
    }

    cleanup() {
        this.isRunning = false;
        this.hitEffects = [];
    }

    getResults() {
        const nHit = this.targetsHit;
        const nTotal = nHit + this.targetsMissed;
        let accuracy = 0;
        if (nTotal > 0) accuracy = nHit / nTotal * 100;
        let avgTime = NaN;
        const hitEntries = this.targetHistory.filter(e => e.hit);
        if (hitEntries.length > 0) {
            avgTime = hitEntries.reduce((a, e) => a + e.hitTime, 0) / hitEntries.length;
        }
        return {
            title: "TARGET PRACTICE",
            lines: [
                `Targets: ${nHit}/${nTotal} (${Math.round(accuracy)}%)  |  Avg: ${isNaN(avgTime) ? '--' : avgTime.toFixed(2)}s`
            ]
        };
    }

    // ---- Private methods ----

    spawnTarget() {
        const margin = Math.round(35 * this.Sc);
        const dx = this.dx;
        const dy = this.dy;
        const xMin = dx[0] + margin;
        const xMax = dx[1] - margin;
        const yMin = dy[0] + margin;
        const yMax = dy[1] - margin;

        const areaSpan = Math.min(xMax - xMin, yMax - yMin);
        const minFingerDist = Math.max(30, areaSpan * 0.35);
        const minTargetDist = Math.max(20, areaSpan * 0.2);

        const fingerPos = this.prevPos;
        let bestPos = [NaN, NaN];
        let bestScore = -Infinity;

        for (let attempt = 0; attempt < 50; attempt++) {
            const x = xMin + Math.random() * (xMax - xMin);
            const y = yMin + Math.random() * (yMax - yMin);

            let dFinger = Infinity;
            if (!isNaN(fingerPos[0])) {
                dFinger = norm2(x - fingerPos[0], y - fingerPos[1]);
            }
            let dPrev = Infinity;
            if (!isNaN(this.targetPos[0])) {
                dPrev = norm2(x - this.targetPos[0], y - this.targetPos[1]);
            }

            if (dFinger >= minFingerDist && dPrev >= minTargetDist) {
                bestPos = [x, y];
                break;
            }

            const score = dFinger + dPrev;
            if (score > bestScore) {
                bestScore = score;
                bestPos = [x, y];
            }
        }

        if (isNaN(bestPos[0])) {
            bestPos = [(xMin + xMax) / 2, (yMin + yMax) / 2];
        }

        this.targetPos = bestPos;
        this.targetSpawnTime = performance.now();
        this.targetIndex++;
        this.pathSinceSpawn = 0;
        this.pulsePhase = 0;

        // Difficulty scaling based on combo
        const baseRadius = Math.round(30 * this.Sc);
        const minRadius = Math.max(2, Math.round(3 * this.Sc));
        this.targetRadius = Math.max(minRadius, baseRadius - this.combo * 0.5);
        const baseTimeout = 4.0;
        const minTimeout = 0.1;
        this.targetTimeout = Math.max(minTimeout, baseTimeout - this.combo * 0.06);
    }

    onTargetHit(dist) {
        const hitTime = (performance.now() - this.targetSpawnTime) / 1000;

        // Path efficiency
        let idealDist;
        if (this.targetIndex >= 2 && this.targetHistory.length > 0) {
            const prevTarget = this.targetHistory[this.targetHistory.length - 1].pos;
            idealDist = norm2(this.targetPos[0] - prevTarget[0], this.targetPos[1] - prevTarget[1]);
        } else {
            idealDist = this.pathSinceSpawn;
        }

        // Score — raw multiplier (no floor) matches original
        this.incrementCombo();
        const comboMult = this.combo * 0.1;
        const totalPoints = Math.round(100 * comboMult);
        this.score += totalPoints;
        this.targetsHit++;

        // Record history
        this.targetHistory.push({
            pos: [this.targetPos[0], this.targetPos[1]],
            hitTime, hitDist: dist, pathLen: this.pathSinceSpawn,
            directDist: idealDist, hit: true
        });

        // Visual feedback
        this.spawnHitEffect(this.targetPos[0], this.targetPos[1],
            ColorGreen, totalPoints, this.targetRadius);

        this.spawnTarget();
    }

    onTargetMiss() {
        this.resetCombo();
        this.targetsMissed++;

        this.targetHistory.push({
            pos: [this.targetPos[0], this.targetPos[1]],
            hitTime: this.targetTimeout, hitDist: NaN,
            pathLen: this.pathSinceSpawn, directDist: NaN, hit: false
        });

        // Visual feedback
        this.spawnHitEffect(this.targetPos[0], this.targetPos[1],
            ColorRed, 0, this.targetRadius);

        this.spawnTarget();
    }

    incrementCombo() {
        this.combo++;
        this.maxCombo = Math.max(this.maxCombo, this.combo);
    }

    resetCombo() {
        this.combo = 0;
    }

    comboMultiplier() {
        return Math.max(1, this.combo / 10);
    }

    // Hit effects system (identical to FlappyBird/FruitNinja)
    spawnHitEffect(x, y, clr, points, effectRadius) {
        if (effectRadius === undefined) effectRadius = 20;
        const nRays = 8;
        const maxFrames = 18;
        const angles = [];
        for (let i = 0; i < nRays; i++) angles.push((i / nRays) * Math.PI * 2);
        this.hitEffects.push({
            x, y, color: [...clr], radius: effectRadius,
            frames: maxFrames, maxFrames,
            nRays, rayCos: angles.map(Math.cos), raySin: angles.map(Math.sin),
            points, type: 'hit'
        });
    }

    updateHitEffects(ds) {
        for (let i = this.hitEffects.length - 1; i >= 0; i--) {
            this.hitEffects[i].frames -= ds;
            if (this.hitEffects[i].frames <= 0) {
                this.hitEffects.splice(i, 1);
            }
        }
    }

    renderHitEffects(ctx) {
        for (const fx of this.hitEffects) {
            const t = 1 - fx.frames / fx.maxFrames;
            const eased = 1 - (1 - t) * (1 - t);
            const alpha = Math.max(0, 1 - eased * 1.5);
            const expandScale = 1 + eased * 2.5;
            const baseR = fx.radius;

            // Expanding ring
            const r = baseR * expandScale;
            ctx.save();
            ctx.strokeStyle = rgb(fx.color, alpha * 0.8);
            ctx.lineWidth = Math.max(0.5, 3 * (1 - eased));
            ctx.shadowBlur = 8;
            ctx.shadowColor = rgb(fx.color, alpha * 0.4);
            ctx.beginPath();
            ctx.arc(fx.x, fx.y, r, 0, Math.PI * 2);
            ctx.stroke();
            ctx.restore();

            // Burst rays
            const r0 = baseR * (0.5 + eased * 1.5);
            const r1 = baseR * (1.0 + eased * 3.0);
            ctx.strokeStyle = rgb(fx.color, alpha * 0.6);
            ctx.lineWidth = Math.max(0.5, 2 * (1 - eased));
            for (let j = 0; j < fx.nRays; j++) {
                ctx.beginPath();
                ctx.moveTo(fx.x + r0 * fx.rayCos[j], fx.y + r0 * fx.raySin[j]);
                ctx.lineTo(fx.x + r1 * fx.rayCos[j], fx.y + r1 * fx.raySin[j]);
                ctx.stroke();
            }

            // Points text
            if (fx.points > 0) {
                ctx.save();
                const textY = fx.y - baseR - 8 - eased * 20;
                ctx.fillStyle = rgb(fx.color, alpha);
                ctx.font = `bold ${Math.round(14 * (1 + eased * 0.3))}px monospace`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'bottom';
                ctx.shadowBlur = 6;
                ctx.shadowColor = rgb(fx.color, alpha * 0.5);
                ctx.fillText(`+${Math.round(fx.points)}`, fx.x, textY);
                ctx.restore();
            } else if (fx.points === 0) {
                ctx.save();
                const textY = fx.y - baseR - 8 - eased * 20;
                ctx.fillStyle = rgb(fx.color, alpha);
                ctx.font = `bold ${Math.round(12 * (1 + eased * 0.3))}px monospace`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'bottom';
                ctx.shadowBlur = 6;
                ctx.shadowColor = rgb(fx.color, alpha * 0.5);
                ctx.fillText('MISS', fx.x, textY);
                ctx.restore();
            }
        }
    }
}

class FireflyChaseGame {
    constructor() {
        this.name = 'Firefly Chase';
        this.score = 0;
        this.combo = 0;
        this.maxCombo = 0;
        this.showHostCombo = false; // game shows its own combo
        this.firefliesCaught = 0;
        this.firefliesMissed = 0;

        this.baseSpeed = 2.1875;
        this.sc = 1;
        this.activeFF = [];
        this.spawnCooldown = 96;

        this.catchStartTime = 0;
        this.lastCatchTime = 0;

        // Combo text fade
        this.comboFadeStart = null;
        this.comboFadeColor = Colors.Green;
        this.comboShowTime = null;
        this.comboText = '';
        this.comboTextPos = [0, 0];
        this.comboTextVisible = false;

        this.hitEffects = new HitEffects();

        this.canvas = null;
        this.ctx = null;
        this.displayRange = null;
    }

    init(canvas, ctx, displayRange) {
        this.canvas = canvas;
        this.ctx = ctx;
        this.displayRange = displayRange;
        this.score = 0;
        this.combo = 0;
        this.maxCombo = 0;
        this.firefliesCaught = 0;
        this.firefliesMissed = 0;

        const areaW = displayRange.X[1] - displayRange.X[0];
        const areaH = displayRange.Y[1] - displayRange.Y[0];
        this.sc = Math.min(areaW, areaH) / 180;

        this.activeFF = [];
        this.spawnCooldown = 96;
        this.catchStartTime = performance.now() / 1000;
        this.lastCatchTime = performance.now() / 1000;
        this.comboFadeStart = null;
        this.comboShowTime = null;
        this.comboTextVisible = false;

        // Spawn first firefly
        this.spawnFirefly();
    }

    update(mousePos, dt, dtScale) {
        const ctx = this.ctx;
        const dx = this.displayRange.X;
        const dy = this.displayRange.Y;
        const now = performance.now() / 1000;

        // Advance and check each firefly (reverse for safe deletion)
        for (let i = this.activeFF.length - 1; i >= 0; i--) {
            const ff = this.activeFF[i];
            ff.phase += 0.0625 * dtScale;

            let ffPosX, ffPosY;
            let tx, ty;

            if (ff.isSnitch) {
                // Golden snitch: Lissajous base trajectory + evasion
                ff.theta += ff.speed * 0.00167 * dtScale;

                const cx = (dx[0] + dx[1]) / 2;
                const cy = (dy[0] + dy[1]) / 2;
                const ampX = (dx[1] - dx[0]) * 0.4;
                const ampY = (dy[1] - dy[0]) * 0.4;
                const baseX = cx + ampX * Math.sin(ff.theta * ff.freqX + ff.phaseX);
                const baseY = cy + ampY * Math.sin(ff.theta * ff.freqY + ff.phaseY);

                // Evasion offset
                let evadeX = 0;
                let evadeY = 0;
                if (mousePos) {
                    const snitchX = baseX + ff.evadeX;
                    const snitchY = baseY + ff.evadeY;
                    const ddx = snitchX - mousePos.x;
                    const ddy = snitchY - mousePos.y;
                    const dFinger = hypot(ddx, ddy);
                    const evadeR = Math.round(100 * this.sc);
                    if (dFinger < evadeR && dFinger > 0.1) {
                        const push = Math.pow((evadeR - dFinger) / evadeR, 2) * 8 * this.sc;
                        evadeX = (ddx / dFinger) * push;
                        evadeY = (ddy / dFinger) * push;
                    }
                }
                ff.evadeX = ff.evadeX * Math.pow(0.9664, dtScale) + evadeX;
                ff.evadeY = ff.evadeY * Math.pow(0.9664, dtScale) + evadeY;

                ff.posX = baseX + ff.evadeX;
                ff.posY = baseY + ff.evadeY;

                // Clamp to bounds
                const pad = 5;
                ff.posX = Math.max(dx[0] + pad, Math.min(dx[1] - pad, ff.posX));
                ff.posY = Math.max(dy[0] + pad, Math.min(dy[1] - pad, ff.posY));
                ffPosX = ff.posX;
                ffPosY = ff.posY;

                // Trail (circular buffer, record at ~30fps rate)
                ff.trailAccum = (ff.trailAccum || 0) + dtScale;
                if (ff.trailAccum >= 2.0) {
                    ff.trailAccum -= 2.0;
                    ff.trailIdx++;
                    const bi = ((ff.trailIdx - 1) % ff.trailLen);
                    ff.trailBufX[bi] = ff.posX;
                    ff.trailBufY[bi] = ff.posY;
                }
                const nFilled = Math.min(ff.trailIdx, ff.trailLen);
                tx = [];
                ty = [];
                for (let j = 0; j < nFilled; j++) {
                    const idx = ((bi - nFilled + j) % ff.trailLen + ff.trailLen) % ff.trailLen;
                    tx.push(ff.trailBufX[idx]);
                    ty.push(ff.trailBufY[idx]);
                }
            } else {
                // Path-based firefly
                ff.idx += ff.speed * dtScale;

                if (ff.idx >= ff.pathX.length) {
                    // Reached end — loop or reverse
                    const gapDist = hypot(
                        ff.pathX[ff.pathX.length - 1] - ff.pathX[0],
                        ff.pathY[ff.pathY.length - 1] - ff.pathY[0]
                    );
                    if (gapDist < 5) {
                        ff.idx = 0;
                    } else {
                        ff.pathX.reverse();
                        ff.pathY.reverse();
                        ff.idx = 0;
                    }
                }

                const pidx = Math.max(0, Math.min(ff.pathX.length - 1, Math.round(ff.idx)));
                ffPosX = ff.pathX[pidx];
                ffPosY = ff.pathY[pidx];

                // Comet tail from path history
                const trailSpan = Math.round(45 * ff.speed / this.baseSpeed);
                const tStart = Math.max(0, pidx - trailSpan);
                tx = ff.pathX.slice(tStart, pidx + 1);
                ty = ff.pathY.slice(tStart, pidx + 1);
            }

            // Check catch
            if (mousePos) {
                const dist = hypot(mousePos.x - ffPosX, mousePos.y - ffPosY);
                if (dist <= ff.radius) {
                    this.onCatch(i, ffPosX, ffPosY);
                    continue;
                }
            }

            // --- Render firefly ---
            this.renderFirefly(ctx, ffPosX, ffPosY, ff, tx, ty);
        }

        // Combo decay — fade out after 2 seconds
        if (this.combo > 0) {
            const comboAge = now - this.lastCatchTime;
            if (comboAge > 2) {
                this.resetCombo();
                this.comboFadeStart = now;
                this.comboFadeColor = Colors.Green;
            } else if (comboAge > 0.5 && this.comboTextVisible) {
                const fade = 1 - (comboAge - 0.5) / 1.5;
                this.renderComboText(ctx, Math.max(fade, 0));
            }
        }

        // Spawn on cooldown, max 3 on screen
        this.spawnCooldown -= dtScale;
        if (this.spawnCooldown <= 0 && this.activeFF.length < 3) {
            this.spawnFirefly();
            const elapsed = now - this.catchStartTime;
            this.spawnCooldown = Math.max(19, Math.round(72 - elapsed * 0.3));
        }

        // Animate combo text fade
        this.updateComboFade(ctx, now);

        // Update hit effects
        this.hitEffects.update(ctx, dtScale);
    }

    renderFirefly(ctx, x, y, ff, tx, ty) {
        const clr = ff.color;
        const baseRadius = ff.radius / Math.max(this.sc, 0.5);
        const dotSize = baseRadius;
        const auraSize = baseRadius * 3.5;

        // Breathing animation
        const breathAlpha = 0.25 + 0.15 * Math.sin(ff.phase);

        // Trail glow
        if (tx.length > 1) {
            ctx.save();
            ctx.strokeStyle = rgba(clr, 0.2);
            ctx.lineWidth = dotSize * 0.8;
            ctx.shadowColor = rgba(clr, 0.15);
            ctx.shadowBlur = 8;
            ctx.beginPath();
            ctx.moveTo(tx[0], ty[0]);
            for (let j = 1; j < tx.length; j++) {
                ctx.lineTo(tx[j], ty[j]);
            }
            ctx.stroke();
            ctx.restore();

            // Trail solid line
            ctx.save();
            ctx.strokeStyle = rgba(clr, 0.4);
            ctx.lineWidth = Math.max(1, dotSize * 0.3);
            ctx.beginPath();
            ctx.moveTo(tx[0], ty[0]);
            for (let j = 1; j < tx.length; j++) {
                ctx.lineTo(tx[j], ty[j]);
            }
            ctx.stroke();
            ctx.restore();
        }

        // Aura glow
        ctx.save();
        ctx.shadowColor = rgba(clr, 0.4);
        ctx.shadowBlur = auraSize;
        ctx.fillStyle = rgba(clr, breathAlpha);
        ctx.beginPath();
        ctx.arc(x, y, auraSize * 0.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        // Core dot
        ctx.save();
        ctx.shadowColor = rgba(clr, 0.8);
        ctx.shadowBlur = dotSize * 2;
        ctx.fillStyle = rgba(clr, 1);
        ctx.beginPath();
        ctx.arc(x, y, dotSize * 0.5, 0, Math.PI * 2);
        ctx.fill();
        // White center
        ctx.fillStyle = rgba(Colors.White, 0.9);
        ctx.beginPath();
        ctx.arc(x, y, dotSize * 0.25, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    }

    onCatch(idx, hitX, hitY) {
        const ff = this.activeFF[idx];
        this.combo++;
        this.maxCombo = Math.max(this.maxCombo, this.combo);
        this.lastCatchTime = performance.now() / 1000;

        const comboMult = this.combo * 0.1;
        const totalPoints = Math.round(ff.points * comboMult);
        this.score += totalPoints;
        this.firefliesCaught++;

        this.hitEffects.spawnHitEffect(hitX, hitY, ff.color, totalPoints, ff.radius);
        this.showComboText(hitX, hitY + 12);

        // Remove caught firefly
        this.activeFF.splice(idx, 1);

        // Immediately spawn a replacement (respecting max)
        if (this.activeFF.length < 3) {
            this.spawnFirefly();
        }
    }

    resetCombo() {
        this.combo = 0;
    }

    showComboText(x, y) {
        if (this.combo >= 2) {
            this.comboFadeStart = null;
            this.comboText = `${this.combo}x Combo`;
            this.comboTextPos = [x, y];
            this.comboTextVisible = true;
            this.comboShowTime = performance.now() / 1000;
        } else {
            // Start fade-out
            this.comboFadeStart = performance.now() / 1000;
            this.comboFadeColor = Colors.Green;
        }
    }

    renderComboText(ctx, alpha) {
        if (!this.comboTextVisible || !this.comboText) return;
        ctx.save();
        ctx.font = 'bold 7px sans-serif';
        const clrGreen = [
            Colors.Green[0] * 0.9,
            Colors.Green[1] * 0.9,
            Colors.Green[2] * 0.9,
        ];
        ctx.fillStyle = rgba(clrGreen, alpha);
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';
        ctx.fillText(this.comboText, this.comboTextPos[0], this.comboTextPos[1]);
        ctx.restore();
    }

    updateComboFade(ctx, now) {
        // Auto-trigger fade after 1s display
        if (this.comboShowTime !== null && this.comboFadeStart === null) {
            if (now - this.comboShowTime >= 1.0) {
                this.comboFadeStart = now;
                this.comboFadeColor = Colors.Green;
                this.comboShowTime = null;
            } else if (this.comboTextVisible) {
                this.renderComboText(ctx, 1.0);
            }
        }

        if (this.comboFadeStart === null) return;
        const elapsed = now - this.comboFadeStart;
        const fadeDur = 0.6;
        if (elapsed >= fadeDur) {
            this.comboTextVisible = false;
            this.comboFadeStart = null;
        } else {
            const fadeAlpha = Math.max(0, 1 - elapsed / fadeDur);
            this.renderComboText(ctx, fadeAlpha);
        }
    }

    spawnFirefly() {
        const dx = this.displayRange.X;
        const dy = this.displayRange.Y;
        const bs = this.baseSpeed;
        const sc = this.sc;

        // Tier selection (weighted random)
        const tierRoll = Math.random();
        let clr, pts, radius, spd, isGold;
        if (tierRoll < 0.35) {
            // Cyan (35%)
            clr = Colors.Cyan.slice();
            pts = 100; radius = Math.round(14 * sc); spd = bs * 1.5;
        } else if (tierRoll < 0.65) {
            // Green (30%)
            clr = Colors.Green.slice();
            pts = 200; radius = Math.round(13 * sc); spd = bs * 2.7;
        } else if (tierRoll < 0.85) {
            // Magenta (20%)
            clr = Colors.Magenta.slice();
            pts = 300; radius = Math.round(12 * sc); spd = bs * 3.75;
        } else if (tierRoll < 0.95) {
            // Purple (10%)
            clr = Colors.Purple.slice();
            pts = 400; radius = Math.round(11 * sc); spd = bs * 4.8;
        } else {
            // Gold (5%)
            clr = Colors.Gold.slice();
            pts = 500; radius = Math.round(10 * sc); spd = bs * 3.0;
        }
        isGold = (tierRoll >= 0.95);

        const ff = {
            speed: spd,
            radius: radius,
            color: clr,
            points: pts,
            phase: Math.random() * Math.PI * 2,
            isSnitch: isGold,
            pathX: null,
            pathY: null,
            idx: 0,
            theta: 0,
            freqX: 0,
            freqY: 0,
            phaseX: 0,
            phaseY: 0,
            evadeX: 0,
            evadeY: 0,
            posX: 0,
            posY: 0,
            trailLen: 0,
            trailBufX: null,
            trailBufY: null,
            trailIdx: 0,
        };

        if (isGold) {
            // Golden snitch: Lissajous
            ff.theta = Math.random() * Math.PI * 2;
            const freqPairs = [[3,2],[5,4],[3,4],[5,2],[7,4],[5,6]];
            const pick = freqPairs[Math.floor(Math.random() * freqPairs.length)];
            ff.freqX = pick[0];
            ff.freqY = pick[1];
            ff.phaseX = Math.random() * Math.PI * 2;
            ff.phaseY = Math.random() * Math.PI * 2;

            const cx = (dx[0] + dx[1]) / 2;
            const cy = (dy[0] + dy[1]) / 2;
            const ampX = (dx[1] - dx[0]) * 0.4;
            const ampY = (dy[1] - dy[0]) * 0.4;
            ff.posX = cx + ampX * Math.sin(ff.theta * ff.freqX + ff.phaseX);
            ff.posY = cy + ampY * Math.sin(ff.theta * ff.freqY + ff.phaseY);
            ff.trailLen = 12; // matches MATLAB, trail accumulator handles frame rate
            ff.trailBufX = new Array(12).fill(NaN);
            ff.trailBufY = new Array(12).fill(NaN);
            ff.trailIdx = 0;
        } else {
            // Path-based firefly — closed orbits only (loop, figure8)
            const corridorW = Math.round(10 * this.sc);
            let p;
            for (let attempt = 0; attempt < 50; attempt++) {
                p = FireflyChaseGame.generatePath(3, dx, dy, corridorW, true);
                if (p.type === 'loop' || p.type === 'figure8') break;
            }
            ff.pathX = p.X;
            ff.pathY = p.Y;
            ff.idx = 0;
        }

        this.activeFF.push(ff);
    }

    // -----------------------------------------------------------------------
    // Static: generatePath — full MATLAB port
    // -----------------------------------------------------------------------
    static generatePath(tier, displayRangeX, displayRangeY, corridorWidth, applyRotation) {
        if (corridorWidth === undefined) corridorWidth = 20;
        if (applyRotation === undefined) applyRotation = true;

        const localSc = Math.min(
            displayRangeX[1] - displayRangeX[0],
            displayRangeY[1] - displayRangeY[0]
        ) / 180;
        const margin = Math.round(25 * localSc);
        const xMin = displayRangeX[0] + margin;
        const xMax = displayRangeX[1] - margin;
        const yMin = displayRangeY[0] + margin;
        const yMax = displayRangeY[1] - margin;

        const xSpan = Math.max(20, xMax - xMin);
        const ySpan = Math.max(20, yMax - yMin);
        const cx = (xMin + xMax) / 2;
        const cy = (yMin + yMax) / 2;
        const spanVal = Math.min(xSpan, ySpan);

        // Path types by tier
        let types;
        switch (tier) {
            case 1: types = ['curve', 'sCurve']; break;
            case 2: types = ['wave', 'oscillate', 'arc']; break;
            case 3: types = ['loop', 'figure8', 'spiral']; break;
            default: types = ['longSpiral']; break;
        }
        const pathType = types[Math.floor(Math.random() * types.length)];

        let rawX, rawY;
        const linspace = (a, b, n) => {
            const arr = new Array(n);
            for (let i = 0; i < n; i++) arr[i] = a + (b - a) * (i / (n - 1));
            return arr;
        };

        switch (pathType) {
            case 'curve': {
                const p0 = [xMin + Math.random() * xSpan * 0.1, cy + (Math.random() - 0.5) * ySpan * 0.5];
                const p3 = [xMax - Math.random() * xSpan * 0.1, cy + (Math.random() - 0.5) * ySpan * 0.5];
                const c1 = [cx - xSpan * 0.1 + (Math.random() - 0.5) * xSpan * 0.2,
                            cy + (Math.random() - 0.5) * ySpan * 0.7];
                const c2 = [cx + xSpan * 0.1 + (Math.random() - 0.5) * xSpan * 0.2,
                            cy + (Math.random() - 0.5) * ySpan * 0.7];
                const t = linspace(0, 1, 400);
                rawX = new Array(400);
                rawY = new Array(400);
                for (let i = 0; i < 400; i++) {
                    const ti = t[i];
                    const a = 1 - ti;
                    rawX[i] = a*a*a*p0[0] + 3*a*a*ti*c1[0] + 3*a*ti*ti*c2[0] + ti*ti*ti*p3[0];
                    rawY[i] = a*a*a*p0[1] + 3*a*a*ti*c1[1] + 3*a*ti*ti*c2[1] + ti*ti*ti*p3[1];
                }
                break;
            }
            case 'sCurve': {
                const t = linspace(0, 1, 400);
                rawX = new Array(400);
                rawY = new Array(400);
                for (let i = 0; i < 400; i++) {
                    rawY[i] = yMin + t[i] * ySpan;
                    rawX[i] = cx - Math.sin(t[i] * 2 * Math.PI) * xSpan * 0.38;
                }
                break;
            }
            case 'wave': {
                const t = linspace(0, 1, 500);
                rawX = new Array(500);
                rawY = new Array(500);
                for (let i = 0; i < 500; i++) {
                    rawX[i] = xMin + t[i] * xSpan;
                    rawY[i] = cy + Math.sin(t[i] * 2 * Math.PI * 1.5) * ySpan * 0.35;
                }
                break;
            }
            case 'oscillate': {
                const t = linspace(0, 1, 600);
                rawX = new Array(600);
                rawY = new Array(600);
                for (let i = 0; i < 600; i++) {
                    rawX[i] = xMin + t[i] * xSpan;
                    rawY[i] = cy + Math.sin(t[i] * 2 * Math.PI * 2) * ySpan * 0.35;
                }
                break;
            }
            case 'arc': {
                const arcAngle = Math.PI * (0.6 + Math.random() * 0.5);
                const startAngle = Math.random() * 2 * Math.PI;
                const theta = linspace(startAngle, startAngle + arcAngle, 400);
                const r = spanVal * 0.42;
                rawX = new Array(400);
                rawY = new Array(400);
                for (let i = 0; i < 400; i++) {
                    rawX[i] = cx + r * Math.cos(theta[i]);
                    rawY[i] = cy + r * Math.sin(theta[i]);
                }
                break;
            }
            case 'loop': {
                const theta = linspace(0, 2 * Math.PI, 500);
                const rx = xSpan * 0.40;
                const ry = ySpan * 0.40;
                rawX = new Array(500);
                rawY = new Array(500);
                for (let i = 0; i < 500; i++) {
                    rawX[i] = cx + rx * Math.cos(theta[i]);
                    rawY[i] = cy + ry * Math.sin(theta[i]);
                }
                break;
            }
            case 'figure8': {
                const theta = linspace(0, 2 * Math.PI, 600);
                const rx = xSpan * 0.38;
                const ry = ySpan * 0.38;
                rawX = new Array(600);
                rawY = new Array(600);
                for (let i = 0; i < 600; i++) {
                    rawX[i] = cx + rx * Math.sin(theta[i]);
                    rawY[i] = cy + ry * Math.sin(2 * theta[i]);
                }
                break;
            }
            case 'spiral': {
                const maxR = spanVal * 0.47;
                const minR = corridorWidth * 0.5;
                const minSpacing = corridorWidth * 1.3;
                const maxSafeTurns = Math.max(1, maxR / minSpacing);
                const nTurns = Math.min(1.5 + Math.random() * 0.5, maxSafeTurns);
                const theta = linspace(0, 2 * Math.PI * nTurns, 600);
                const maxTheta = theta[theta.length - 1];
                rawX = new Array(600);
                rawY = new Array(600);
                for (let i = 0; i < 600; i++) {
                    const r = minR + (maxR - minR) * theta[i] / maxTheta;
                    rawX[i] = cx + r * Math.cos(theta[i]);
                    rawY[i] = cy + r * Math.sin(theta[i]);
                }
                break;
            }
            case 'longSpiral': {
                const maxR = spanVal * 0.48;
                const minR = corridorWidth * 0.5;
                const minSpacing = corridorWidth * 1.3;
                const maxSafeTurns = Math.max(1.5, maxR / minSpacing);
                const nTurns = Math.min(2 + Math.random() * 0.5, maxSafeTurns);
                const theta = linspace(0, 2 * Math.PI * nTurns, 700);
                const maxTheta = theta[theta.length - 1];
                rawX = new Array(700);
                rawY = new Array(700);
                for (let i = 0; i < 700; i++) {
                    const r = minR + (maxR - minR) * theta[i] / maxTheta;
                    rawX[i] = cx + r * Math.cos(theta[i]);
                    rawY[i] = cy + r * Math.sin(theta[i]);
                }
                break;
            }
            default: {
                const t = linspace(0, 1, 300);
                rawX = new Array(300);
                rawY = new Array(300);
                for (let i = 0; i < 300; i++) {
                    rawX[i] = xMin + t[i] * xSpan;
                    rawY[i] = cy + Math.sin(t[i] * Math.PI) * ySpan * 0.35;
                }
                break;
            }
        }

        // Random rotation around centroid
        if (applyRotation) {
            const rotAngle = Math.random() * 2 * Math.PI;
            if (rotAngle !== 0) {
                let centX = 0, centY = 0;
                for (let i = 0; i < rawX.length; i++) { centX += rawX[i]; centY += rawY[i]; }
                centX /= rawX.length;
                centY /= rawY.length;
                const cosA = Math.cos(rotAngle);
                const sinA = Math.sin(rotAngle);
                for (let i = 0; i < rawX.length; i++) {
                    const ddx = rawX[i] - centX;
                    const ddy = rawY[i] - centY;
                    rawX[i] = centX + ddx * cosA - ddy * sinA;
                    rawY[i] = centY + ddx * sinA + ddy * cosA;
                }
            }
        }

        // 50% chance to reverse direction
        if (Math.random() > 0.5) {
            rawX.reverse();
            rawY.reverse();
        }

        // Scale to fit within display bounds
        const pad = 5;
        const xLo = displayRangeX[0] + pad;
        const xHi = displayRangeX[1] - pad;
        const yLo = displayRangeY[0] + pad;
        const yHi = displayRangeY[1] - pad;

        let centX2 = 0, centY2 = 0;
        for (let i = 0; i < rawX.length; i++) { centX2 += rawX[i]; centY2 += rawY[i]; }
        centX2 /= rawX.length;
        centY2 /= rawY.length;

        let maxRawX = -Infinity, minRawX = Infinity, maxRawY = -Infinity, minRawY = Infinity;
        for (let i = 0; i < rawX.length; i++) {
            if (rawX[i] > maxRawX) maxRawX = rawX[i];
            if (rawX[i] < minRawX) minRawX = rawX[i];
            if (rawY[i] > maxRawY) maxRawY = rawY[i];
            if (rawY[i] < minRawY) minRawY = rawY[i];
        }
        const extR = maxRawX - centX2;
        const extL = centX2 - minRawX;
        const extD = maxRawY - centY2;
        const extU = centY2 - minRawY;
        const scales = [1, 1, 1, 1];
        if (extR > 0) scales[0] = (xHi - centX2) / extR;
        if (extL > 0) scales[1] = (centX2 - xLo) / extL;
        if (extD > 0) scales[2] = (yHi - centY2) / extD;
        if (extU > 0) scales[3] = (centY2 - yLo) / extU;
        const scaleFactor = Math.min(...scales);
        if (scaleFactor < 1) {
            for (let i = 0; i < rawX.length; i++) {
                rawX[i] = centX2 + (rawX[i] - centX2) * scaleFactor;
                rawY[i] = centY2 + (rawY[i] - centY2) * scaleFactor;
            }
        }
        for (let i = 0; i < rawX.length; i++) {
            rawX[i] = Math.max(xLo, Math.min(xHi, rawX[i]));
            rawY[i] = Math.max(yLo, Math.min(yHi, rawY[i]));
        }

        // Random translation
        if (applyRotation) {
            let maxR2 = -Infinity, minR2 = Infinity, maxD2 = -Infinity, minD2 = Infinity;
            for (let i = 0; i < rawX.length; i++) {
                if (rawX[i] > maxR2) maxR2 = rawX[i];
                if (rawX[i] < minR2) minR2 = rawX[i];
                if (rawY[i] > maxD2) maxD2 = rawY[i];
                if (rawY[i] < minD2) minD2 = rawY[i];
            }
            const maxShiftR = xHi - maxR2;
            const maxShiftL = xLo - minR2;
            const maxShiftD = yHi - maxD2;
            const maxShiftU = yLo - minD2;
            const offX = maxShiftL + Math.random() * (maxShiftR - maxShiftL);
            const offY = maxShiftU + Math.random() * (maxShiftD - maxShiftU);
            for (let i = 0; i < rawX.length; i++) {
                rawX[i] += offX;
                rawY[i] += offY;
            }
        }

        // Resample to uniform ~1px spacing
        const res = FireflyChaseGame.resampleUniform(rawX, rawY);

        return {
            X: res.X,
            Y: res.Y,
            cumDist: res.cumDist,
            totalLen: res.cumDist[res.cumDist.length - 1],
            type: pathType,
            difficulty: tier,
        };
    }

    static resampleUniform(x, y) {
        const n = x.length;
        const segLen = new Array(n - 1);
        const cumLen = new Array(n);
        cumLen[0] = 0;
        for (let i = 0; i < n - 1; i++) {
            segLen[i] = hypot(x[i + 1] - x[i], y[i + 1] - y[i]);
            cumLen[i + 1] = cumLen[i] + segLen[i];
        }
        const totalLen = cumLen[n - 1];
        if (totalLen < 2) {
            return { X: x.slice(), Y: y.slice(), cumDist: cumLen };
        }
        const nPts = Math.max(3, Math.round(totalLen));
        const cumDist = new Array(nPts);
        const X = new Array(nPts);
        const Y = new Array(nPts);
        for (let i = 0; i < nPts; i++) {
            cumDist[i] = (i / (nPts - 1)) * totalLen;
        }
        // Linear interpolation (pchip approximation)
        let seg = 0;
        for (let i = 0; i < nPts; i++) {
            const d = cumDist[i];
            while (seg < n - 2 && cumLen[seg + 1] < d) seg++;
            const segD = cumLen[seg + 1] - cumLen[seg];
            const t = segD > 0 ? (d - cumLen[seg]) / segD : 0;
            X[i] = x[seg] + t * (x[seg + 1] - x[seg]);
            Y[i] = y[seg] + t * (y[seg + 1] - y[seg]);
        }
        return { X, Y, cumDist };
    }

    onKeyPress(key) {
        return false;
    }

    onMouseDown() {
        // No click behavior
    }

    cleanup() {
        this.activeFF = [];
        this.hitEffects.effects = [];
    }

    getResults() {
        return {
            title: 'FIREFLY CHASE',
            lines: [`Caught: ${this.firefliesCaught}`],
        };
    }
}


// ============================================================================
// FLICK IT!
// ============================================================================
class FlickItGame {
    constructor() {
        this.name = 'Flick It!';
        this.score = 0;
        this.combo = 0;
        this.maxCombo = 0;
        this.showHostCombo = false; // game shows its own combo

        // Ball physics
        this.ballPos = [NaN, NaN];
        this.ballVel = [0, 0];
        this.ballRadius = 10;
        this.hitRadius = 22;
        this.friction = 0.9958;
        this.restitution = 0.80;
        this.ballMoving = false;
        this.ballPhase = 0;
        this.flickSpeed = 0;

        // Trail circular buffer
        this.trailBufX = [];
        this.trailBufY = [];
        this.trailIdx = 0;
        this.trailLen = 30;

        // Finger velocity tracking
        this.prevFingerPos = null;
        this.fingerVelBuf = [];
        this.fingerVelIdx = 0;
        this.flickLocked = false;

        // Stats
        this.bounces = 0;
        this.totalBounces = 0;
        this.totalFlicks = 0;
        this.maxSpeed = 0;
        this.lastFlickTime = null;

        // Combo display
        this.comboFadeStart = null;
        this.comboFadeColor = Colors.Green;
        this.comboShowTime = null;
        this.comboText = '';
        this.comboTextPos = [0, 0];
        this.comboTextVisible = false;

        // Display scaling
        this.speedScale = 1;

        this.hitEffects = new HitEffects();
        this.canvas = null;
        this.ctx = null;
        this.displayRange = null;
    }

    init(canvas, ctx, displayRange) {
        this.canvas = canvas;
        this.ctx = ctx;
        this.displayRange = displayRange;
        this.score = 0;
        this.combo = 0;
        this.maxCombo = 0;

        const dx = displayRange.X;
        const dy = displayRange.Y;
        const cx = (dx[0] + dx[1]) / 2;
        const cy = (dy[0] + dy[1]) / 2;

        const areaW = dx[1] - dx[0];
        const areaH = dy[1] - dy[0];
        const minDim = Math.min(areaH, areaW);
        this.ballRadius = Math.max(5, Math.round(minDim * 0.042));
        this.hitRadius = Math.max(10, Math.round(this.ballRadius * 2.2));

        this.speedScale = 180 / minDim;

        this.ballPos = [cx, cy];
        this.ballVel = [0, 0];
        this.ballMoving = false;
        this.bounces = 0;
        this.totalBounces = 0;
        this.totalFlicks = 0;
        this.maxSpeed = 0;
        this.ballPhase = 0;
        this.flickSpeed = 0;
        this.prevFingerPos = null;
        this.fingerVelBuf = [];
        for (let i = 0; i < 5; i++) this.fingerVelBuf.push([0, 0]);
        this.fingerVelIdx = 0;
        this.flickLocked = false;
        this.lastFlickTime = null;
        this.comboFadeStart = null;
        this.comboShowTime = null;
        this.comboTextVisible = false;

        // Trail buffer
        this.trailBufX = new Array(this.trailLen).fill(NaN);
        this.trailBufY = new Array(this.trailLen).fill(NaN);
        this.trailIdx = 0;
    }

    update(mousePos, dt, dtScale) {
        const ctx = this.ctx;
        const ds = dtScale;
        const now = performance.now() / 1000;

        // --- 1. Update finger velocity buffer ---
        if (mousePos && this.prevFingerPos) {
            // Scale velocity by dtScale to normalize across frame rates
            const fvel = [
                (mousePos.x - this.prevFingerPos.x) * (ds > 0 ? ds : 1),
                (mousePos.y - this.prevFingerPos.y) * (ds > 0 ? ds : 1)
            ];
            const writeIdx = this.fingerVelIdx % 5;
            this.fingerVelBuf[writeIdx] = fvel;
            this.fingerVelIdx++;
        }
        this.prevFingerPos = mousePos ? { x: mousePos.x, y: mousePos.y } : null;

        // --- 2. Check for flick ---
        if (mousePos && !isNaN(this.ballPos[0])) {
            const dx = mousePos.x - this.ballPos[0];
            const dy = mousePos.y - this.ballPos[1];
            const distToBall = hypot(dx, dy);
            if (distToBall <= this.hitRadius) {
                if (!this.flickLocked) {
                    const nFilled = Math.min(this.fingerVelIdx, 5);
                    if (nFilled >= 2) {
                        let avgX = 0, avgY = 0;
                        for (let i = 0; i < nFilled; i++) {
                            avgX += this.fingerVelBuf[i][0];
                            avgY += this.fingerVelBuf[i][1];
                        }
                        avgX /= nFilled;
                        avgY /= nFilled;
                        const flickSpd = hypot(avgX, avgY);
                        if (flickSpd >= 3 / this.speedScale) {
                            this.applyFlick(avgX, avgY);
                            this.flickLocked = true;
                        }
                    }
                }
            } else {
                this.flickLocked = false;
            }
        } else {
            this.flickLocked = false;
        }

        // --- 3. Ball physics ---
        if (this.ballMoving) {
            this.stepBallPhysics(dtScale);
        }

        // --- 4. Animation phase ---
        this.ballPhase += 0.0333 * dtScale;

        // --- 5. Combo decay ---
        this.updateComboDecay(now);

        // --- 6. Combo text fade ---
        this.updateComboFade(ctx, now);

        // --- 7. Update graphics ---
        this.renderGraphics(ctx);

        // --- 8. Hit effects ---
        this.hitEffects.update(ctx, dtScale);
    }

    applyFlick(velX, velY) {
        const wasMoving = this.ballMoving;

        // Transfer velocity (1.3x boost)
        this.ballVel = [velX * 1.3, velY * 1.3];
        this.ballMoving = true;
        this.bounces = 0;
        this.totalFlicks++;

        const spd = hypot(this.ballVel[0], this.ballVel[1]);
        this.flickSpeed = spd;
        this.maxSpeed = Math.max(this.maxSpeed, spd);
        this.lastFlickTime = performance.now() / 1000;

        // Combo: re-flicking a moving ball increases combo
        if (wasMoving) {
            this.combo++;
            this.maxCombo = Math.max(this.maxCombo, this.combo);
        } else {
            this.combo = 1;
            this.maxCombo = Math.max(this.maxCombo, 1);
        }

        // Launch points
        const launchPoints = Math.round(spd * this.speedScale * 5 * Math.max(1, this.combo * 0.5));
        this.score += launchPoints;

        // Reset trail
        this.trailBufX.fill(NaN);
        this.trailBufY.fill(NaN);
        this.trailIdx = 0;

        // Visual effects
        const clr = flickSpeedColor(spd * this.speedScale);
        this.hitEffects.spawnHitEffect(this.ballPos[0], this.ballPos[1], clr, launchPoints, this.ballRadius + 5);
        if (this.combo >= 2) {
            this.showComboText(this.ballPos[0], this.ballPos[1] - 20);
        }

        // Clear velocity buffer
        for (let i = 0; i < 5; i++) this.fingerVelBuf[i] = [0, 0];
        this.fingerVelIdx = 0;
    }

    stepBallPhysics(ds) {
        const prePos = [this.ballPos[0], this.ballPos[1]];
        const stepVel = [this.ballVel[0] * ds, this.ballVel[1] * ds];

        // Apply velocity
        this.ballPos[0] += stepVel[0];
        this.ballPos[1] += stepVel[1];

        // Apply air friction
        const frictionFactor = Math.pow(this.friction, ds);
        this.ballVel[0] *= frictionFactor;
        this.ballVel[1] *= frictionFactor;

        // Wall collision — parametric intersection
        const xLim = this.displayRange.X;
        const yLim = this.displayRange.Y;
        let bounced = false;
        let bouncePos = [this.ballPos[0], this.ballPos[1]];
        let bounceNormalX = 0, bounceNormalY = 0;

        // Left wall
        if (this.ballPos[0] < xLim[0] && stepVel[0] !== 0) {
            const tHit = Math.min(1, Math.max(0, (xLim[0] - prePos[0]) / stepVel[0]));
            this.ballPos[1] = prePos[1] + tHit * stepVel[1];
            this.ballPos[0] = xLim[0];
            this.ballVel[0] = -this.ballVel[0] * this.restitution;
            bounced = true;
            bouncePos = [this.ballPos[0], this.ballPos[1]];
            bounceNormalX = 1; bounceNormalY = 0;
        }
        // Right wall
        if (this.ballPos[0] > xLim[1] && stepVel[0] !== 0) {
            const tHit = Math.min(1, Math.max(0, (xLim[1] - prePos[0]) / stepVel[0]));
            this.ballPos[1] = prePos[1] + tHit * stepVel[1];
            this.ballPos[0] = xLim[1];
            this.ballVel[0] = -this.ballVel[0] * this.restitution;
            bounced = true;
            bouncePos = [this.ballPos[0], this.ballPos[1]];
            bounceNormalX = -1; bounceNormalY = 0;
        }
        // Top wall
        if (this.ballPos[1] < yLim[0] && stepVel[1] !== 0) {
            const tHit = Math.min(1, Math.max(0, (yLim[0] - prePos[1]) / stepVel[1]));
            this.ballPos[0] = prePos[0] + tHit * stepVel[0];
            this.ballPos[1] = yLim[0];
            this.ballVel[1] = -this.ballVel[1] * this.restitution;
            bounced = true;
            bouncePos = [this.ballPos[0], this.ballPos[1]];
            bounceNormalX = 0; bounceNormalY = 1;
        }
        // Bottom wall
        if (this.ballPos[1] > yLim[1] && stepVel[1] !== 0) {
            const tHit = Math.min(1, Math.max(0, (yLim[1] - prePos[1]) / stepVel[1]));
            this.ballPos[0] = prePos[0] + tHit * stepVel[0];
            this.ballPos[1] = yLim[1];
            this.ballVel[1] = -this.ballVel[1] * this.restitution;
            bounced = true;
            bouncePos = [this.ballPos[0], this.ballPos[1]];
            bounceNormalX = 0; bounceNormalY = -1;
        }

        if (bounced) {
            this.bounces++;
            this.totalBounces++;

            const spd = hypot(this.ballVel[0], this.ballVel[1]);
            const bouncePoints = Math.round((5 + spd * this.speedScale * 2) * Math.max(1, this.combo * 0.5));
            this.score += bouncePoints;

            this.hitEffects.spawnBounceEffect(
                bouncePos[0], bouncePos[1],
                bounceNormalX, bounceNormalY,
                bouncePoints,
                spd * this.speedScale
            );
        }

        // Track max speed
        const spd = hypot(this.ballVel[0], this.ballVel[1]);
        this.maxSpeed = Math.max(this.maxSpeed, spd);

        // Update trail buffer (record at ~30fps to match MATLAB visual length)
        this.trailAccum = (this.trailAccum || 0) + ds;
        if (this.trailAccum >= 2.0) {
            this.trailAccum -= 2.0;
            const tidx = this.trailIdx % this.trailLen;
            this.trailBufX[tidx] = this.ballPos[0];
            this.trailBufY[tidx] = this.ballPos[1];
            this.trailIdx++;
        }

        // Check if ball stopped
        if (spd < 0.3 / this.speedScale) {
            this.ballVel = [0, 0];
            this.ballMoving = false;
            this.bounces = 0;
            this.flickLocked = false;
            this.trailBufX.fill(NaN);
            this.trailBufY.fill(NaN);
            this.trailIdx = 0;
        }
    }

    renderGraphics(ctx) {
        if (isNaN(this.ballPos[0])) return;

        const bx = this.ballPos[0];
        const by = this.ballPos[1];
        const spd = hypot(this.ballVel[0], this.ballVel[1]);
        const rr = this.ballRadius;
        const clr = flickSpeedColor(spd * this.speedScale);

        // Idle breathing / motion scaling
        let breath, auraScale;
        if (!this.ballMoving) {
            breath = 1 + 0.12 * Math.sin(this.ballPhase);
