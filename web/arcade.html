            auraScale = 1.2 + 0.15 * Math.sin(this.ballPhase * 0.7);
        } else {
            breath = 1;
            auraScale = 1 + Math.min(1.5, spd * 0.08);
        }

        // --- Trail ---
        if (this.ballMoving && this.trailIdx > 0) {
            const nBuf = this.trailLen;
            const writePos = (this.trailIdx - 1) % nBuf;
            const tx = [];
            const ty = [];
            for (let i = 0; i < nBuf; i++) {
                const idx = (writePos - nBuf + 1 + i + nBuf * 2) % nBuf;
                if (!isNaN(this.trailBufX[idx])) {
                    tx.push(this.trailBufX[idx]);
                    ty.push(this.trailBufY[idx]);
                }
            }
            if (tx.length > 1) {
                const trailAlpha = Math.min(0.6, 0.2 + spd * 0.04);
                const trailWidth = Math.min(2.2, 0.8 + spd * 0.08);
                const glowTrailWidth = trailWidth * 3;
                const glowTrailAlpha = trailAlpha * 0.25;

                // Trail glow
                ctx.save();
                ctx.strokeStyle = rgba(clr, glowTrailAlpha);
                ctx.lineWidth = glowTrailWidth;
                ctx.shadowColor = rgba(clr, 0.1);
                ctx.shadowBlur = 6;
                ctx.beginPath();
                ctx.moveTo(tx[0], ty[0]);
                for (let i = 1; i < tx.length; i++) ctx.lineTo(tx[i], ty[i]);
                ctx.stroke();
                ctx.restore();

                // Trail line
                ctx.save();
                ctx.strokeStyle = rgba(clr, trailAlpha);
                ctx.lineWidth = trailWidth;
                ctx.beginPath();
                ctx.moveTo(tx[0], ty[0]);
                for (let i = 1; i < tx.length; i++) ctx.lineTo(tx[i], ty[i]);
                ctx.stroke();
                ctx.restore();
            }
        }

        // --- Outer aura ---
        const auraSize = 54 * auraScale * 0.5;  // Half because we use radius
        const auraAlpha = 0.1 + Math.min(0.2, spd * 0.015);
        ctx.save();
        ctx.shadowColor = rgba(clr, 0.3);
        ctx.shadowBlur = auraSize;
        ctx.fillStyle = rgba(clr, auraAlpha);
        ctx.beginPath();
        ctx.arc(bx, by, auraSize, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        // --- Glow ring ---
        const glowRadius = rr * 2.5 * 0.5;
        const glowAlpha = 0.3 + Math.min(0.5, spd * 0.04);
        ctx.save();
        ctx.shadowColor = rgba(clr, 0.5);
        ctx.shadowBlur = glowRadius * 2;
        ctx.fillStyle = rgba(clr, glowAlpha);
        ctx.beginPath();
        ctx.arc(bx, by, glowRadius, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        // --- Core dot ---
        const coreSize = 20 * breath * 0.5;  // MarkerSize is diameter; use half as radius
        const coreAlpha = Math.min(1, 0.8 + spd * 0.02);
        ctx.save();
        ctx.shadowColor = rgba(clr, 0.8);
        ctx.shadowBlur = coreSize * 2;
        ctx.fillStyle = rgba(Colors.White, coreAlpha);
        ctx.beginPath();
        ctx.arc(bx, by, coreSize, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        // --- Speed/bounce info text ---
        ctx.save();
        ctx.font = 'bold 6.5px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'bottom';
        if (this.ballMoving) {
            ctx.fillStyle = rgba(clr, 0.7);
            ctx.fillText(
                `${Math.round(spd * 10)}  |  ${this.bounces} Bounces`,
                bx, by - rr * breath - 14
            );
        } else {
            const flicker = 0.4 + 0.3 * Math.sin(this.ballPhase * 1.5);
            ctx.fillStyle = rgba(Colors.Cyan, flicker);
            ctx.fillText('Flick Me!', bx, by - rr * breath - 14);
        }
        ctx.restore();
    }

    showComboText(x, y) {
        if (this.combo >= 2) {
            this.comboFadeStart = null;
            this.comboText = `${this.combo}x Combo`;
            this.comboTextPos = [x, y];
            this.comboTextVisible = true;
            this.comboShowTime = performance.now() / 1000;
        } else {
            this.comboFadeStart = performance.now() / 1000;
            this.comboFadeColor = Colors.Green;
        }
    }

    updateComboDecay(now) {
        if (this.combo > 0 && this.lastFlickTime !== null) {
            const comboAge = now - this.lastFlickTime;
            if (comboAge > 2) {
                this.combo = 0;
                this.comboFadeStart = now;
                this.comboFadeColor = Colors.Green;
            } else if (comboAge > 0.5 && this.comboTextVisible) {
                // Pre-reset fade
                const fade = 1 - (comboAge - 0.5) / 1.5;
                this.renderComboText(this.ctx, Math.max(fade, 0));
            }
        }
    }

    updateComboFade(ctx, now) {
        // Auto-trigger fade after 1s display
        if (this.comboShowTime !== null && this.comboFadeStart === null) {
            if (now - this.comboShowTime >= 1.0) {
                this.comboFadeStart = now;
                this.comboFadeColor = Colors.Green;
                this.comboShowTime = null;
            } else if (this.comboTextVisible) {
                this.renderComboText(ctx, 1.0);
            }
        }

        if (this.comboFadeStart === null) return;
        const elapsed = now - this.comboFadeStart;
        const fadeDur = 0.6;
        if (elapsed >= fadeDur) {
            this.comboTextVisible = false;
            this.comboFadeStart = null;
        } else {
            const alphaVal = Math.max(0, 1 - elapsed / fadeDur);
            this.renderComboText(ctx, alphaVal);
        }
    }

    renderComboText(ctx, alpha) {
        if (!this.comboTextVisible || !this.comboText) return;
        ctx.save();
        ctx.font = 'bold 7px sans-serif';
        const clrGreen = [Colors.Green[0] * 0.9, Colors.Green[1] * 0.9, Colors.Green[2] * 0.9];
        ctx.fillStyle = rgba(clrGreen, alpha);
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';
        ctx.fillText(this.comboText, this.comboTextPos[0], this.comboTextPos[1]);
        ctx.restore();
    }

    onKeyPress(key) {
        return false;
    }

    onMouseDown() {
        // No click behavior
    }

    cleanup() {
        this.hitEffects.effects = [];
    }

    getResults() {
        return {
            title: 'FLICK IT!',
            lines: [
                `Flicks: ${this.totalFlicks}  |  Bounces: ${this.totalBounces}  |  Max Speed: ${Math.round(this.maxSpeed * 10)}`
            ],
        };
    }
}


// ============================================================================
// JUGGLER
// ============================================================================
class JugglerGame {
    constructor() {
        this.name = 'Juggler';
        this.score = 0;
        this.combo = 0;
        this.maxCombo = 0;
        this.startTime = 0;

        // Main ball
        this.ballPos = [NaN, NaN];
        this.ballVel = [0, 0];
        this.ballRadius = 10;
        this.hitRadius = 22;
        this.gravity = 0.0625;
        this.friction = 0.9992;
        this.restitution = 0.75;
        this.ballPhase = 0;

        // Finger tracking
        this.prevFingerPos = null;
        this.fingerVelBuf = [];
        this.fingerVelIdx = 0;
        this.flickLocked = false;
        this.lastFlickTime = 0;

        // Trail
        this.trailBufX = [];
        this.trailBufY = [];
        this.trailIdx = 0;
        this.trailLen = 30;

        // Display scaling
        this.speedScale = 1;

        // Stats
        this.bounces = 0;
        this.flicks = 0;
        this.ballFlicks = 0;
        this.bestStreak = 0;
        this.maxSpeed = 0;
        this.drops = 0;

        // Extra balls
        this.extraBalls = [];

        this.hitEffects = new HitEffects();
        this.canvas = null;
        this.ctx = null;
        this.displayRange = null;
    }

    init(canvas, ctx, displayRange) {
        this.canvas = canvas;
        this.ctx = ctx;
        this.displayRange = displayRange;
        this.score = 0;
        this.combo = 0;
        this.maxCombo = 0;
        this.startTime = performance.now() / 1000;

        const dx = displayRange.X;
        const dy = displayRange.Y;
        const cx = (dx[0] + dx[1]) / 2;
        const cy = (dy[0] + dy[1]) / 2;

        const areaH = dy[1] - dy[0];
        const areaW = dx[1] - dx[0];
        this.gravity = Math.max(0.021, areaH * 0.000417);
        this.ballRadius = Math.max(5, Math.round(Math.min(areaH, areaW) * 0.042));
        this.hitRadius = Math.max(10, Math.round(this.ballRadius * 2.2));
        this.speedScale = 180 / Math.min(areaW, areaH);

        this.ballPos = [cx, cy * 0.7];
        this.ballVel = [0, 0];
        this.bounces = 0;
        this.flicks = 0;
        this.ballFlicks = 0;
        this.bestStreak = 0;
        this.drops = 0;
        this.maxSpeed = 0;
        this.ballPhase = 0;
        this.prevFingerPos = null;
        this.fingerVelBuf = [];
        for (let i = 0; i < 5; i++) this.fingerVelBuf.push([0, 0]);
        this.fingerVelIdx = 0;
        this.flickLocked = false;
        this.lastFlickTime = performance.now() / 1000;

        this.trailBufX = new Array(this.trailLen).fill(NaN);
        this.trailBufY = new Array(this.trailLen).fill(NaN);
        this.trailIdx = 0;

        this.extraBalls = [];
    }

    update(mousePos, dt, dtScale) {
        const ctx = this.ctx;
        const ds = dtScale;
        const dx = this.displayRange.X;
        const dy = this.displayRange.Y;
        const now = performance.now() / 1000;

        // --- 1. Finger velocity buffer ---
        if (mousePos && this.prevFingerPos) {
            // Scale velocity by dtScale to normalize across frame rates
            const fvel = [
                (mousePos.x - this.prevFingerPos.x) * (ds > 0 ? ds : 1),
                (mousePos.y - this.prevFingerPos.y) * (ds > 0 ? ds : 1)
            ];
            const bufIdx = this.fingerVelIdx % 5;
            this.fingerVelBuf[bufIdx] = fvel;
            this.fingerVelIdx++;
        }
        this.prevFingerPos = mousePos ? { x: mousePos.x, y: mousePos.y } : null;

        // --- 2. Average finger velocity ---
        const nFilled = Math.min(this.fingerVelIdx, 5);
        let avgVelX = 0, avgVelY = 0;
        if (nFilled >= 1) {
            for (let i = 0; i < nFilled; i++) {
                avgVelX += this.fingerVelBuf[i][0];
                avgVelY += this.fingerVelBuf[i][1];
            }
            avgVelX /= nFilled;
            avgVelY /= nFilled;
        }

        // --- 3. Main ball contact detection ---
        if (mousePos && !isNaN(this.ballPos[0])) {
            const distToBall = hypot(mousePos.x - this.ballPos[0], mousePos.y - this.ballPos[1]);
            const inside = distToBall <= this.hitRadius;
            if (inside && !this.flickLocked) {
                this.flickBall(avgVelX, avgVelY);
                this.flickLocked = true;
                this.lastFlickTime = now;
            } else if (!inside && this.flickLocked && (now - this.lastFlickTime) > 0.15) {
                this.flickLocked = false;
            }
        } else {
            this.flickLocked = false;
        }

        // --- 4. Gravity ---
        const ds = dtScale;
        this.ballVel[1] += this.gravity * ds;

        // --- 5. Move ball ---
        const prePos = [this.ballPos[0], this.ballPos[1]];
        const stepVel = [this.ballVel[0] * ds, this.ballVel[1] * ds];
        this.ballPos[0] += stepVel[0];
        this.ballPos[1] += stepVel[1];
        this.ballVel[0] *= Math.pow(this.friction, ds);
        this.ballVel[1] *= Math.pow(this.friction, ds);

        // --- 6. Wall collisions: TOP, LEFT, RIGHT only ---
        let bounced = false;
        let bouncePos = [this.ballPos[0], this.ballPos[1]];
        let bounceNormalX = 0, bounceNormalY = 0;

        // Top wall
        if (this.ballPos[1] < dy[0] && stepVel[1] !== 0) {
            const tContact = Math.min(1, Math.max(0, (dy[0] - prePos[1]) / stepVel[1]));
            this.ballPos[0] = prePos[0] + tContact * stepVel[0];
            this.ballPos[1] = dy[0];
            this.ballVel[1] = -this.ballVel[1] * this.restitution;
            bounced = true;
            bouncePos = [this.ballPos[0], this.ballPos[1]];
            bounceNormalX = 0; bounceNormalY = 1;
        }
        // Left wall
        if (this.ballPos[0] < dx[0] && stepVel[0] !== 0) {
            const tContact = Math.min(1, Math.max(0, (dx[0] - prePos[0]) / stepVel[0]));
            this.ballPos[1] = prePos[1] + tContact * stepVel[1];
            this.ballPos[0] = dx[0];
            this.ballVel[0] = -this.ballVel[0] * this.restitution;
            bounced = true;
            bouncePos = [this.ballPos[0], this.ballPos[1]];
            bounceNormalX = 1; bounceNormalY = 0;
        }
        // Right wall
        if (this.ballPos[0] > dx[1] && stepVel[0] !== 0) {
            const tContact = Math.min(1, Math.max(0, (dx[1] - prePos[0]) / stepVel[0]));
            this.ballPos[1] = prePos[1] + tContact * stepVel[1];
            this.ballPos[0] = dx[1];
            this.ballVel[0] = -this.ballVel[0] * this.restitution;
            bounced = true;
            bouncePos = [this.ballPos[0], this.ballPos[1]];
            bounceNormalX = -1; bounceNormalY = 0;
        }

        if (bounced) {
            this.bounces++;
            const bspd = hypot(this.ballVel[0], this.ballVel[1]);
            this.hitEffects.spawnBounceEffect(bouncePos[0], bouncePos[1], bounceNormalX, bounceNormalY, 0, bspd * this.speedScale);
        }

        // --- 7. Extra ball physics + contact ---
        this.updateExtraBalls(mousePos, avgVelX, avgVelY, ds, now);

        // --- 8. Bottom edge = main ball dropped ---
        if (this.ballPos[1] > dy[1] + this.ballRadius) {
            this.bestStreak = Math.max(this.bestStreak, this.ballFlicks);
            this.hitEffects.spawnHitEffect(this.ballPos[0], this.ballPos[1], Colors.Red, 0);
            this.combo = 0;
            this.drops++;

            if (this.extraBalls.length > 0) {
                // Promote first extra ball to main
                const eb = this.extraBalls[0];
                this.ballPos = [eb.pos[0], eb.pos[1]];
                this.ballVel = [eb.vel[0], eb.vel[1]];
                this.trailBufX = eb.trailBufX.slice();
                this.trailBufY = eb.trailBufY.slice();
                this.trailIdx = eb.trailIdx;
                this.flickLocked = eb.locked;
                this.ballFlicks = eb.flicks;
                this.extraBalls.splice(0, 1);
            } else {
                // No balls left — respawn at center top
                this.ballPos = [(dx[0] + dx[1]) / 2, dy[0] + (dy[1] - dy[0]) * 0.3];
                this.ballVel = [0, 0];
                this.trailBufX.fill(NaN);
                this.trailBufY.fill(NaN);
                this.trailIdx = 0;
                this.flickLocked = false;
                this.ballFlicks = 0;
            }
        }

        // --- 9. Stats ---
        const ballSpeed = hypot(this.ballVel[0], this.ballVel[1]);
        this.maxSpeed = Math.max(this.maxSpeed, ballSpeed);

        // --- 10. Trail buffer (record at ~30fps to match MATLAB) ---
        this.trailAccum = (this.trailAccum || 0) + ds;
        if (this.trailAccum >= 2.0) {
            this.trailAccum -= 2.0;
            const tidx = this.trailIdx % this.trailLen;
            this.trailBufX[tidx] = this.ballPos[0];
            this.trailBufY[tidx] = this.ballPos[1];
            this.trailIdx++;
        }

        // --- 11. Animation + render ---
        this.ballPhase += 0.0333 * ds;
        this.renderBall(ctx, this.ballPos, this.ballVel, this.trailBufX, this.trailBufY, this.trailIdx, this.ballFlicks);

        // --- 12. Danger line pulse ---
        this.renderDangerLine(ctx);

        // --- 13. Render extra balls ---
        for (const eb of this.extraBalls) {
            this.renderBall(ctx, eb.pos, eb.vel, eb.trailBufX, eb.trailBufY, eb.trailIdx, eb.flicks);
        }

        // --- 14. Hit effects ---
        this.hitEffects.update(ctx, dtScale);
    }

    flickBall(avgVelX, avgVelY) {
        const fingerSpeed = hypot(avgVelX, avgVelY);
        if (fingerSpeed > 1.0 / this.speedScale) {
            // Active flick
            this.ballVel = [avgVelX * 1.3, avgVelY * 1.3];
        } else {
            // Natural bounce
            let bounceVy = -Math.abs(this.ballVel[1]) * this.restitution;
            const minBounce = -this.gravity * 20;
            this.ballVel[1] = Math.min(bounceVy, minBounce);
            this.ballVel[0] *= 0.8;
        }
        const hitSpeed = hypot(this.ballVel[0], this.ballVel[1]);

        // Clear trail
        this.trailBufX.fill(NaN);
        this.trailBufY.fill(NaN);
        this.trailIdx = 0;

        this.ballFlicks++;
        this.scoreFlick(this.ballPos[0], this.ballPos[1], hitSpeed);

        // Reset finger velocity buffer
        for (let i = 0; i < 5; i++) this.fingerVelBuf[i] = [0, 0];
        this.fingerVelIdx = 0;
    }

    scoreFlick(hitX, hitY, hitSpeed) {
        this.flicks++;
        this.maxSpeed = Math.max(this.maxSpeed, hitSpeed);

        this.combo++;
        this.maxCombo = Math.max(this.maxCombo, this.combo);

        // Spawn extra ball at every multiple of 10 combo
        if (this.combo >= 10 && this.combo % 10 === 0) {
            this.spawnExtraBall();
        }

        const flickPoints = Math.round((20 + hitSpeed * 3) * Math.max(1, this.combo * 0.5));
        this.score += flickPoints;

        const clr = flickSpeedColor(hitSpeed * this.speedScale);
        this.hitEffects.spawnHitEffect(hitX, hitY + 4, clr, flickPoints, this.ballRadius + 5);
    }

    spawnExtraBall() {
        const dx = this.displayRange.X;
        const dy = this.displayRange.Y;
        const xPos = dx[0] + Math.random() * (dx[1] - dx[0]);
        const yPos = dy[0] + (dy[1] - dy[0]) * 0.25 * Math.random();

        this.extraBalls.push({
            pos: [xPos, yPos],
            vel: [0, 0],
            locked: false,
            flicks: 0,
            trailBufX: new Array(this.trailLen).fill(NaN),
            trailBufY: new Array(this.trailLen).fill(NaN),
            trailIdx: 0,
        });
    }

    updateExtraBalls(fingerPos, avgVelX, avgVelY, ds, now) {
        const dx = this.displayRange.X;
        const dy = this.displayRange.Y;
        const r = this.ballRadius;

        for (let bi = this.extraBalls.length - 1; bi >= 0; bi--) {
            const eb = this.extraBalls[bi];

            // Contact detection
            if (fingerPos) {
                const distToExtra = hypot(fingerPos.x - eb.pos[0], fingerPos.y - eb.pos[1]);
                if (distToExtra <= this.hitRadius) {
                    if (!eb.locked) {
                        const fspeed = hypot(avgVelX, avgVelY);
                        if (fspeed > 1.0 / this.speedScale) {
                            eb.vel = [avgVelX * 1.3, avgVelY * 1.3];
                        } else {
                            let bounceVy = -Math.abs(eb.vel[1]) * this.restitution;
                            const minBounce = -this.gravity * 20;
                            eb.vel[1] = Math.min(bounceVy, minBounce);
                            eb.vel[0] *= 0.8;
                        }
                        const extraSpeed = hypot(eb.vel[0], eb.vel[1]);
                        eb.flicks++;
                        this.scoreFlick(eb.pos[0], eb.pos[1], extraSpeed);
                        eb.trailBufX.fill(NaN);
                        eb.trailBufY.fill(NaN);
                        eb.trailIdx = 0;
                        eb.locked = true;
                    }
                } else {
                    eb.locked = false;
                }
            } else {
                eb.locked = false;
            }

            // Gravity
            eb.vel[1] += this.gravity * ds;

            // Move
            eb.pos[0] += eb.vel[0] * ds;
            eb.pos[1] += eb.vel[1] * ds;
            eb.vel[0] *= Math.pow(this.friction, ds);
            eb.vel[1] *= Math.pow(this.friction, ds);

            // Wall collisions (top, left, right)
            if (eb.pos[1] < dy[0]) {
                eb.pos[1] = dy[0];
                eb.vel[1] = -eb.vel[1] * this.restitution;
            }
            if (eb.pos[0] < dx[0]) {
                eb.pos[0] = dx[0];
                eb.vel[0] = -eb.vel[0] * this.restitution;
            }
            if (eb.pos[0] > dx[1]) {
                eb.pos[0] = dx[1];
                eb.vel[0] = -eb.vel[0] * this.restitution;
            }

            // Bottom drop
            if (eb.pos[1] > dy[1] + r) {
                this.bestStreak = Math.max(this.bestStreak, eb.flicks);
                this.hitEffects.spawnHitEffect(eb.pos[0], eb.pos[1], Colors.Red, 0);
                this.combo = 0;
                this.drops++;
                this.extraBalls.splice(bi, 1);
                continue;
            }

            // Trail buffer
            const tidx = eb.trailIdx % this.trailLen;
            eb.trailBufX[tidx] = eb.pos[0];
            eb.trailBufY[tidx] = eb.pos[1];
            eb.trailIdx++;
        }
    }

    renderBall(ctx, pos, vel, trailBufX, trailBufY, trailIdx, flicks) {
        if (isNaN(pos[0])) return;
        const bx = pos[0];
        const by = pos[1];
        const ballSpeed = hypot(vel[0], vel[1]);
        const r = this.ballRadius;
        const clr = flickSpeedColor(ballSpeed * this.speedScale);

        // Trail
        if (trailIdx > 0) {
            const n = this.trailLen;
            const writePos = ((trailIdx - 1) % n + n) % n;
            const tx = [];
            const ty = [];
            for (let i = 0; i < n; i++) {
                const idx = (writePos - n + 1 + i + n * 2) % n;
                if (!isNaN(trailBufX[idx])) {
                    tx.push(trailBufX[idx]);
                    ty.push(trailBufY[idx]);
                }
            }
            if (tx.length > 1) {
                const trailAlpha = Math.min(0.6, 0.2 + ballSpeed * 0.04);
                const trailWidth = Math.min(2.2, 0.8 + ballSpeed * 0.08);

                // Trail glow
                ctx.save();
                ctx.strokeStyle = rgba(clr, trailAlpha * 0.25);
                ctx.lineWidth = trailWidth * 3;
                ctx.shadowColor = rgba(clr, 0.1);
                ctx.shadowBlur = 6;
                ctx.beginPath();
                ctx.moveTo(tx[0], ty[0]);
                for (let i = 1; i < tx.length; i++) ctx.lineTo(tx[i], ty[i]);
                ctx.stroke();
                ctx.restore();

                // Trail line
                ctx.save();
                ctx.strokeStyle = rgba(clr, trailAlpha);
                ctx.lineWidth = trailWidth;
                ctx.beginPath();
                ctx.moveTo(tx[0], ty[0]);
                for (let i = 1; i < tx.length; i++) ctx.lineTo(tx[i], ty[i]);
                ctx.stroke();
                ctx.restore();
            }
        }

        // Aura
        const auraScale = 1 + Math.min(1.5, ballSpeed * 0.08);
        const auraSize = 54 * auraScale * 0.5;
        ctx.save();
        ctx.shadowColor = rgba(clr, 0.3);
        ctx.shadowBlur = auraSize;
        ctx.fillStyle = rgba(clr, 0.12);
        ctx.beginPath();
        ctx.arc(bx, by, auraSize, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        // Glow ring
        const glowRadius = r * 2.5 * 0.5;
        ctx.save();
        ctx.shadowColor = rgba(clr, 0.5);
        ctx.shadowBlur = glowRadius * 2;
        ctx.fillStyle = rgba(clr, 0.4);
        ctx.beginPath();
        ctx.arc(bx, by, glowRadius, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        // Core dot
        const coreSize = 20 * 0.5;
        ctx.save();
        ctx.shadowColor = rgba(clr, 0.8);
        ctx.shadowBlur = coreSize * 2;
        ctx.fillStyle = rgba(Colors.White, 1);
        ctx.beginPath();
        ctx.arc(bx, by, coreSize, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        // Info text
        const elapsed = (performance.now() / 1000) - this.startTime;
        ctx.save();
        ctx.font = 'bold 6.5px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'bottom';
        ctx.fillStyle = rgba(clr, 0.7);
        ctx.fillText(`${elapsed.toFixed(1)}s  |  ${flicks} flicks`, bx, by - r - 14);
        ctx.restore();
    }

    renderDangerLine(ctx) {
        const dx = this.displayRange.X;
        const dy = this.displayRange.Y;
        const dangerY = dy[1] - 5;

        if (!isNaN(this.ballPos[0])) {
            const proximity = (this.ballPos[1] - dy[0]) / (dy[1] - dy[0]);
            let pulseAlpha = 0.1 + 0.5 * Math.max(0, Math.min(1, (proximity - 0.5) / 0.5));
            pulseAlpha += 0.08 * Math.sin(this.ballPhase * 3);
            pulseAlpha = Math.max(0, Math.min(1, pulseAlpha));

            ctx.save();
            ctx.strokeStyle = rgba(Colors.Red, pulseAlpha);
            ctx.lineWidth = 1.1;
            ctx.setLineDash([6, 4]);
            ctx.beginPath();
            ctx.moveTo(dx[0], dangerY);
            ctx.lineTo(dx[1], dangerY);
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.restore();
        }
    }

    onKeyPress(key) {
        return false;
    }

    onMouseDown() {
        // No click behavior
    }

    cleanup() {
        this.extraBalls = [];
        this.hitEffects.effects = [];
    }

    getResults() {
        const bestStreak = Math.max(this.bestStreak, this.ballFlicks);
        return {
            title: 'JUGGLER',
            lines: [
                `Total Flicks: ${this.flicks}  |  Best Flick Streak: ${bestStreak}`
            ],
        };
    }
}

class OrbitalDefenseGame {
    constructor() {
        this.name = "Orbital Defense";
        this.score = 0;
        this.combo = 0;
        this.maxCombo = 0;
        this.isRunning = false;
        this.hitFx = new HitEffectsPool();
    }

    init(canvas, ctx, displayRange) {
        this.canvas = canvas;
        this.ctx = ctx;
        this.dr = displayRange; // {x:[0,854], y:[0,480]}
        this.score = 0;
        this.combo = 0;
        this.maxCombo = 0;
        this.isRunning = true;
        this.startTime = performance.now();
        this.hitFx = new HitEffectsPool();

        const areaW = displayRange.x[1] - displayRange.x[0];
        const areaH = displayRange.y[1] - displayRange.y[0];
        this.Sc = Math.min(areaW, areaH) / 180;
        this.tierRadii = [15, 10, 5].map(r => Math.round(r * this.Sc));

        this.wave = 1;
        this.lives = 3;
        this.fireCD = 0;

        this.basePos = [areaW / 2 + displayRange.x[0], areaH / 2 + displayRange.y[0]];
        this.baseRadius = Math.max(8, Math.round(Math.min(areaW, areaH) * 0.035));

        // Hex shape
        this.hexX = [];
        this.hexY = [];
        for (let i = 0; i <= 6; i++) {
            const th = i * Math.PI * 2 / 6;
            this.hexX.push(this.basePos[0] + this.baseRadius * Math.cos(th));
            this.hexY.push(this.basePos[1] + this.baseRadius * Math.sin(th));
        }

        // Circle 24 points (precomputed)
        this.cos24 = [];
        this.sin24 = [];
        for (let i = 0; i < 24; i++) {
            const th = i * 2 * Math.PI / 23;
            this.cos24.push(Math.cos(th));
            this.sin24.push(Math.sin(th));
        }

        // Pools
        this.interceptors = [];  // {x, y, tx, ty, speed, active}
        this.explosions = [];    // {x, y, radius, maxRadius, phase, active}
        this.asteroids = [];     // {x, y, vx, vy, radius, tier, angle, spin, shapeX, shapeY, active}

        // Crosshair pos
        this.crossPos = [NaN, NaN];

        // Flash timers
        this.livesFlashStart = null;
        this.waveFlashStart = null;

        // Spawn first wave
        this.spawnWave(this.wave);
        this.showWave(this.wave);
    }

    update(mousePos, dt, dtScale) {
        if (!this.isRunning) return;
        const ctx = this.ctx;
        const dr = this.dr;
        const ds = dtScale;
        const dx = dr.x;
        const dy = dr.y;
        const areaW = dx[1] - dx[0];
        const areaH = dy[1] - dy[0];

        // --- Clear ---
        ctx.fillStyle = rgb(Colors.Bg);
        ctx.fillRect(dx[0], dy[0], areaW, areaH);

        // --- Update crosshair ---
        if (mousePos && !isNaN(mousePos[0]) && !isNaN(mousePos[1])) {
            this.crossPos = [mousePos[0], mousePos[1]];

            const distToBase = Math.hypot(mousePos[0] - this.basePos[0], mousePos[1] - this.basePos[1]);
            this.fireCD += ds;
            if (this.fireCD >= 36 && distToBase > this.baseRadius) {
                this.fireCD = 0;
                const intSpeed = Math.max(1.667, (dy[1] - dy[0]) * 0.0208);
                if (this.interceptors.length < 10) {
                    this.interceptors.push({
                        x: this.basePos[0], y: this.basePos[1],
                        ox: this.basePos[0], oy: this.basePos[1],
                        tx: mousePos[0], ty: mousePos[1],
                        speed: intSpeed, active: true,
                    });
                } else {
                    // Reuse inactive slot
                    for (let i = 0; i < this.interceptors.length; i++) {
                        if (!this.interceptors[i].active) {
                            const int = this.interceptors[i];
                            int.x = this.basePos[0]; int.y = this.basePos[1];
                            int.ox = this.basePos[0]; int.oy = this.basePos[1];
                            int.tx = mousePos[0]; int.ty = mousePos[1];
                            int.speed = intSpeed; int.active = true;
                            break;
                        }
                    }
                }
            }
        }

        // --- Move interceptors ---
        for (let i = this.interceptors.length - 1; i >= 0; i--) {
            const int = this.interceptors[i];
            if (!int.active) continue;
            const ddx = int.tx - int.x;
            const ddy = int.ty - int.y;
            const dist = Math.hypot(ddx, ddy);
            if (dist < int.speed * ds) {
                this.spawnExplosion(int.tx, int.ty);
                int.active = false;
                continue;
            }
            const nx = ddx / dist;
            const ny = ddy / dist;
            int.x += nx * int.speed * ds;
            int.y += ny * int.speed * ds;

            if (int.x < dx[0] - 20 || int.x > dx[1] + 20 ||
                int.y < dy[0] - 20 || int.y > dy[1] + 20) {
                int.active = false;
            }
        }

        // --- Move asteroids ---
        for (const ast of this.asteroids) {
            if (!ast.active) continue;
            ast.x += ast.vx * ds;
            ast.y += ast.vy * ds;
            ast.angle += ast.spin * ds;

            const margin = ast.radius;
            if (ast.x < dx[0] - margin) ast.x = dx[1] + margin;
            if (ast.x > dx[1] + margin) ast.x = dx[0] - margin;
            if (ast.y < dy[0] - margin) ast.y = dy[1] + margin;
            if (ast.y > dy[1] + margin) ast.y = dy[0] - margin;
        }

        // --- Update explosions + chain reaction ---
        for (let ei = this.explosions.length - 1; ei >= 0; ei--) {
            const exp = this.explosions[ei];
            if (!exp.active) continue;

            if (exp.phase === 1) {
                exp.radius += exp.maxRadius * 0.0417 * ds;
                if (exp.radius >= exp.maxRadius) exp.phase = 2;
            } else {
                exp.radius -= exp.maxRadius * 0.0333 * ds;
            }

            // Chain explosion: destroy asteroids in blast
            for (let ai = this.asteroids.length - 1; ai >= 0; ai--) {
                const ast = this.asteroids[ai];
                if (!ast.active) continue;
                const d = Math.hypot(ast.x - exp.x, ast.y - exp.y);
                if (d < exp.radius + ast.radius) {
                    const pts = Math.round(300 / ast.radius * 10);
                    this.addScore(pts);
                    this.incrementCombo();

                    // Split into next tier
                    const nextTier = ast.tier + 1;
                    if (nextTier <= 3) {
                        for (let s = 0; s < 2; s++) {
                            const sAngle = Math.random() * 2 * Math.PI;
                            const sSpeed = Math.hypot(ast.vx, ast.vy) * (1.2 + Math.random() * 0.5);
                            this.createAsteroid(ast.x, ast.y,
                                sSpeed * Math.cos(sAngle), sSpeed * Math.sin(sAngle),
                                this.tierRadii[nextTier - 1], nextTier);
                        }
                    }
                    this.spawnExplosion(ast.x, ast.y);
                    ast.active = false;
                }
            }

            if (exp.radius <= 0) exp.active = false;
        }

        // --- Asteroid-base collision ---
        for (let ai = this.asteroids.length - 1; ai >= 0; ai--) {
            const ast = this.asteroids[ai];
            if (!ast.active) continue;
            const d = Math.hypot(ast.x - this.basePos[0], ast.y - this.basePos[1]);
            if (d < ast.radius + this.baseRadius) {
                this.lives--;
                this.resetCombo();
                this.livesFlashStart = performance.now();
                this.hitFx.spawnBounce(ast.x, ast.y, 0, -1, 0, 12, this.Sc);
                ast.active = false;
                if (this.lives <= 0) {
                    this.isRunning = false;
                    this._drawFrame(ctx, dx, dy, areaW, areaH, ds);
                    return;
                }
            }
        }

        // --- Wave cleared? ---
        if (!this.asteroids.some(a => a.active)) {
            this.wave++;
            this.addScore(200 * this.wave);
            this.spawnWave(this.wave);
            this.showWave(this.wave);
        }

        // --- Update hit effects ---
        this.hitFx.update(ds);

        // --- DRAW ---
        this._drawFrame(ctx, dx, dy, areaW, areaH, ds);
    }

    _drawFrame(ctx, dx, dy, areaW, areaH, ds) {
        const sc = this.Sc;
        // --- Draw base glow ---
        const grad = ctx.createRadialGradient(
            this.basePos[0], this.basePos[1], 0,
            this.basePos[0], this.basePos[1], this.baseRadius * 4);
        grad.addColorStop(0, rgb(Colors.Cyan, 0.15));
        grad.addColorStop(1, rgb(Colors.Cyan, 0));
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(this.basePos[0], this.basePos[1], this.baseRadius * 4, 0, Math.PI * 2);
        ctx.fill();

        // --- Draw base hex ---
        ctx.beginPath();
        ctx.moveTo(this.hexX[0], this.hexY[0]);
        for (let i = 1; i < this.hexX.length; i++) ctx.lineTo(this.hexX[i], this.hexY[i]);
        ctx.closePath();
        ctx.fillStyle = rgb(Colors.Cyan, 0.25);
        ctx.fill();
        ctx.strokeStyle = rgb(Colors.Cyan);
        ctx.lineWidth = 1.1;
        ctx.stroke();

        // --- Draw asteroids ---
        const tierColors = [Colors.Silver, Colors.Gold, Colors.Red];
        for (const ast of this.asteroids) {
            if (!ast.active) continue;
            const rockColor = tierColors[Math.min(ast.tier - 1, 2)];
            // Rotate shape
            const cosA = Math.cos(ast.angle);
            const sinA = Math.sin(ast.angle);
            ctx.beginPath();
            for (let i = 0; i < ast.shapeX.length; i++) {
                const rx = ast.shapeX[i] * cosA - ast.shapeY[i] * sinA;
                const ry = ast.shapeX[i] * sinA + ast.shapeY[i] * cosA;
                if (i === 0) ctx.moveTo(ast.x + rx, ast.y + ry);
                else ctx.lineTo(ast.x + rx, ast.y + ry);
            }
            ctx.closePath();
            ctx.fillStyle = rgb(rockColor, 0.20);
            ctx.fill();
            ctx.strokeStyle = rgb(rockColor);
            ctx.lineWidth = 0.8;
            ctx.stroke();
        }

        // --- Draw explosions ---
        for (const exp of this.explosions) {
            if (!exp.active) continue;
            // Glow
            ctx.beginPath();
            ctx.arc(exp.x, exp.y, exp.radius * 1.3, 0, Math.PI * 2);
            ctx.fillStyle = rgb(Colors.Orange, 0.1);
            ctx.fill();
            // Core
            ctx.beginPath();
            ctx.arc(exp.x, exp.y, exp.radius, 0, Math.PI * 2);
            ctx.fillStyle = rgb(Colors.Orange, 0.4);
            ctx.fill();
            ctx.strokeStyle = rgb(Colors.Gold);
            ctx.lineWidth = 0.5;
            ctx.stroke();
        }

        // --- Draw interceptors ---
        for (const int of this.interceptors) {
            if (!int.active) continue;
            ctx.beginPath();
            ctx.moveTo(int.ox, int.oy);
            ctx.lineTo(int.x, int.y);
            ctx.strokeStyle = rgb(Colors.Cyan);
            ctx.lineWidth = 0.5;
            ctx.stroke();
        }

        // --- Draw crosshair ---
        if (!isNaN(this.crossPos[0])) {
            const cx = this.crossPos[0];
            const cy = this.crossPos[1];
            const crSize = Math.round(5 * sc);

            // Gold cross glow
            ctx.save();
            ctx.shadowColor = rgb(Colors.Gold, 0.5);
            ctx.shadowBlur = 6;
            ctx.strokeStyle = rgb(Colors.Gold, 0.3);
            ctx.lineWidth = 1.6;
            ctx.beginPath();
            ctx.moveTo(cx - crSize, cy); ctx.lineTo(cx + crSize, cy);
            ctx.moveTo(cx, cy - crSize); ctx.lineTo(cx, cy + crSize);
            ctx.stroke();
            ctx.restore();

            // Gold cross thin
            ctx.strokeStyle = rgb(Colors.Gold);
            ctx.lineWidth = 0.5;
            ctx.beginPath();
            ctx.moveTo(cx - crSize, cy); ctx.lineTo(cx + crSize, cy);
            ctx.moveTo(cx, cy - crSize); ctx.lineTo(cx, cy + crSize);
            ctx.stroke();

            // Red dot (outer ring)
            ctx.beginPath();
            ctx.arc(cx, cy, Math.sqrt(6000 / Math.PI) * 0.15, 0, Math.PI * 2);
            ctx.strokeStyle = 'red';
            ctx.lineWidth = 0.8;
            ctx.stroke();
        }

        // --- Lives flash ---
        if (this.livesFlashStart !== null) {
            const el = (performance.now() - this.livesFlashStart) / 1000;
            if (el < 1.0) {
                let alpha = 1;
                if (el >= 0.6) alpha = Math.max(0, 1 - (el - 0.6) / 0.4);
                ctx.fillStyle = rgb(Colors.Red, alpha);
                ctx.font = `bold ${Math.round(26 * this.Sc / 2.67)}px sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(`Lives: ${this.lives}`,
                    this.basePos[0], this.basePos[1] + (dy[1] - dy[0]) * 0.2);
            } else {
                this.livesFlashStart = null;
            }
        }

        // --- Wave flash ---
        if (this.waveFlashStart !== null) {
            const el = (performance.now() - this.waveFlashStart) / 1000;
            if (el < 1.7) {
                let alpha = 1;
                if (el >= 1.2) alpha = Math.max(0, 1 - (el - 1.2) / 0.5);
                ctx.fillStyle = rgb(Colors.Gold, alpha);
                ctx.font = `bold ${Math.round(21 * this.Sc / 2.67)}px sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(`Wave ${this.wave}`,
                    this.basePos[0], this.basePos[1] - (dy[1] - dy[0]) * 0.2);
            } else {
                this.waveFlashStart = null;
            }
        }

        // --- Draw hit effects ---
        this.hitFx.draw(ctx);
    }

    onKeyPress(key) { return false; }
    onMouseDown() {}
    cleanup() { this.isRunning = false; }

    getResults() {
        return {
            title: "ORBITAL DEFENSE",
            lines: [`Wave: ${this.wave}  |  Lives: ${this.lives}`],
        };
    }

    // --- Private helpers ---
    addScore(pts) { this.score += pts; }
    incrementCombo() { this.combo++; this.maxCombo = Math.max(this.maxCombo, this.combo); }
    resetCombo() { this.combo = 0; }

    spawnWave(wave) {
        const dx = this.dr.x;
        const dy = this.dr.y;
        const areaW = dx[1] - dx[0];
        const areaH = dy[1] - dy[0];

        // Deactivate existing
        for (const a of this.asteroids) a.active = false;

        const nLarge = 2 + wave;
        const nMedium = 1 + Math.floor(wave * 0.8);
        const nSmall = Math.floor(wave * 0.6);
        const tierSpeedMult = [1.0, 1.5, 2.2];
        const counts = [nLarge, nMedium, nSmall];
        const baseSpeed = Math.max(0.125, Math.min(areaW, areaH) * 0.00167) * (1 + wave * 0.08);

        for (let tier = 0; tier < 3; tier++) {
            for (let m = 0; m < counts[tier]; m++) {
                const edgeIdx = Math.floor(Math.random() * 4);
                const rockR = this.tierRadii[tier];
                let sx, sy;
                switch (edgeIdx) {
                    case 0: sx = dx[0] - rockR; sy = dy[0] + Math.random() * areaH; break;
                    case 1: sx = dx[1] + rockR; sy = dy[0] + Math.random() * areaH; break;
                    case 2: sx = dx[0] + Math.random() * areaW; sy = dy[0] - rockR; break;
                    case 3: sx = dx[0] + Math.random() * areaW; sy = dy[1] + rockR; break;
                }

                const toBase = [this.basePos[0] - sx, this.basePos[1] - sy];
                const tbDist = Math.hypot(toBase[0], toBase[1]);
                const tbN = [toBase[0] / tbDist, toBase[1] / tbDist];
                const spread = (Math.random() - 0.5) * 1.5;
                const launchAngle = Math.atan2(tbN[1], tbN[0]) + spread;
                const spawnSpeed = baseSpeed * tierSpeedMult[tier] * (0.6 + Math.random() * 0.8);
                const vx = spawnSpeed * Math.cos(launchAngle);
                const vy = spawnSpeed * Math.sin(launchAngle);

                this.createAsteroid(sx, sy, vx, vy, rockR, tier + 1);
            }
        }
    }

    createAsteroid(sx, sy, vx, vy, rockRadius, tier) {
        const nVerts = 8 + Math.floor(Math.random() * 5);
        const vertAngles = [];
        for (let i = 0; i < nVerts; i++) vertAngles.push(Math.random() * 2 * Math.PI);
        vertAngles.sort((a, b) => a - b);
        const shpX = [];
        const shpY = [];
        for (let i = 0; i < nVerts; i++) {
            const r = rockRadius * (0.7 + 0.3 * Math.random());
            shpX.push(r * Math.cos(vertAngles[i]));
            shpY.push(r * Math.sin(vertAngles[i]));
        }

        this.asteroids.push({
            x: sx, y: sy, vx, vy,
            radius: rockRadius, tier,
            angle: 0, spin: (Math.random() - 0.5) * 0.0208,
            shapeX: shpX, shapeY: shpY,
            active: true,
        });
    }

    spawnExplosion(ex, ey) {
        const maxR = Math.max(8, Math.min(
            this.dr.x[1] - this.dr.x[0],
            this.dr.y[1] - this.dr.y[0]) * 0.06);

        // Reuse inactive slot or push new
        let slot = null;
        for (let i = 0; i < this.explosions.length; i++) {
            if (!this.explosions[i].active) { slot = this.explosions[i]; break; }
        }
        if (!slot) {
            if (this.explosions.length < 12) {
                slot = {};
                this.explosions.push(slot);
            } else {
                return;
            }
        }
        slot.x = ex; slot.y = ey;
        slot.radius = 1; slot.maxRadius = maxR;
        slot.phase = 1; slot.active = true;
    }

    showWave(wave) {
        this.waveFlashStart = performance.now();
    }
}


// =============================================================================
// SHIELD GUARDIAN
// =============================================================================
class ShieldGuardianGame {
    constructor() {
        this.name = "Shield Guardian";
        this.score = 0;
        this.combo = 0;
        this.maxCombo = 0;
        this.isRunning = false;
        this.hitFx = new HitEffectsPool();
    }

    init(canvas, ctx, displayRange) {
        this.canvas = canvas;
        this.ctx = ctx;
        this.dr = displayRange;
        this.score = 0;
        this.combo = 0;
        this.maxCombo = 0;
        this.isRunning = true;
        this.startTime = performance.now();
        this.hitFx = new HitEffectsPool();

        const dx = displayRange.x;
        const dy = displayRange.y;
        const areaW = dx[1] - dx[0];
        const areaH = dy[1] - dy[0];
        const minDim = Math.min(areaW, areaH);
        this.Sc = minDim / 180;

        this.corePos = [(dx[0] + dx[1]) / 2, (dy[0] + dy[1]) / 2];
        this.lives = 3;
        this.maxLives = 3;
        this.shieldAngle = 0;
        this.shieldArc = Math.PI;   // 180 degrees
        this.wave = 1;
        this.spawnTimer = 0;
        this.gameOver = false;

        this.coreRadius = Math.max(4, minDim * 0.055);
        this.shieldRadius = Math.max(7, minDim * 0.08);
        this.hitboxRadius = this.shieldRadius * 0.9;

        // Projectile pool
        this.projectiles = [];

        // Lives flash
        this.livesFlashStart = null;
    }

    update(mousePos, dt, dtScale) {
        if (!this.isRunning || this.gameOver) return;
        const ctx = this.ctx;
        const dr = this.dr;
        const ds = dtScale;
        const dx = dr.x;
        const dy = dr.y;
        const areaW = dx[1] - dx[0];
        const areaH = dy[1] - dy[0];
        const minDim = Math.min(areaW, areaH);
        const corePos = this.corePos;
        const shieldR = this.shieldRadius;
        const hitboxR = this.hitboxRadius;

        // --- Clear ---
        ctx.fillStyle = rgb(Colors.Bg);
        ctx.fillRect(dx[0], dy[0], areaW, areaH);

        // --- Update shield angle ---
        if (mousePos && !isNaN(mousePos[0]) && !isNaN(mousePos[1])) {
            this.shieldAngle = Math.atan2(mousePos[1] - corePos[1], mousePos[0] - corePos[0]);
        }

        // --- Spawn projectiles ---
        this.spawnTimer += ds;
        const spawnRate = Math.max(19, 72 - this.wave * 5);
        if (this.spawnTimer >= spawnRate) {
            this.spawnTimer = 0;
            this.spawnProjectile();
        }

        // --- Move projectiles ---
        for (let i = this.projectiles.length - 1; i >= 0; i--) {
            const p = this.projectiles[i];
            if (!p.active) continue;

            const prevPx = p.x;
            const prevPy = p.y;
            p.prevX = prevPx;
            p.prevY = prevPy;

            p.x += p.vx * ds;
            p.y += p.vy * ds;
            const px = p.x;
            const py = p.y;

            const distToCore = Math.hypot(px - corePos[0], py - corePos[1]);

            // --- Shield deflection (swept line-segment vs arc) ---
            let deflected = false;
            if (p.type !== "deflected") {
                const segDx = px - prevPx;
                const segDy = py - prevPy;
                const relPx = prevPx - corePos[0];
                const relPy = prevPy - corePos[1];
                const a = segDx * segDx + segDy * segDy;
                const b = 2 * (relPx * segDx + relPy * segDy);
                const c = relPx * relPx + relPy * relPy - shieldR * shieldR;
                const disc = b * b - 4 * a * c;

                if (disc >= 0 && a > 1e-12) {
                    const sqrtDisc = Math.sqrt(disc);
                    const tVals = [(-b - sqrtDisc) / (2 * a), (-b + sqrtDisc) / (2 * a)];
                    for (const tHit of tVals) {
                        if (tHit >= 0 && tHit <= 1) {
                            const hitX = prevPx + tHit * segDx;
                            const hitY = prevPy + tHit * segDy;
                            const hitAngle = Math.atan2(hitY - corePos[1], hitX - corePos[0]);
                            let angleDiff = ((hitAngle - this.shieldAngle + Math.PI) % (2 * Math.PI));
                            if (angleDiff < 0) angleDiff += 2 * Math.PI;
                            angleDiff -= Math.PI;
                            if (Math.abs(angleDiff) < this.shieldArc / 2) {
                                // Deflect
                                this.addScore(25);
                                this.incrementCombo();
                                const normalVec = [Math.cos(hitAngle), Math.sin(hitAngle)];
                                const vel = [p.vx, p.vy];
                                const dotVal = vel[0] * normalVec[0] + vel[1] * normalVec[1];
                                const reflected = [
                                    vel[0] - 2 * dotVal * normalVec[0],
                                    vel[1] - 2 * dotVal * normalVec[1],
                                ];
                                p.vx = reflected[0] * 1.5;
                                p.vy = reflected[1] * 1.5;
                                p.type = "deflected";
                                p.x = hitX + normalVec[0] * 3;
                                p.y = hitY + normalVec[1] * 3;
                                p.color = Colors.Green;
                                this.hitFx.spawnBounce(hitX, hitY, normalVec[0], normalVec[1], 0, 6, this.Sc);
                                deflected = true;
                                break;
                            }
                        }
                    }
                }
                if (deflected) continue;

                // --- Core hit (swept: line segment vs hitbox circle) ---
                const segDx2 = px - prevPx;
                const segDy2 = py - prevPy;
                const relPx2 = prevPx - corePos[0];
                const relPy2 = prevPy - corePos[1];
                const a2 = segDx2 * segDx2 + segDy2 * segDy2;
                const b2 = 2 * (relPx2 * segDx2 + relPy2 * segDy2);
                const c2 = relPx2 * relPx2 + relPy2 * relPy2 - hitboxR * hitboxR;
                const disc2 = b2 * b2 - 4 * a2 * c2;
                let coreHit = distToCore < hitboxR;
                if (!coreHit && disc2 >= 0 && a2 > 1e-12) {
                    const t1 = (-b2 - Math.sqrt(disc2)) / (2 * a2);
                    if (t1 >= 0 && t1 <= 1) coreHit = true;
                }
                if (coreHit) {
                    this.lives--;
                    this.resetCombo();
                    this.livesFlashStart = performance.now();
                    this.hitFx.spawnBounce(px, py, 0, 1, 0, 14, this.Sc);
                    p.active = false;
                    if (this.lives <= 0) {
                        this.gameOver = true;
                        this.isRunning = false;
                        this._drawFrame(ctx, dx, dy, areaW, areaH);
                        return;
                    }
                    continue;
                }
            }

            // --- Off screen ---
            if (px < dx[0] - 30 || px > dx[1] + 30 || py < dy[0] - 30 || py > dy[1] + 30) {
                p.active = false;
                continue;
            }

            // --- Deflected hitting another projectile (chain) ---
            if (p.type === "deflected") {
                for (let j = this.projectiles.length - 1; j >= 0; j--) {
                    if (j === i) continue;
                    const pj = this.projectiles[j];
                    if (!pj.active || pj.type === "deflected") continue;
                    const dd = Math.hypot(px - pj.x, py - pj.y);
                    if (dd < p.radius + pj.radius) {
                        this.addScore(50);
                        this.incrementCombo();
                        this.hitFx.spawnBounce(pj.x, pj.y, 0, -1, 0, 8, this.Sc);
                        pj.active = false;
                    }
                }
            }
        }

        // --- Wave progression (every 30 seconds) ---
        const elapsed = (performance.now() - this.startTime) / 1000;
        if (elapsed > this.wave * 30) {
            this.wave++;
            this.addScore(200 * this.wave);
        }

        // --- Update hit effects ---
        this.hitFx.update(ds);

        // --- DRAW ---
        this._drawFrame(ctx, dx, dy, areaW, areaH);
    }

    _drawFrame(ctx, dx, dy, areaW, areaH) {
        const corePos = this.corePos;
        const shieldR = this.shieldRadius;
        const coreR = this.coreRadius;
        const hitboxR = this.hitboxRadius;

        // --- Draw hitbox disc ---
        ctx.beginPath();
        ctx.arc(corePos[0], corePos[1], hitboxR, 0, Math.PI * 2);
        ctx.fillStyle = rgb(Colors.Cyan, 0.6);
        ctx.fill();

        // --- Draw core orb ---
        ctx.save();
        ctx.shadowColor = rgb(Colors.Cyan, 0.6);
        ctx.shadowBlur = 15;
        ctx.beginPath();
        ctx.arc(corePos[0], corePos[1], coreR, 0, Math.PI * 2);
        ctx.fillStyle = rgb(Colors.Cyan);
        ctx.fill();
        ctx.restore();

        // --- Draw shield arc ---
        const arcStart = this.shieldAngle - this.shieldArc / 2;
        const arcEnd = this.shieldAngle + this.shieldArc / 2;

        // Glow
        ctx.save();
        ctx.shadowColor = rgb(Colors.Cyan, 0.5);
        ctx.shadowBlur = 10;
        ctx.beginPath();
        ctx.arc(corePos[0], corePos[1], shieldR, arcStart, arcEnd);
        ctx.strokeStyle = rgb(Colors.Cyan, 0.3);
        ctx.lineWidth = 3;
        ctx.stroke();
        ctx.restore();

        // Solid
        ctx.beginPath();
        ctx.arc(corePos[0], corePos[1], shieldR, arcStart, arcEnd);
        ctx.strokeStyle = rgb(Colors.Cyan);
        ctx.lineWidth = 1;
        ctx.stroke();

        // --- Draw projectiles ---
        for (const p of this.projectiles) {
            if (!p.active) continue;
            // Glow
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.radius * 1.7, 0, Math.PI * 2);
            ctx.fillStyle = rgb(p.color, 0.12);
            ctx.fill();
            // Core
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
            ctx.fillStyle = rgb(p.color, 0.8);
            ctx.fill();
        }

        // --- Lives flash ---
        if (this.livesFlashStart !== null) {
            const el = (performance.now() - this.livesFlashStart) / 1000;
            if (el < 1.0) {
                let alpha = 1;
                if (el >= 0.6) alpha = Math.max(0, 1 - (el - 0.6) / 0.4);
                ctx.fillStyle = rgb(Colors.Red, alpha);
                ctx.font = `bold ${Math.round(26 * this.Sc / 2.67)}px sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(`Lives: ${Math.max(0, this.lives)}`,
                    corePos[0], corePos[1] + (dy[1] - dy[0]) * 0.25);
            } else {
                this.livesFlashStart = null;
            }
        }

        // --- Hit effects ---
        this.hitFx.draw(ctx);
    }

    onKeyPress(key) { return false; }
    onMouseDown() {}
    cleanup() { this.isRunning = false; }

    getResults() {
        let statusStr;
        if (this.lives <= 0) statusStr = "GAME OVER";
        else statusStr = `SURVIVED (Lives: ${this.lives})`;
        return {
            title: "SHIELD GUARDIAN",
            lines: [`Wave: ${this.wave}  |  ${statusStr}`],
        };
    }

    // --- Private helpers ---
    addScore(pts) { this.score += pts; }
    incrementCombo() { this.combo++; this.maxCombo = Math.max(this.maxCombo, this.combo); }
    resetCombo() { this.combo = 0; }

    spawnProjectile() {
        if (this.projectiles.filter(p => p.active).length >= 20) return;

        const dx = this.dr.x;
        const dy = this.dr.y;
        const areaW = dx[1] - dx[0];
        const areaH = dy[1] - dy[0];
        const minDim = Math.min(areaW, areaH);
        const corePos = this.corePos;

        // Spawn from edge
        const spawnAngle = Math.random() * 2 * Math.PI;
        const halfW = areaW / 2;
        const halfH = areaH / 2;
        const absCos = Math.max(Math.abs(Math.cos(spawnAngle)), 1e-6);
        const absSin = Math.max(Math.abs(Math.sin(spawnAngle)), 1e-6);
        const edgeDist = Math.min(halfW / absCos, halfH / absSin);
        const spawnR = edgeDist + 10;
        const x = corePos[0] + spawnR * Math.cos(spawnAngle);
        const y = corePos[1] + spawnR * Math.sin(spawnAngle);

        // Aim at core with spread
        const toCore = [corePos[0] - x, corePos[1] - y];
        const tcDist = Math.hypot(toCore[0], toCore[1]);
        const tcN = [toCore[0] / tcDist, toCore[1] / tcDist];
        const maxMiss = this.coreRadius * 0.6;
        const spreadAngle = Math.atan2(maxMiss, spawnR);
        const spreadVal = (Math.random() - 0.5) * 2 * spreadAngle;
        const ca = Math.cos(spreadVal);
        const sa = Math.sin(spreadVal);
        const aimed = [tcN[0] * ca - tcN[1] * sa, tcN[0] * sa + tcN[1] * ca];

        const baseSpeed = Math.max(0.333, minDim * 0.0083) * (1 + this.wave * 0.1);

        // Random type
        const pType = Math.floor(Math.random() * 3);
        let clr, speedMult, radiusData;
        switch (pType) {
            case 0:  // Fast: small, red, 1.5x
                clr = Colors.Red; speedMult = 1.5;
                radiusData = Math.max(0.8, minDim * 0.008);
                break;
            case 1:  // Normal: medium, magenta, 1x
                clr = Colors.Magenta; speedMult = 1.0;
                radiusData = Math.max(1.2, minDim * 0.012);
                break;
            case 2:  // Heavy: large, orange, 0.6x
                clr = Colors.Orange; speedMult = 0.6;
                radiusData = Math.max(1.5, minDim * 0.018);
                break;
        }

        const speedVal = baseSpeed * speedMult;
        const vx = aimed[0] * speedVal;
        const vy = aimed[1] * speedVal;

        this.projectiles.push({
            x, y, prevX: x, prevY: y,
            vx, vy,
            type: "incoming",
            speed: speedVal,
            radius: radiusData,
            color: clr,
            active: true,
        });
    }
}


// =============================================================================
// RAIL SHOOTER
// =============================================================================
class RailShooterGame {
    constructor() {
        this.name = "Rail Shooter";
        this.score = 0;
        this.combo = 0;
        this.maxCombo = 0;
        this.isRunning = false;
        this.hitFx = new HitEffectsPool();
    }

    init(canvas, ctx, displayRange) {
        this.canvas = canvas;
        this.ctx = ctx;
        this.dr = displayRange;
        this.score = 0;
        this.combo = 0;
        this.maxCombo = 0;
        this.isRunning = true;
        this.startTime = performance.now();
        this.hitFx = new HitEffectsPool();

        const dx = displayRange.x;
        const dy = displayRange.y;
        const areaW = dx[1] - dx[0];
        const areaH = dy[1] - dy[0];
        this.Sc = Math.min(areaW, areaH) / 180;

        this.wave = 1;
        this.lives = 3;
        this.eliminatedCount = 0;
        this.damageCD = 0;
        this.damageRate = 7;
        this.damageFlashFrames = 0;
        this.damageShakeFrames = 0;
        this.baseSize = Math.max(8, Math.round(Math.min(areaW, areaH) * 0.06));
        this.vanishPt = [(dx[0] + dx[1]) / 2, (dy[0] + dy[1]) / 2];
        this.frameCount = 0;
        this.crossHitFlash = 0;
        this.muzzleFlashFrames = 0;
        this.gameOver = false;
        this.wavePause = 0;
        this.spawnTimer = 0;
        this.spawnInterval = 60;

        this.origXLim = [dx[0], dx[1]];
        this.origYLim = [dy[0], dy[1]];

        // Perspective grid
        this.gridAngles = [-0.6, -0.3, 0, 0.3, 0.6];
        this.groundY = dy[1] - areaH * 0.08;

        // Monsters
        this.monsters = [];
        this.spawnQueue = [];

        // Flash timers
        this.livesFlashStart = null;
        this.waveFlashStart = performance.now();

        // Crosshair pos
        this.crossPos = [NaN, NaN];

        // Spawn first wave
        this.buildSpawnWave(this.wave);
    }

    update(mousePos, dt, dtScale) {
        if (!this.isRunning) return;
        const ctx = this.ctx;
        const dr = this.dr;
        const ds = dtScale;
        let dx = dr.x;
        let dy = dr.y;
        const areaW = dx[1] - dx[0];
        const areaH = dy[1] - dy[0];
        const vpX = this.vanishPt[0];
        const vpY = this.vanishPt[1];
        this.frameCount++;
        const fc = this.frameCount;

        if (this.gameOver) return;

        // --- Screen shake ---
        let shakeX = 0, shakeY = 0;
        if (this.damageShakeFrames > 0) {
            this.damageShakeFrames -= ds;
            if (this.damageShakeFrames <= 0) {
                this.damageShakeFrames = 0;
            } else {
                const shakeAmt = this.damageShakeFrames * 0.625;
                shakeX = (Math.random() - 0.5) * shakeAmt * 2;
                shakeY = (Math.random() - 0.5) * shakeAmt * 2;
            }
        }

        // --- Clear ---
        ctx.save();
        ctx.translate(shakeX, shakeY);
        ctx.fillStyle = rgb(Colors.Bg);
        ctx.fillRect(dx[0] - 10, dy[0] - 10, areaW + 20, areaH + 20);

        // --- Draw perspective grid ---
        for (const angle of this.gridAngles) {
            const endX = vpX + angle * areaW;
            ctx.beginPath();
            ctx.moveTo(vpX, vpY);
            ctx.lineTo(endX, this.groundY);
            ctx.strokeStyle = `rgba(64,102,128,0.18)`;
            ctx.lineWidth = 0.54;
            ctx.stroke();
        }

        // Ground line
        ctx.beginPath();
        ctx.moveTo(dx[0], this.groundY);
        ctx.lineTo(dx[1], this.groundY);
        ctx.strokeStyle = `rgba(115,191,217,0.5)`;
        ctx.lineWidth = 1.1;
        ctx.stroke();

        // --- Update crosshair ---
        if (mousePos && !isNaN(mousePos[0]) && !isNaN(mousePos[1])) {
            const crLen = Math.max(5, Math.round(Math.min(areaW, areaH) * 0.04));
            const gap = Math.max(2, Math.round(crLen * 0.3));
            const breathScale = 1.0 + 0.06 * Math.sin(fc * 0.1);
            const crLenB = Math.round(crLen * breathScale);
            this.crossPos = [mousePos[0], mousePos[1]];

            if (this.crossHitFlash > 0) {
                this.crossHitFlash -= ds;
            }
        }

        // --- Muzzle flash decay ---
        if (this.muzzleFlashFrames > 0) {
            this.muzzleFlashFrames -= ds;
        }

        // --- Wave pause ---
        if (this.wavePause > 0) {
            this.wavePause -= ds;
            if (this.wavePause <= 0) {
                this.wave++;
                this.buildSpawnWave(this.wave);
                this.waveFlashStart = performance.now();
            }
        }

        // --- Spawn from queue ---
        if (this.wavePause <= 0) {
            this.spawnTimer += ds;
            if (this.spawnTimer >= this.spawnInterval && this.spawnQueue.length > 0) {
                this.spawnTimer = 0;
                const mType = this.spawnQueue.shift();
                this.spawnMonster(mType);
            }
        }

        // --- Update monsters ---
        let anyAlive = false;
        for (let k = this.monsters.length - 1; k >= 0; k--) {
            const m = this.monsters[k];

            // Defeat animation
            if (m.defeated) {
                m.defeatFrame += ds;
                const progress = m.defeatFrame / m.defeatMaxFrames;
                if (progress >= 1) {
                    this.monsters.splice(k, 1);
                    continue;
                }

                const expandFactor = 1 + Math.pow(progress, 0.7) * 2.5;
                const baseScale = this._depthScale(m.depth);
                const scaleVal = expandFactor * baseScale;
                const defeatAlpha = Math.max(0, Math.min(1, Math.pow(1 - Math.min(progress, 1), 0.6)));
                const jitterAmp = progress * baseScale * this.baseSize * 0.15;
                const jX = jitterAmp * (Math.random() - 0.5);
                const jY = jitterAmp * (Math.random() - 0.5);

                // Draw defeat body
                this._drawMonsterBody(ctx, m, m.screenX + jX, m.screenY + jY,
                    scaleVal * this.baseSize, defeatAlpha, progress);

                // Secondary explosions
                if (progress > 0.1 && progress < 0.7 && Math.random() < 0.2) {
                    const bOff = baseScale * this.baseSize * 0.5;
                    const burstX = m.screenX + (Math.random() - 0.5) * bOff * 2;
                    const burstY = m.screenY + (Math.random() - 0.5) * bOff * 2;
                    this.hitFx.spawnBounce(burstX, burstY,
                        Math.random() - 0.5, Math.random() - 0.5, 0, 6, this.Sc);
                }
                continue;
            }

            anyAlive = true;

            // Advance depth
            m.depth -= m.speed * ds;
            m.phase += 0.033 * ds;

            // Perspective projection
            const scaleVal = this._depthScale(m.depth);
            m.screenX = vpX + (m.spawnX - vpX) * scaleVal;
            m.screenY = vpY + (m.spawnY - vpY) * scaleVal;

            // Interceptor zigzag
            if (m.type === 3) {
                const zigzag = Math.sin(m.phase * 2.5) * areaW * 0.05 * scaleVal;
                m.screenX += zigzag;
            }

            // Reached player
            if (m.depth <= -0.15) {
                this._playerDamage();
                this.monsters.splice(k, 1);
                if (this.lives <= 0) {
                    this.damageShakeFrames = 0;
                    this.gameOver = true;
                    this.isRunning = false;
                    ctx.restore();
                    return;
                }
                continue;
            }

            // Draw monster
            const bodySize = scaleVal * this.baseSize;
            const depthAlpha = Math.min(1, 0.4 + 0.6 * (1 - m.depth));
            this._drawMonster(ctx, m, bodySize, depthAlpha);
        }

        // --- DPS: auto-fire damage ---
        if (this.wavePause <= 0 && !isNaN(this.crossPos[0])) {
            this.damageCD += ds;
            if (this.damageCD >= this.damageRate) {
                this.damageCD = 0;
                this._applyDamage(this.crossPos);
            }
        }

        // --- Draw crosshair (on top of monsters) ---
        if (!isNaN(this.crossPos[0])) {
            this._drawCrosshair(ctx, this.crossPos[0], this.crossPos[1], areaW, areaH, fc, ds);
        }

        // --- Muzzle flash ---
        if (this.muzzleFlashFrames > 0) {
            const t = this.muzzleFlashFrames / 10;
            const mfAlpha = Math.max(0, Math.min(1, t * 0.7));
            const mfW = areaW * 0.12;
            const mfH = areaH * 0.08;
            const mfCx = (dx[0] + dx[1]) / 2;
            const mfBy = dy[1];
            ctx.beginPath();
            ctx.moveTo(mfCx - mfW / 2, mfBy);
            ctx.lineTo(mfCx + mfW / 2, mfBy);
            ctx.lineTo(mfCx + mfW * 0.3, mfBy - mfH * 0.5);
            ctx.lineTo(mfCx, mfBy - mfH);
            ctx.lineTo(mfCx - mfW * 0.3, mfBy - mfH * 0.5);
            ctx.closePath();
            ctx.fillStyle = `rgba(255,242,153,${mfAlpha})`;
            ctx.fill();
        }

        // --- Damage flash overlay ---
        if (this.damageFlashFrames > 0) {
            this.damageFlashFrames -= ds;
            const alphaVal = this.damageFlashFrames / 19;
            const fa = Math.max(0, Math.min(0.35, alphaVal * 0.35));
            ctx.fillStyle = rgb(Colors.Red, fa);
            ctx.fillRect(dx[0], dy[0], areaW, areaH);
        }

        // --- HUD: Lives ---
        {
            const hearts = '\u2665'.repeat(Math.max(0, this.lives));
            let livesColor = Colors.Cyan;
            let livesAlpha = 1;
            if (this.livesFlashStart !== null) {
                const el = (performance.now() - this.livesFlashStart) / 1000;
                if (el < 1.0) {
                    if (el < 0.6) {
                        livesColor = Colors.Red;
                    } else {
                        const t = (el - 0.6) / 0.4;
                        livesColor = lerpColor(Colors.Red, Colors.Cyan, t);
                    }
                } else {
                    this.livesFlashStart = null;
                }
            }
            ctx.fillStyle = rgb(livesColor, livesAlpha);
            ctx.font = `bold ${Math.round(5.9 * this.Sc / 2.67 + 4)}px sans-serif`;
            ctx.textAlign = 'left';
            ctx.textBaseline = 'bottom';
            ctx.fillText(`HP: ${hearts}`, dx[0] + 8, dy[1] - 8);
        }

        // --- HUD: Wave text ---
        {
            let waveStr, waveColor, waveAlpha = 1;
            let waveFontSize = Math.round(7.6 * this.Sc / 2.67 + 4);
            let waveY = dy[0] + 14;

            if (this.wavePause > 0) {
                waveStr = "WAVE CLEARED!";
                waveColor = Colors.Green;
                waveFontSize = Math.round(9.7 * this.Sc / 2.67 + 4);
                waveY = dy[0] + areaH * 0.35;
            } else {
                waveStr = `WAVE ${this.wave}`;
                waveColor = Colors.Gold;
            }

            if (this.waveFlashStart !== null) {
                const el = (performance.now() - this.waveFlashStart) / 1000;
                if (el < 1.7) {
                    waveAlpha = el > 1.2 ? Math.max(0, 1 - (el - 1.2) / 0.5) : 1;
                } else {
                    waveAlpha = this.wavePause > 0 ? 0.5 : 0.5;
                    this.waveFlashStart = null;
                }
            } else {
                waveAlpha = 0.5;
            }

            ctx.fillStyle = rgb(waveColor, waveAlpha);
            ctx.font = `bold ${waveFontSize}px sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'top';
            ctx.fillText(waveStr, (dx[0] + dx[1]) / 2, waveY);
        }

        // --- Wave completion ---
        if (this.wavePause <= 0 && !anyAlive && this.spawnQueue.length === 0) {
            let aliveCount = 0;
            for (const m of this.monsters) if (!m.defeated) aliveCount++;
            if (aliveCount === 0) {
                this.addScore(300 * this.wave);
                this.wavePause = 96;
                this.waveFlashStart = performance.now();
            }
        }

        // --- Update + draw hit effects ---
        this.hitFx.update(ds);
        this.hitFx.draw(ctx);

        ctx.restore();
    }

    _drawCrosshair(ctx, cx, cy, areaW, areaH, fc, ds) {
        const crLen = Math.max(5, Math.round(Math.min(areaW, areaH) * 0.04));
        const gap = Math.max(2, Math.round(crLen * 0.3));
        const breathScale = 1.0 + 0.06 * Math.sin(fc * 0.1);
        const crLenB = Math.round(crLen * breathScale);

        let crossCol, crossGlowA;
        if (this.crossHitFlash > 0) {
            crossCol = Colors.Red;
            crossGlowA = 0.5;
        } else {
            crossCol = Colors.Gold;
            crossGlowA = 0.25;
        }

        // Glow cross
        ctx.save();
        ctx.shadowColor = rgb(crossCol, 0.5);
        ctx.shadowBlur = 8;
        ctx.strokeStyle = rgb(crossCol, crossGlowA);
        ctx.lineWidth = 2.7;
        ctx.beginPath();
        ctx.moveTo(cx - crLenB, cy); ctx.lineTo(cx - gap, cy);
        ctx.moveTo(cx + gap, cy); ctx.lineTo(cx + crLenB, cy);
        ctx.moveTo(cx, cy - crLenB); ctx.lineTo(cx, cy - gap);
        ctx.moveTo(cx, cy + gap); ctx.lineTo(cx, cy + crLenB);
        ctx.stroke();
        ctx.restore();

        // Inner cross
        ctx.strokeStyle = rgb(crossCol);
        ctx.lineWidth = 0.81;
        ctx.beginPath();
        ctx.moveTo(cx - crLenB, cy); ctx.lineTo(cx - gap, cy);
        ctx.moveTo(cx + gap, cy); ctx.lineTo(cx + crLenB, cy);
        ctx.moveTo(cx, cy - crLenB); ctx.lineTo(cx, cy - gap);
        ctx.moveTo(cx, cy + gap); ctx.lineTo(cx, cy + crLenB);
        ctx.stroke();

        // Red center dot
        ctx.beginPath();
        ctx.arc(cx, cy, 2.5, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,38,26,0.95)`;
        ctx.fill();

        // Outer ring
        const ringR = Math.sqrt(6000 / Math.PI) * 0.15;
        ctx.beginPath();
        ctx.arc(cx, cy, ringR, 0, Math.PI * 2);
        ctx.strokeStyle = 'red';
        ctx.lineWidth = 1.5;
        ctx.stroke();
    }

    _drawMonster(ctx, m, bodySize, depthAlpha) {
        const faceCol = this._monsterColor(m.type);
        let sx, sy;
        const shapeX = m.shapeX;
        const shapeY = m.shapeY;

        switch (m.type) {
            case 1: {
                const shamble = Math.sin(m.phase * 1.2) * 0.04 * this._depthScale(m.depth);
                sx = shapeX.map(v => m.screenX + v * bodySize + shamble * bodySize);
                sy = shapeY.map(v => m.screenY + v * bodySize +
                    Math.abs(Math.sin(m.phase * 2.4)) * 0.02 * bodySize);
                break;
            }
            case 2: {
                const sway = Math.sin(m.phase * 0.5) * 0.025 * this._depthScale(m.depth);
                sx = shapeX.map(v => m.screenX + v * bodySize + sway * bodySize);
                sy = shapeY.map(v => m.screenY + v * bodySize);
                break;
            }
            case 3: {
                const flutter = Math.sin(m.phase * 6) * 0.015 * this._depthScale(m.depth);
                sx = shapeX.map(v => m.screenX + v * bodySize + flutter * bodySize);
                sy = shapeY.map(v => m.screenY + v * bodySize +
                    Math.sin(m.phase * 8) * 0.01 * bodySize);
                break;
            }
            case 4: {
                const breathFactor = 1 + 0.03 * Math.sin(m.phase * 0.7);
                sx = shapeX.map(v => m.screenX + v * bodySize * breathFactor);
                sy = shapeY.map(v => m.screenY + v * bodySize * breathFactor);
                break;
            }
            default:
                sx = shapeX.map(v => m.screenX + v * bodySize);
                sy = shapeY.map(v => m.screenY + v * bodySize);
        }

        // Hit flash
        let drawColor = faceCol;
        let faceAlpha = Math.min(1, 0.45 * depthAlpha);
        if (m.hitFlash > 0) {
            drawColor = Colors.White;
            faceAlpha = 0.7;
        }

        // Glow patch
        ctx.beginPath();
        ctx.moveTo(sx[0], sy[0]);
        for (let i = 1; i < sx.length; i++) ctx.lineTo(sx[i], sy[i]);
        ctx.closePath();
        ctx.fillStyle = rgb(faceCol, Math.min(1, 0.12 * depthAlpha));
        ctx.fill();
        ctx.strokeStyle = rgb(faceCol, Math.min(1, 0.5 * depthAlpha));
        ctx.lineWidth = 2.7;
        ctx.stroke();

        // Body patch
        ctx.beginPath();
        ctx.moveTo(sx[0], sy[0]);
        for (let i = 1; i < sx.length; i++) ctx.lineTo(sx[i], sy[i]);
        ctx.closePath();
        ctx.fillStyle = rgb(drawColor, faceAlpha);
        ctx.fill();
        ctx.strokeStyle = rgb(faceCol, Math.min(1, depthAlpha));
        ctx.lineWidth = 1.1;
        ctx.stroke();

        // Detail lines
        this._drawDetailLines(ctx, m, bodySize, depthAlpha, faceCol);

        // Boss weak point
        if (m.type === 4) {
            const wpPulse = 0.2 + 0.08 * Math.sin(m.phase * 3);
            const wpR = bodySize * wpPulse;
            const wpAlpha = (0.5 + 0.3 * Math.sin(m.phase * 3)) * depthAlpha;
            ctx.beginPath();
            ctx.arc(m.screenX, m.screenY, wpR * 2.5, 0, Math.PI * 2);
            ctx.fillStyle = rgb(Colors.Red, wpAlpha);
            ctx.fill();
        }

        // HP bar
        const barW = m.type === 4 ? bodySize * 2.2 : bodySize * 1.6;
        const barH = m.type === 4 ? Math.max(3, bodySize * 0.18) : Math.max(2, bodySize * 0.14);
        const barX = m.screenX - barW / 2;
        const barY = m.screenY - bodySize * 1.4;
        const hpFrac = Math.max(0, m.hp / m.maxHp);

        // BG
        ctx.fillStyle = `rgba(26,26,31,0.5)`;
        ctx.fillRect(barX, barY, barW, barH);
        // FG
        let hpColor;
        if (hpFrac > 0.5) hpColor = Colors.Green;
        else if (hpFrac > 0.25) hpColor = Colors.Gold;
        else hpColor = Colors.Red;
        ctx.fillStyle = rgb(hpColor, 0.85);
        ctx.fillRect(barX, barY, barW * hpFrac, barH);
        // Border
        ctx.strokeStyle = rgb(Colors.White, 0.4 * depthAlpha);
        ctx.lineWidth = 0.54;
        ctx.strokeRect(barX, barY, barW, barH);

        // Boss name
        if (m.type === 4) {
            ctx.fillStyle = rgb(Colors.Orange, depthAlpha);
            ctx.font = `bold ${Math.round(4.3 * this.Sc / 2.67 + 3)}px sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'bottom';
            ctx.fillText("DREADNOUGHT", m.screenX, barY - 4);
        }
    }

    _drawMonsterBody(ctx, m, cx, cy, bodySize, defeatAlpha, progress) {
        // Defeat animation body with color change
        const sx = m.shapeX.map(v => cx + v * bodySize);
        const sy = m.shapeY.map(v => cy + v * bodySize);

        let faceCol;
        if (progress < 0.15) {
            faceCol = Colors.White;
        } else if (progress < 0.4) {
            const t = (progress - 0.15) / 0.25;
            faceCol = [255, 255 - t * 77, 77 * (1 - t)];
        } else if (progress < 0.7) {
            const t = (progress - 0.4) / 0.3;
            faceCol = [255 - t * 77, 178 - t * 128, 0];
        } else {
            faceCol = [178, 51, 0];
        }

        // Glow
        ctx.beginPath();
        ctx.moveTo(sx[0], sy[0]);
        for (let i = 1; i < sx.length; i++) ctx.lineTo(sx[i], sy[i]);
        ctx.closePath();
        const glowBoost = 1 + Math.sin(progress * Math.PI) * 0.5;
        ctx.fillStyle = rgb(faceCol, Math.max(0, 0.2 * defeatAlpha * glowBoost));
        ctx.fill();
        ctx.strokeStyle = rgb([255, 178 * (1 - progress), 0], Math.max(0, 0.6 * defeatAlpha));
        ctx.lineWidth = 2.7;
        ctx.stroke();

        // Body
        ctx.beginPath();
        ctx.moveTo(sx[0], sy[0]);
        for (let i = 1; i < sx.length; i++) ctx.lineTo(sx[i], sy[i]);
        ctx.closePath();
        ctx.fillStyle = rgb(faceCol, Math.max(0, 0.6 * defeatAlpha));
        ctx.fill();
    }

    _drawDetailLines(ctx, m, bodySize, depthAlpha, faceCol) {
        const detailAlpha = 0.35 * depthAlpha;
        const sx = m.screenX;
        const sy = m.screenY;

        ctx.strokeStyle = rgb(faceCol, detailAlpha);
        switch (m.type) {
            case 1: // Spine
                ctx.lineWidth = 0.54;
                ctx.beginPath();
                ctx.moveTo(sx, sy - 0.8 * bodySize);
                ctx.lineTo(sx, sy + 0.5 * bodySize);
                ctx.stroke();
                break;
            case 2: // Spine + 3 ribs
                ctx.lineWidth = 0.81;
                ctx.beginPath();
                ctx.moveTo(sx, sy - 0.8 * bodySize);
                ctx.lineTo(sx, sy + 0.4 * bodySize);
                ctx.stroke();
                ctx.lineWidth = 0.54;
                for (const ribY of [-0.15, 0.1, 0.3]) {
                    ctx.beginPath();
                    ctx.moveTo(sx - 0.5 * bodySize, sy + ribY * bodySize);
                    ctx.lineTo(sx + 0.5 * bodySize, sy + ribY * bodySize);
                    ctx.stroke();
                }
                break;
            case 3: // Wing struts
                ctx.lineWidth = 0.54;
                ctx.strokeStyle = rgb(faceCol, detailAlpha * 1.2);
                ctx.beginPath();
                ctx.moveTo(sx - 0.1 * bodySize, sy - 0.2 * bodySize);
                ctx.lineTo(sx - 0.6 * bodySize, sy - 0.5 * bodySize);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(sx + 0.1 * bodySize, sy - 0.2 * bodySize);
                ctx.lineTo(sx + 0.6 * bodySize, sy - 0.5 * bodySize);
