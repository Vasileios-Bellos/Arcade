                ctx.stroke();
                break;
            case 4: // Spine + shoulder
                ctx.lineWidth = 1.1;
                ctx.beginPath();
                ctx.moveTo(sx, sy - 0.85 * bodySize);
                ctx.lineTo(sx, sy + 0.6 * bodySize);
                ctx.stroke();
                ctx.lineWidth = 0.81;
                ctx.beginPath();
                ctx.moveTo(sx - 0.5 * bodySize, sy - 0.2 * bodySize);
                ctx.lineTo(sx + 0.5 * bodySize, sy - 0.2 * bodySize);
                ctx.stroke();
                break;
        }
    }

    _depthScale(depthVal) {
        // depth=1 far (tiny), depth=0 near (full size)
        return 0.15 + (1 - depthVal) * 0.85;
    }

    _monsterColor(mType) {
        switch (mType) {
            case 1: return Colors.Cyan;
            case 2: return Colors.Red;
            case 3: return Colors.Magenta;
            case 4: return [255, 128, 0];
            default: return Colors.Cyan;
        }
    }

    _monsterShape(mType) {
        switch (mType) {
            case 1: return {
                x: [0, -0.15, -0.25, -0.65, -0.45, -0.2, -0.15, 0,
                    0.15, 0.2, 0.45, 0.65, 0.25, 0.15],
                y: [-1, -0.65, -0.4, 0.1, 0.3, 0, 0.5, 0.8,
                    0.5, 0, 0.3, 0.1, -0.4, -0.65],
            };
            case 2: return {
                x: [-0.15, -0.3, -0.4, -0.3, -0.45, -0.85, -0.9, -0.75,
                    -0.6, -0.7, -0.5, -0.4, -0.3, -0.1, 0.1, 0.3, 0.4,
                    0.5, 0.7, 0.6, 0.75, 0.9, 0.85, 0.45, 0.3, 0.4, 0.3, 0.15],
                y: [-1, -0.9, -0.6, -0.45, -0.4, -0.3, -0.05, 0.1,
                    0.2, 0.35, 0.3, 0.4, 0.6, 0.95, 0.95, 0.6, 0.4,
                    0.3, 0.35, 0.2, 0.1, -0.05, -0.3, -0.4, -0.45, -0.6, -0.9, -1],
            };
            case 3: return {
                x: [0, -0.2, -0.4, -0.25, -0.8, -1, -0.6,
                    -0.3, -0.15, 0, 0.15, 0.3,
                    0.6, 1, 0.8, 0.25, 0.4, 0.2],
                y: [-1, -0.8, -0.9, -0.5, -0.3, 0.05, 0.2,
                    0.3, 0.65, 0.95, 0.65, 0.3,
                    0.2, 0.05, -0.3, -0.5, -0.9, -0.8],
            };
            case 4: return {
                x: [0, -0.15, -0.3, -0.25, -0.2, -0.3, -0.4,
                    -0.7, -0.85, -0.75, -0.55, -0.45, -0.6, -0.5, -0.35,
                    -0.4, -0.3, -0.15, 0.15, 0.3, 0.4,
                    0.35, 0.5, 0.6, 0.45, 0.55, 0.75, 0.85, 0.7,
                    0.4, 0.3, 0.2, 0.25, 0.3, 0.15],
                y: [-1, -0.95, -1, -0.75, -0.6, -0.5, -0.4,
                    -0.3, -0.1, 0.1, 0.15, 0.25, 0.35, 0.3, 0.2,
                    0.4, 0.7, 0.95, 0.95, 0.7, 0.4,
                    0.2, 0.3, 0.35, 0.25, 0.15, 0.1, -0.1, -0.3,
                    -0.4, -0.5, -0.6, -0.75, -1, -0.95],
            };
            default: return { x: [-0.3, -0.3, 0.3, 0.3], y: [0.5, -0.5, -0.5, 0.5] };
        }
    }

    buildSpawnWave(waveNum) {
        let q;
        switch (waveNum) {
            case 1: q = [1,1,1,1,1,1]; break;
            case 2: q = [1,1,3,1,1,3,1]; break;
            case 3: q = [1,1,2,1,3,1,1,3]; break;
            case 4: q = [1,2,3,1,2,3,1,1,3]; break;
            case 5: q = [2,1,3,2,1,4,1,3,1,3]; break;
            default: {
                const nGrunt = 4 + Math.floor(waveNum / 2);
                const nBrute = 1 + Math.floor(waveNum / 3);
                const nSpeed = 1 + Math.floor(waveNum / 2);
                const nBoss = Math.floor(waveNum / 5);
                q = [];
                for (let i = 0; i < nGrunt; i++) q.push(1);
                for (let i = 0; i < nBrute; i++) q.push(2);
                for (let i = 0; i < nSpeed; i++) q.push(3);
                for (let i = 0; i < nBoss; i++) q.push(4);
                // Shuffle
                for (let i = q.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [q[i], q[j]] = [q[j], q[i]];
                }
            }
        }
        this.spawnQueue = q;
        this.spawnTimer = this.spawnInterval - 7;
        this.spawnInterval = Math.max(29, 60 - waveNum * 5);
    }

    spawnMonster(mType) {
        const dx = this.dr.x;
        const dy = this.dr.y;
        const areaW = dx[1] - dx[0];
        const areaH = dy[1] - dy[0];
        const vpX = this.vanishPt[0];
        const vpY = this.vanishPt[1];

        const spawnX = vpX + (Math.random() - 0.5) * areaW * 0.7;
        const spawnY = vpY + (Math.random() - 0.5) * areaH * 0.5;

        // Stats by type
        let hp, spd, sizeMult;
        switch (mType) {
            case 1: hp = 3; spd = 0.003; sizeMult = 1.0; break;
            case 2: hp = 8; spd = 0.0018; sizeMult = 1.5; break;
            case 3: hp = 2; spd = 0.0038; sizeMult = 0.7; break;
            case 4: hp = 25; spd = 0.0012; sizeMult = 2.2; break;
            default: hp = 3; spd = 0.003; sizeMult = 1.0;
        }

        // Scale HP with wave
        hp += Math.floor(this.wave / 3);

        const shape = this._monsterShape(mType);
        const shapeX = shape.x.map(v => v * sizeMult);
        const shapeY = shape.y.map(v => v * sizeMult);

        const depthVal = 0.95 + Math.random() * 0.05;
        const scaleVal = this._depthScale(depthVal);
        const scrX = vpX + (spawnX - vpX) * scaleVal;
        const scrY = vpY + (spawnY - vpY) * scaleVal;

        // Defeat animation frames by type
        const defeatFrames = { 1: 36, 2: 48, 3: 24, 4: 67 };

        this.monsters.push({
            type: mType, hp, maxHp: hp,
            depth: depthVal, speed: spd,
            screenX: scrX, screenY: scrY,
            spawnX, spawnY,
            phase: Math.random() * 2 * Math.PI,
            shapeX, shapeY,
            hitFlash: 0,
            defeated: false, defeatFrame: 0,
            defeatMaxFrames: defeatFrames[mType] || 36,
        });
    }

    _applyDamage(fingerPos) {
        for (let k = 0; k < this.monsters.length; k++) {
            const m = this.monsters[k];
            if (m.defeated) continue;

            const scaleVal = this._depthScale(m.depth);
            const hitR = scaleVal * this.baseSize * 1.2;
            const dist = Math.hypot(fingerPos[0] - m.screenX, fingerPos[1] - m.screenY);

            if (dist < hitR) {
                let dmg = 1;
                // Boss weak point
                if (m.type === 4) {
                    const wpR = scaleVal * this.baseSize * 0.3;
                    if (dist < wpR) dmg = 3;
                }

                m.hp -= dmg;
                m.hitFlash = 10;
                const pts = 10 * dmg;
                this.addScore(pts);
                this.incrementCombo();

                // Muzzle flash
                this.muzzleFlashFrames = 10;

                // Crosshair hit
                this.crossHitFlash = 10;

                // Hit sparks
                const hitDir = [fingerPos[0] - m.screenX, fingerPos[1] - m.screenY];
                const hitNrm = Math.hypot(hitDir[0], hitDir[1]);
                if (hitNrm > 0) { hitDir[0] /= hitNrm; hitDir[1] /= hitNrm; }
                this.hitFx.spawnBounce(m.screenX, m.screenY, hitDir[0], hitDir[1], pts, 5, this.Sc);

                if (m.hp <= 0) {
                    this._defeatMonster(k, m);
                    return;
                }
                return;
            }
        }
        // Missed
        if (this.combo > 0) this.combo = Math.max(0, this.combo - 1);
    }

    _defeatMonster(idx, m) {
        this.eliminatedCount++;
        const basePoints = { 1: 100, 2: 200, 3: 150, 4: 500 };
        const defeatPts = (basePoints[m.type] || 100) * Math.max(1, Math.floor(this.combo / 5));
        this.addScore(defeatPts);

        this.hitFx.spawnBounce(m.screenX, m.screenY, 0, -1, defeatPts, 15, this.Sc);
        if (m.type >= 2) {
            const scaleVal = this._depthScale(m.depth);
            const offsetVal = scaleVal * this.baseSize * 0.4;
            this.hitFx.spawnBounce(m.screenX - offsetVal, m.screenY, -1, 0, 0, 8, this.Sc);
            this.hitFx.spawnBounce(m.screenX + offsetVal, m.screenY, 1, 0, 0, 8, this.Sc);
        }
        if (m.type === 4) {
            const scaleVal = this._depthScale(m.depth);
            const offsetVal = scaleVal * this.baseSize * 0.4;
            this.hitFx.spawnBounce(m.screenX, m.screenY - offsetVal, 0, -1, 0, 12, this.Sc);
            this.hitFx.spawnBounce(m.screenX, m.screenY + offsetVal, 0, 1, 0, 12, this.Sc);
        }

        this.monsters[idx].defeated = true;
        this.monsters[idx].defeatFrame = 0;
        this.monsters[idx].hp = 0;
    }

    _playerDamage() {
        this.lives--;
        this.resetCombo();
        this.damageFlashFrames = 24;
        this.damageShakeFrames = 12;
        this.livesFlashStart = performance.now();
    }

    onKeyPress(key) { return false; }
    onMouseDown() {}
    cleanup() { this.isRunning = false; }

    getResults() {
        return {
            title: "RAIL SHOOTER",
            lines: [`Wave: ${this.wave}  |  Enemies Eliminated: ${this.eliminatedCount}`],
        };
    }

    // --- Private helpers ---
    addScore(pts) { this.score += pts; }
    incrementCombo() { this.combo++; this.maxCombo = Math.max(this.maxCombo, this.combo); }
    resetCombo() { this.combo = 0; }
}

// === INJECT GameBase METHODS INTO ALL GAME CLASSES ===
// Games may define their own versions; these are fallbacks only.
const _allGameClasses = [
    PongGame, BreakoutGame, SnakeGame, TetrisGame, AsteroidsGame,
    SpaceInvadersGame, FlappyBirdGame, FruitNinjaGame, TargetPracticeGame,
    FireflyChaseGame, FlickItGame, JugglerGame, OrbitalDefenseGame,
    ShieldGuardianGame, RailShooterGame
];
const _baseMethods = {
    addScore(pts) { this.score += pts; },
    incrementCombo() { this.combo++; this.maxCombo = Math.max(this.maxCombo, this.combo); },
    resetCombo() { this.combo = 0; },
    comboMultiplier() { return Math.max(1, this.combo / 10); },
    cleanup() { if (this.hitEffects) this.hitEffects.clear(); },
    onKeyPress(key) { return false; },
    onMouseDown() {},
    onScroll(delta) {},
    getResults() { return { title: this.name || 'GAME OVER', lines: [] }; },
};
for (const cls of _allGameClasses) {
    for (const [name, fn] of Object.entries(_baseMethods)) {
        if (!cls.prototype[name]) {
            cls.prototype[name] = fn;
        }
    }
}

// === START ===
arcade.init();
</script>
