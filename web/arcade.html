<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MATLAB Arcade</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #04040a; }
canvas {
    display: block;
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    image-rendering: auto;
}
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<script>
// =========================================================================
// MATLAB ARCADE — HTML5 Canvas Port
// Single self-contained file. All 15 games + menu + engine.
// Display: 854x480 logical, Y increases downward (matches MATLAB YDir=reverse)
// =========================================================================

// === CONSTANTS (from GameBase.m) ===
const DISPLAY_W = 854;
const DISPLAY_H = 480;
const REF_FPS = 60;
const BG_COLOR = '#04040a';
const BG_RGB = [4, 4, 10];

// Neon color palette (MATLAB [0,1] → [0,255])
const Colors = {
    cyan:    [0, 235, 255],
    green:   [51, 255, 102],
    gold:    [255, 217, 51],
    red:     [255, 77, 51],
    white:   [242, 242, 247],
    magenta: [255, 77, 217],
    purple:  [179, 77, 255],
    teal:    [20, 140, 179],
    orange:  [255, 153, 38],
    blue:    [77, 128, 255],
    silver:  [180, 180, 195],
    bg:      [4, 4, 10],
    Bg:      [4, 4, 10],
    // Capitalized aliases (used by some game batches)
    get Cyan() { return this.cyan; },
    get Green() { return this.green; },
    get Gold() { return this.gold; },
    get Red() { return this.red; },
    get White() { return this.white; },
    get Magenta() { return this.magenta; },
    get Purple() { return this.purple; },
    get Orange() { return this.orange; },
    get Blue() { return this.blue; },
    get Teal() { return this.teal; },
    get Silver() { return this.silver; },
};

// Aliases for batch-file compatibility
const GB_COLORS = Colors;
const COLORS = Colors;
let HitEffectsManager; // set after HitEffectSystem is defined
let HitEffects;        // set after HitEffectSystem is defined

function rgba(c, a) {
    if (!c) return BG_COLOR; // fallback to game background
    if (a !== undefined) return `rgba(${c[0]|0},${c[1]|0},${c[2]|0},${a})`;
    if (c.length >= 4) return `rgba(${c[0]|0},${c[1]|0},${c[2]|0},${c[3]})`;
    return `rgb(${c[0]|0},${c[1]|0},${c[2]|0})`;
}

function rgb(c, a) {
    if (!c) return BG_COLOR;
    if (a !== undefined) return `rgba(${c[0]|0},${c[1]|0},${c[2]|0},${a})`;
    if (c.length >= 4) return `rgba(${c[0]|0},${c[1]|0},${c[2]|0},${c[3]})`;
    return `rgb(${c[0]},${c[1]},${c[2]})`;
}

function lerpColor(c1, c2, t) {
    return [
        c1[0] + (c2[0] - c1[0]) * t,
        c1[1] + (c2[1] - c1[1]) * t,
        c1[2] + (c2[2] - c1[2]) * t,
    ];
}

// Speed-to-color gradient (from GameBase.flickSpeedColor)
// Alias: both names used across game files
function speedColor(speed) {
    if (speed < 3) return Colors.cyan;
    if (speed < 7) return lerpColor(Colors.cyan, Colors.green, (speed - 3) / 4);
    if (speed < 12) return lerpColor(Colors.green, Colors.gold, (speed - 7) / 5);
    return lerpColor(Colors.gold, Colors.red, Math.min(1, (speed - 12) / 5));
}
const flickSpeedColor = speedColor; // alias used by some games

// === CANVAS SETUP (HiDPI-aware, crisp rendering) ===
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
    const dpr = window.devicePixelRatio || 1;
    const windowW = window.innerWidth;
    const windowH = window.innerHeight;
    const gameAR = DISPLAY_W / DISPLAY_H;
    const windowAR = windowW / windowH;
    let cssW, cssH;
    if (windowAR > gameAR) {
        cssH = windowH;
        cssW = cssH * gameAR;
    } else {
        cssW = windowW;
        cssH = cssW / gameAR;
    }
    // CSS size = visual size on screen
    canvas.style.width = cssW + 'px';
    canvas.style.height = cssH + 'px';
    // Backing store = CSS size × DPR for crisp pixels
    canvas.width = Math.round(cssW * dpr);
    canvas.height = Math.round(cssH * dpr);
    // Scale so game code draws in 854×480 logical coordinates
    const scaleX = canvas.width / DISPLAY_W;
    const scaleY = canvas.height / DISPLAY_H;
    ctx.setTransform(scaleX, 0, 0, scaleY, 0, 0);
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// === INPUT ===
const input = {
    mouseX: DISPLAY_W / 2,
    mouseY: DISPLAY_H / 2,
    mouseDown: false,
    keys: {},
    keyQueue: [],
    scrollDelta: 0,
    keyboardMode: false,
    lastMouseX: DISPLAY_W / 2,
    lastMouseY: DISPLAY_H / 2,
};

canvas.addEventListener('mousemove', (e) => {
    const rect = canvas.getBoundingClientRect();
    const newX = (e.clientX - rect.left) / rect.width * DISPLAY_W;
    const newY = (e.clientY - rect.top) / rect.height * DISPLAY_H;
    // Only exit keyboard mode if mouse moves significantly (15px threshold)
    if (input.keyboardMode) {
        const dx = newX - input.lastMouseX;
        const dy = newY - input.lastMouseY;
        if (Math.sqrt(dx*dx + dy*dy) > 15) {
            input.keyboardMode = false;
        } else {
            return; // ignore small mouse movements in keyboard mode
        }
    }
    input.mouseX = newX;
    input.mouseY = newY;
    input.lastMouseX = newX;
    input.lastMouseY = newY;

    // Update scroll drag if active
    if (arcade.state === 'menu' && arcade.menu && arcade.menu.scrollDragging) {
        arcade.menu.updateScrollDrag(newY);
    }
});

canvas.addEventListener('contextmenu', (e) => e.preventDefault());

canvas.addEventListener('mousedown', (e) => {
    e.preventDefault();
    input.mouseDown = true;
    if (arcade.state === 'active' && arcade.activeGame) {
        if (e.button === 2) {
            arcade.activeGame.onKeyPress('ArrowDown');
        } else {
            arcade.activeGame.onMouseDown();
        }
    } else if (arcade.state === 'menu' && arcade.menu) {
        // Check scroll thumb first
        if (arcade.menu.hitTestScrollThumb(input.mouseX, input.mouseY)) {
            arcade.menu.beginScrollDrag(input.mouseY);
        } else {
            arcade.onMenuClick();
        }
    }
});

canvas.addEventListener('mouseup', () => {
    input.mouseDown = false;
    if (arcade.menu && arcade.menu.scrollDragging) {
        arcade.menu.endScrollDrag();
    }
});

// Touch support (mobile)
canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    const touch = e.touches[0];
    const rect = canvas.getBoundingClientRect();
    input.mouseX = (touch.clientX - rect.left) / rect.width * DISPLAY_W;
    input.mouseY = (touch.clientY - rect.top) / rect.height * DISPLAY_H;
    input.mouseDown = true;
    if (arcade.state === 'active' && arcade.activeGame) {
        arcade.activeGame.onMouseDown();
    } else if (arcade.state === 'menu') {
        arcade.onMenuClick();
    }
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    const touch = e.touches[0];
    const rect = canvas.getBoundingClientRect();
    input.mouseX = (touch.clientX - rect.left) / rect.width * DISPLAY_W;
    input.mouseY = (touch.clientY - rect.top) / rect.height * DISPLAY_H;
}, { passive: false });

canvas.addEventListener('touchend', (e) => {
    e.preventDefault();
    input.mouseDown = false;
}, { passive: false });

canvas.addEventListener('wheel', (e) => {
    e.preventDefault();
    const delta = Math.sign(e.deltaY);
    if (arcade.state === 'menu') {
        arcade.menuScrollDelta(delta);
    } else if (arcade.state === 'active' && arcade.activeGame && arcade.activeGame.onScroll) {
        arcade.activeGame.onScroll(-delta);
    }
}, { passive: false });

document.addEventListener('keydown', (e) => {
    if (e.repeat) return;
    input.keys[e.key] = true;
    input.keyQueue.push(e.key);
    e.preventDefault();
});

document.addEventListener('keyup', (e) => {
    input.keys[e.key] = false;
});

// === HIT EFFECTS (from GameBase.m) ===
const FxRingN = 48;
const FxRingCos = Array.from({length: FxRingN}, (_, i) => Math.cos(i / FxRingN * Math.PI * 2));
const FxRingSin = Array.from({length: FxRingN}, (_, i) => Math.sin(i / FxRingN * Math.PI * 2));

class HitEffectSystem {
    constructor() { this.effects = []; }

    spawnHit(x, y, color, points, radius = 20) {
        const nRays = 8;
        const angles = Array.from({length: nRays}, (_, i) => i / nRays * Math.PI * 2);
        this.effects.push({
            x, y, color, points, radius,
            frames: 18, maxFrames: 18,
            nRays, rayCos: angles.map(Math.cos), raySin: angles.map(Math.sin),
        });
    }

    spawnBounce(x, y, normalOrNx, pointsOrNy, speedOrPts, speedArg2, scaleArg) {
        // Handle both signatures:
        // (x, y, [nx,ny], pts, speed)        — array normal
        // (x, y, nx, ny, pts, speed, scale)  — separate normal components
        let normal, points, speed;
        if (Array.isArray(normalOrNx)) {
            normal = normalOrNx;
            points = pointsOrNy || 0;
            speed = speedOrPts || 5;
        } else {
            normal = [normalOrNx || 0, pointsOrNy || 0];
            points = speedOrPts || 0;
            speed = speedArg2 || 5;
        }
        const clr = speedColor(speed);
        const sparkLen = Math.min(30, 6 + speed * 1.5);
        const nRays = 5;
        const baseAngle = Math.atan2(normal[1], normal[0]);
        const angles = Array.from({length: nRays}, (_, i) =>
            baseAngle + (i / (nRays - 1) - 0.5) * Math.PI * 2 / 3);
        this.effects.push({
            x, y, color: clr, points, radius: sparkLen,
            frames: 22, maxFrames: 22,
            nRays, rayCos: angles.map(Math.cos), raySin: angles.map(Math.sin),
        });
    }

    // Aliases: batch games use different method names
    draw(ctxOrDs, dtScaleOrUndef) { return this.update(ctxOrDs, dtScaleOrUndef); }
    cleanup() { this.clear(); }
    spawnBounceEffect(posOrX, normalOrY, pointsOrNormal, speedOrPoints, speedArg) {
        if (Array.isArray(posOrX)) {
            this.spawnBounce(posOrX[0], posOrX[1], normalOrY, pointsOrNormal, speedOrPoints);
        } else {
            this.spawnBounce(posOrX, normalOrY, pointsOrNormal, speedOrPoints, speedArg);
        }
    }
    spawnHitEffect(posOrX, colorOrY, pointsOrColor, radiusOrPoints, radiusArg) {
        if (Array.isArray(posOrX)) {
            this.spawnHit(posOrX[0], posOrX[1], colorOrY, pointsOrColor, radiusOrPoints);
        } else {
            this.spawnHit(posOrX, colorOrY, pointsOrColor, radiusOrPoints, radiusArg);
        }
    }

    update(ctx, dtScale) {
        // Handle both signatures: update(ctx, ds) and update(ds)
        if (typeof ctx === 'number') {
            dtScale = ctx;
            ctx = document.getElementById('gameCanvas').getContext('2d');
        }
        for (let i = this.effects.length - 1; i >= 0; i--) {
            const fx = this.effects[i];
            fx.frames -= dtScale;
            if (fx.frames <= 0) { this.effects.splice(i, 1); continue; }

            const t = 1 - fx.frames / fx.maxFrames;
            const eased = 1 - (1 - t) * (1 - t);
            const alpha = Math.max(0, 1 - eased * 1.5);
            const expand = 1 + eased * 2.5;

            // Ring
            const r = fx.radius * expand;
            ctx.beginPath();
            for (let j = 0; j < FxRingN; j++) {
                const px = fx.x + r * FxRingCos[j];
                const py = fx.y + r * FxRingSin[j];
                j === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
            }
            ctx.closePath();
            ctx.strokeStyle = rgb(fx.color, alpha * 0.8);
            ctx.lineWidth = Math.max(0.5, 3 * (1 - eased));
            ctx.stroke();

            // Rays
            const r0 = fx.radius * (0.5 + eased * 1.5);
            const r1 = fx.radius * (1.0 + eased * 3.0);
            ctx.strokeStyle = rgb(fx.color, alpha * 0.6);
            ctx.lineWidth = Math.max(0.5, 2 * (1 - eased));
            for (let j = 0; j < fx.nRays; j++) {
                ctx.beginPath();
                ctx.moveTo(fx.x + r0 * fx.rayCos[j], fx.y + r0 * fx.raySin[j]);
                ctx.lineTo(fx.x + r1 * fx.rayCos[j], fx.y + r1 * fx.raySin[j]);
                ctx.stroke();
            }

            // Points text
            if (fx.points > 0) {
                const textY = fx.y - fx.radius - 8 - eased * 20;
                ctx.fillStyle = rgb(fx.color, Math.max(alpha, 0));
                ctx.font = `bold ${7 * (1 + eased * 0.3)}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'bottom';
                ctx.fillText(`+${Math.round(fx.points)}`, fx.x, textY);
            }
        }
    }

    clear() { this.effects = []; }
}
// Aliases: batch files used different class names
HitEffectsManager = HitEffectSystem;
HitEffects = HitEffectSystem;
const HitEffectsPool = HitEffectSystem;

// Aliases: batch files used bare color names
const ColorCyan = Colors.cyan;
const ColorGreen = Colors.green;
const ColorGold = Colors.gold;
const ColorRed = Colors.red;
const ColorWhite = Colors.white;
const ColorMagenta = Colors.magenta;
const ColorPurple = Colors.purple;
const ColorOrange = Colors.orange;
const ColorBlue = Colors.blue;
const ColorTeal = Colors.teal;
const ColorSilver = Colors.silver;

// Aliases: batch utility functions
function hypot(a, b) { return Math.hypot(a, b); }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function segmentPointDist(ax, ay, bx, by, px, py) {
    const dx = bx - ax, dy = by - ay;
    const lenSq = dx * dx + dy * dy;
    if (lenSq === 0) return Math.hypot(px - ax, py - ay);
    let t = ((px - ax) * dx + (py - ay) * dy) / lenSq;
    t = Math.max(0, Math.min(1, t));
    return Math.hypot(px - (ax + t * dx), py - (ay + t * dy));
}
function randRange(a, b) { return a + Math.random() * (b - a); }
function norm2(x, y) { return Math.sqrt(x * x + y * y); }
function dist2(x1, y1, x2, y2) { return Math.hypot(x2 - x1, y2 - y1); }
function lerp(a, b, t) { return a + (b - a) * t; }
function normalize(x, y) { const d = Math.hypot(x, y); return d > 0 ? [x/d, y/d] : [0, 0]; }
function dot2(ax, ay, bx, by) { return ax * bx + ay * by; }
function cross2(ax, ay, bx, by) { return ax * by - ay * bx; }

// === SCORE PERSISTENCE (localStorage) ===
class ScoreStore {
    static get(gameId) {
        const data = JSON.parse(localStorage.getItem('arcade_scores') || '{}');
        return data[gameId] || { highScore: 0, maxCombo: 0, timesPlayed: 0 };
    }

    static submit(gameId, score, maxCombo, elapsed) {
        const data = JSON.parse(localStorage.getItem('arcade_scores') || '{}');
        if (!data[gameId]) data[gameId] = { highScore: 0, maxCombo: 0, timesPlayed: 0 };
        const rec = data[gameId];
        const isNew = score > rec.highScore;
        if (isNew) rec.highScore = score;
        if (maxCombo > rec.maxCombo) rec.maxCombo = maxCombo;
        rec.timesPlayed++;
        localStorage.setItem('arcade_scores', JSON.stringify(data));
        return [isNew, rec.highScore];
    }
}

// === MENU SYSTEM (from GameMenu.m) ===
class GameMenu {
    constructor(games) {
        this.games = games; // [{key, name, ctor}]
        this.selectedIdx = 0;
        this.scrollOffset = 0;
        this.maxVisible = 5;
        this.animTime = 0;

        // Scroll drag state (matches MATLAB GameMenu)
        this.scrollDragging = false;
        this.scrollDragStartY = 0;
        this.scrollDragStartOffset = 0;

        // Layout constants for scroll track
        this.itemW = 267;
        this.itemH = 51;
        this.itemGap = 13;
        this.listTop = DISPLAY_H * 0.22;
        this.trackX = DISPLAY_W / 2 + this.itemW / 2 + 15;

        // Starfield
        this.stars = Array.from({length: 80}, () => ({
            x: Math.random() * DISPLAY_W,
            y: Math.random() * DISPLAY_H,
            size: 0.5 + Math.random() * 1.5,
            phase: Math.random() * Math.PI * 2,
            speed: 0.5 + Math.random() * 2,
        }));

        // Comets
        this.comets = [];
        this.cometTimer = 2;
    }

    update(dt, mouseX, mouseY) {
        this.animTime += dt;

        // Mouse hover selection (only when not in keyboard mode)
        if (!input.keyboardMode) {
            const hitIdx = this.hitTest(mouseX, mouseY);
            if (hitIdx >= 0) {
                this.selectedIdx = hitIdx;
            }
        }

        // Spawn comets
        this.cometTimer -= dt;
        if (this.cometTimer <= 0 && this.comets.length < 2) {
            this.comets.push({
                x: Math.random() * DISPLAY_W * 0.3,
                y: -10,
                vx: 2 + Math.random() * 3,
                vy: 3 + Math.random() * 4,
                life: 0,
                maxLife: 1.5 + Math.random() * 1.0,
            });
            this.cometTimer = 2 + Math.random() * 3;
        }

        // Update comets
        for (let i = this.comets.length - 1; i >= 0; i--) {
            const c = this.comets[i];
            c.life += dt;
            c.x += c.vx * dt * 60;
            c.y += c.vy * dt * 60;
            if (c.life > c.maxLife) this.comets.splice(i, 1);
        }
    }

    draw(ctx) {
        // Background
        ctx.fillStyle = BG_COLOR;
        ctx.fillRect(0, 0, DISPLAY_W, DISPLAY_H);

        // Stars
        for (const star of this.stars) {
            const twinkle = 0.3 + 0.7 * (0.5 + 0.5 * Math.sin(this.animTime * star.speed + star.phase));
            ctx.fillStyle = rgb(Colors.white, twinkle * 0.6);
            ctx.beginPath();
            ctx.arc(star.x, star.y, star.size * twinkle, 0, Math.PI * 2);
            ctx.fill();
        }

        // Comets
        for (const c of this.comets) {
            const progress = c.life / c.maxLife;
            const alpha = progress < 0.1 ? progress / 0.1 : progress > 0.7 ? (1 - progress) / 0.3 : 1;
            const tailLen = 40 + progress * 30;
            const grad = ctx.createLinearGradient(
                c.x, c.y, c.x - c.vx * tailLen * 0.15, c.y - c.vy * tailLen * 0.15
            );
            grad.addColorStop(0, rgb(Colors.white, alpha));
            grad.addColorStop(1, rgb(Colors.white, 0));
            ctx.strokeStyle = grad;
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(c.x, c.y);
            ctx.lineTo(c.x - c.vx * tailLen * 0.15, c.y - c.vy * tailLen * 0.15);
            ctx.stroke();
            // Head dot
            ctx.fillStyle = rgb(Colors.white, alpha);
            ctx.beginPath();
            ctx.arc(c.x, c.y, 2, 0, Math.PI * 2);
            ctx.fill();
        }

        const cx = DISPLAY_W / 2;

        // Title glow
        ctx.save();
        ctx.shadowBlur = 15;
        ctx.shadowColor = rgb(Colors.cyan, 0.3);
        ctx.fillStyle = rgb(Colors.cyan, 0.2);
        ctx.font = 'bold 29px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';
        ctx.fillText('A  R  C  A  D  E', cx, 30);
        ctx.restore();

        // Title core
        ctx.fillStyle = rgb(Colors.cyan, 0.85);
        ctx.font = 'bold 29px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';
        ctx.fillText('A  R  C  A  D  E', cx, 30);

        // Subtitle
        ctx.fillStyle = rgb(Colors.teal);
        ctx.font = 'bold 13px Arial';
        ctx.fillText('S E L E C T   G A M E', cx, 68);

        // Deco line
        const lineW = 160;
        ctx.strokeStyle = rgb(Colors.cyan, 0.6);
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(cx - lineW / 2, 85);
        ctx.lineTo(cx + lineW / 2, 85);
        ctx.stroke();
        // Glow
        ctx.strokeStyle = rgb(Colors.cyan, 0.15);
        ctx.lineWidth = 6;
        ctx.beginPath();
        ctx.moveTo(cx - lineW / 2, 85);
        ctx.lineTo(cx + lineW / 2, 85);
        ctx.stroke();

        // Game list
        const itemW = 267; // 200 * (854/640)
        const itemH = 51;  // 38 * (854/640)
        const itemGap = 13;
        const itemR = 27;
        const badgeSz = 37;
        const listTop = DISPLAY_H * 0.22;
        const maxVis = this.maxVisible;
        const nGames = this.games.length;

        for (let vi = 0; vi < maxVis && vi + this.scrollOffset < nGames; vi++) {
            const gi = vi + this.scrollOffset;
            const game = this.games[gi];
            const y = listTop + vi * (itemH + itemGap);
            const selected = gi === this.selectedIdx;

            // Outer glow (selected only)
            if (selected) {
                this.drawPill(ctx, cx, y + itemH / 2, itemW + 8, itemH + 6, itemR + 3,
                    rgb(Colors.cyan, 0.15), null);
            }

            // Background pill
            const bgColor = selected ? 'rgba(0, 60, 80, 0.5)' : 'rgba(20, 25, 35, 0.7)';
            const borderColor = selected ? rgb(Colors.cyan, 0.8) : rgb(Colors.teal, 0.25);
            this.drawPill(ctx, cx, y + itemH / 2, itemW, itemH, itemR, bgColor, borderColor);

            // Key badge
            const badgeX = cx - itemW / 2 + 22;
            this.drawPill(ctx, badgeX, y + itemH / 2, badgeSz, badgeSz, badgeSz / 2,
                rgb(Colors.teal, 0.3), rgb(Colors.teal, 0.5));
            ctx.fillStyle = selected ? rgb(Colors.cyan) : rgb(Colors.teal);
            ctx.font = `bold 10px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(game.key, badgeX, y + itemH / 2);

            // Game name
            ctx.fillStyle = selected ? rgb(Colors.white) : rgb(Colors.white, 0.6);
            ctx.font = selected ? 'bold 12px Arial' : '12px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(game.name, cx, y + itemH / 2);

            // High score
            const rec = ScoreStore.get(game.name);
            if (rec.highScore > 0) {
                ctx.fillStyle = rgb(Colors.gold, selected ? 0.8 : 0.4);
                ctx.font = '10px Arial';
                ctx.textAlign = 'right';
                ctx.fillText(`★${rec.highScore}`, cx + itemW / 2 - 12, y + itemH / 2);
            }
        }

        // Scroll track
        if (nGames > maxVis) {
            const trackX = cx + itemW / 2 + 15;
            const trackTop = listTop;
            const trackH = maxVis * (itemH + itemGap) - itemGap;
            ctx.strokeStyle = rgb(Colors.teal, 0.2);
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(trackX, trackTop);
            ctx.lineTo(trackX, trackTop + trackH);
            ctx.stroke();

            const thumbH = Math.max(20, trackH * maxVis / nGames);
            const thumbY = trackTop + (trackH - thumbH) * this.scrollOffset / Math.max(1, nGames - maxVis);
            ctx.fillStyle = rgb(Colors.cyan, 0.5);
            ctx.fillRect(trackX - 3, thumbY, 6, thumbH);
        }

        // Footer
        ctx.fillStyle = rgb(Colors.white, 0.35);
        ctx.font = '9px Arial';
        ctx.textAlign = 'center';
        ctx.fillText('↑↓: Navigate  ·  Enter: Play  ·  Esc: Quit', cx, DISPLAY_H - 15);
    }

    drawPill(ctx, cx, cy, w, h, r, fill, stroke) {
        r = Math.min(r, w / 2, h / 2);
        ctx.beginPath();
        ctx.moveTo(cx - w / 2 + r, cy - h / 2);
        ctx.lineTo(cx + w / 2 - r, cy - h / 2);
        ctx.arcTo(cx + w / 2, cy - h / 2, cx + w / 2, cy - h / 2 + r, r);
        ctx.lineTo(cx + w / 2, cy + h / 2 - r);
        ctx.arcTo(cx + w / 2, cy + h / 2, cx + w / 2 - r, cy + h / 2, r);
        ctx.lineTo(cx - w / 2 + r, cy + h / 2);
        ctx.arcTo(cx - w / 2, cy + h / 2, cx - w / 2, cy + h / 2 - r, r);
        ctx.lineTo(cx - w / 2, cy - h / 2 + r);
        ctx.arcTo(cx - w / 2, cy - h / 2, cx - w / 2 + r, cy - h / 2, r);
        ctx.closePath();
        if (fill) { ctx.fillStyle = fill; ctx.fill(); }
        if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = 1.5; ctx.stroke(); }
    }

    moveSelection(delta) {
        this.selectedIdx = Math.max(0, Math.min(this.games.length - 1, this.selectedIdx + delta));
        // Scroll to keep selection visible
        if (this.selectedIdx < this.scrollOffset) this.scrollOffset = this.selectedIdx;
        if (this.selectedIdx >= this.scrollOffset + this.maxVisible)
            this.scrollOffset = this.selectedIdx - this.maxVisible + 1;
    }

    scroll(delta) {
        const maxScroll = Math.max(0, this.games.length - this.maxVisible);
        this.scrollOffset = Math.max(0, Math.min(maxScroll, this.scrollOffset + delta));
    }

    hitTest(mx, my) {
        const itemH = 51, itemGap = 13, listTop = DISPLAY_H * 0.22;
        const itemW = 267;
        const cx = DISPLAY_W / 2;
        for (let vi = 0; vi < this.maxVisible; vi++) {
            const gi = vi + this.scrollOffset;
            if (gi >= this.games.length) break;
            const y = listTop + vi * (itemH + itemGap);
            if (mx > cx - itemW / 2 && mx < cx + itemW / 2 &&
                my > y && my < y + itemH) {
                return gi;
            }
        }
        return -1;
    }

    // --- Scroll thumb dragging (matches MATLAB GameMenu) ---
    hitTestScrollThumb(mx, my) {
        const nGames = this.games.length;
        const maxVis = this.maxVisible;
        if (nGames <= maxVis) return false;
        const trackH = maxVis * (this.itemH + this.itemGap) - this.itemGap;
        const thumbH = Math.max(20, trackH * maxVis / nGames);
        const maxOff = nGames - maxVis;
        const thumbY = this.listTop + (trackH - thumbH) * this.scrollOffset / Math.max(1, maxOff);
        return mx >= this.trackX - 8 && mx <= this.trackX + 8 &&
               my >= thumbY && my <= thumbY + thumbH;
    }

    beginScrollDrag(mouseY) {
        this.scrollDragging = true;
        this.scrollDragStartY = mouseY;
        this.scrollDragStartOffset = this.scrollOffset;
    }

    updateScrollDrag(mouseY) {
        if (!this.scrollDragging) return;
        const nGames = this.games.length;
        const maxVis = this.maxVisible;
        const maxOff = nGames - maxVis;
        if (maxOff <= 0) return;
        const trackH = maxVis * (this.itemH + this.itemGap) - this.itemGap;
        const thumbH = Math.max(20, trackH * maxVis / nGames);
        const scrollableH = trackH - thumbH;
        if (scrollableH <= 0) return;
        const deltaY = mouseY - this.scrollDragStartY;
        const deltaFrac = deltaY / scrollableH;
        const newOffset = Math.max(0, Math.min(maxOff,
            Math.round(this.scrollDragStartOffset + deltaFrac * maxOff)));
        if (newOffset !== this.scrollOffset) {
            this.scrollOffset = newOffset;
            if (this.selectedIdx < this.scrollOffset)
                this.selectedIdx = this.scrollOffset;
            if (this.selectedIdx >= this.scrollOffset + maxVis)
                this.selectedIdx = this.scrollOffset + maxVis - 1;
        }
    }

    endScrollDrag() {
        this.scrollDragging = false;
    }
}

// === MAIN ARCADE CONTROLLER ===
const arcade = {
    state: 'menu', // menu | active | paused | results
    menu: null,
    activeGame: null,
    activeGameName: '',
    hitEffects: new HitEffectSystem(),
    score: 0,
    scoreDisplayed: 0,
    combo: 0,
    maxCombo: 0,
    sessionStartTime: 0,
    prevCombo: 0,
    lastTime: 0,

    // Game registry
    games: [],

    init() {
        // Register all games
        this.games = [
            { key: '1',  name: 'Pong',             ctor: () => new PongGame() },
            { key: '2',  name: 'Breakout',          ctor: () => new BreakoutGame() },
            { key: '3',  name: 'Snake',             ctor: () => new SnakeGame() },
            { key: '4',  name: 'Tetris',            ctor: () => new TetrisGame() },
            { key: '5',  name: 'Asteroids',         ctor: () => new AsteroidsGame() },
            { key: '6',  name: 'Space Invaders',    ctor: () => new SpaceInvadersGame() },
            { key: '7',  name: 'Flappy Bird',       ctor: () => new FlappyBirdGame() },
            { key: '8',  name: 'Fruit Ninja',       ctor: () => new FruitNinjaGame() },
            { key: '9',  name: 'Target Practice',   ctor: () => new TargetPracticeGame() },
            { key: '10', name: 'Firefly Chase',     ctor: () => new FireflyChaseGame() },
            { key: '11', name: 'Flick It!',         ctor: () => new FlickItGame() },
            { key: '12', name: 'Juggler',           ctor: () => new JugglerGame() },
            { key: '13', name: 'Orbital Defense',   ctor: () => new OrbitalDefenseGame() },
            { key: '14', name: 'Shield Guardian',   ctor: () => new ShieldGuardianGame() },
            { key: '15', name: 'Rail Shooter',      ctor: () => new RailShooterGame() },
        ];
        this.menu = new GameMenu(this.games);
        this.lastTime = performance.now() / 1000;
        requestAnimationFrame((t) => this.frame(t));
    },

    frame(timestamp) {
        const now = timestamp / 1000;
        const dt = Math.min(now - this.lastTime, 0.1);
        this.lastTime = now;
        const dtScale = dt * REF_FPS;

        // Process key queue
        while (input.keyQueue.length > 0) {
            const key = input.keyQueue.shift();
            this.handleKey(key);
        }

        // State dispatch
        switch (this.state) {
            case 'menu':
                this.menu.update(dt, input.mouseX, input.mouseY);
                this.menu.draw(ctx);
                break;
            case 'active':
                this.updateActive(dt, dtScale);
                break;
            case 'paused':
                this.drawPaused();
                break;
            case 'results':
                this.drawResults();
                break;
        }

        requestAnimationFrame((t) => this.frame(t));
    },

    handleKey(key) {
        switch (this.state) {
            case 'menu':
                if (key === 'ArrowUp') { input.keyboardMode = true; this.menu.moveSelection(-1); }
                else if (key === 'ArrowDown') { input.keyboardMode = true; this.menu.moveSelection(1); }
                else if (key === 'Enter' || key === ' ') this.launchGame(this.menu.selectedIdx);
                break;
            case 'active':
                if (key === 'p' || key === 'P') this.enterPaused();
                else if (key === 'r' || key === 'R') this.restartGame();
                else if (key === 'Escape') this.enterResults();
                else if (this.activeGame) this.activeGame.onKeyPress(key);
                break;
            case 'paused':
                if (key === 'p' || key === 'P') this.enterActive();
                else if (key === 'r' || key === 'R') this.restartGame();
                else if (key === 'Escape') this.enterResults();
                break;
            case 'results':
                if (key === 'r' || key === 'R' || key === 'Enter' || key === ' ') this.playAgain();
                else if (key === 'Escape') this.enterMenu();
                break;
        }
    },

    onMenuClick() {
        const idx = this.menu.hitTest(input.mouseX, input.mouseY);
        if (idx >= 0) this.launchGame(idx);
    },

    menuScrollDelta(delta) {
        this.menu.scroll(delta);
    },

    launchGame(idx) {
        if (idx < 0 || idx >= this.games.length) return;
        const entry = this.games[idx];
        try {
            this.activeGame = entry.ctor();
            this.activeGameName = entry.name;
            const dr = { X: [0, DISPLAY_W], Y: [0, DISPLAY_H], x: [0, DISPLAY_W], y: [0, DISPLAY_H] };
            this.activeGame.init(canvas, ctx, dr);
            this.activeGame.isRunning = true;
            this.score = 0;
            this.scoreDisplayed = 0;
            this.combo = 0;
            this.maxCombo = 0;
            this.prevCombo = 0;
            this.sessionStartTime = performance.now() / 1000;
            this.hitEffects.clear();
            this.state = 'active';
        } catch (err) {
            console.error(`Failed to launch ${entry.name}:`, err);
            this.activeGame = null;
            this.state = 'menu';
        }
    },

    updateActive(dt, dtScale) {
        if (!this.activeGame) return;

        // Arrow key cursor movement (fallback for games that don't handle arrows)
        const arrowSpd = Math.min(DISPLAY_W, DISPLAY_H) * 0.04 * dtScale;
        if (input.keys['ArrowUp']) { input.mouseY -= arrowSpd; input.keyboardMode = true; }
        if (input.keys['ArrowDown']) { input.mouseY += arrowSpd; input.keyboardMode = true; }
        if (input.keys['ArrowLeft']) { input.mouseX -= arrowSpd; input.keyboardMode = true; }
        if (input.keys['ArrowRight']) { input.mouseX += arrowSpd; input.keyboardMode = true; }
        input.mouseX = Math.max(0, Math.min(DISPLAY_W, input.mouseX));
        input.mouseY = Math.max(0, Math.min(DISPLAY_H, input.mouseY));

        // Clear
        ctx.fillStyle = BG_COLOR;
        ctx.fillRect(0, 0, DISPLAY_W, DISPLAY_H);

        // Update game
        try {
            // Pass mousePos as array-like object with both [0]/[1] and .x/.y access
            const mp = [input.mouseX, input.mouseY];
            mp.x = input.mouseX;
            mp.y = input.mouseY;
            this.activeGame.update(mp, dt, dtScale);
        } catch (err) {
            console.error(`[${this.activeGameName}] update error:`, err);
            console.error(err.stack);
            this.enterResults();
            return;
        }
        this.hitEffects.update(ctx, dtScale);

        // Sync score/combo
        this.score = this.activeGame.score || 0;
        this.combo = this.activeGame.combo || 0;
        this.maxCombo = Math.max(this.maxCombo, this.activeGame.maxCombo || 0);

        // Score roll-up
        if (this.scoreDisplayed < this.score) {
            const gap = this.score - this.scoreDisplayed;
            this.scoreDisplayed = Math.min(this.scoreDisplayed + Math.max(3, gap * 0.3), this.score);
        }

        // HUD - Score
        ctx.fillStyle = rgb(Colors.green, 0.9);
        ctx.font = 'bold 10px Arial';
        ctx.textAlign = 'left';
        ctx.textBaseline = 'top';
        ctx.fillText(`Score: ${Math.round(this.scoreDisplayed)}`, 4, 2);

        // HUD - Combo (only if game doesn't show its own)
        const showHostCombo = this.activeGame.showHostCombo !== false; // default true
        if (showHostCombo && this.combo >= 2) {
            ctx.fillStyle = rgb(Colors.green, 0.9);
            ctx.font = 'bold 9px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(`${this.combo}x Combo`, DISPLAY_W / 2, 2);
        }

        this.prevCombo = this.combo;

        // HUD - Game-specific text (bottom center, from getHudText)
        if (this.activeGame.getHudText) {
            const hudStr = this.activeGame.getHudText();
            if (hudStr && hudStr.length > 0) {
                ctx.fillStyle = rgb(Colors.white, 0.7);
                ctx.font = 'bold 8px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'bottom';
                ctx.fillText(hudStr, DISPLAY_W / 2, DISPLAY_H - 8);
            }
        }

        // HUD - FPS (top right, matches MATLAB ArcadeGameLauncher)
        this.fpsBuffer = this.fpsBuffer || [];
        this.fpsBuffer.push(dt);
        if (this.fpsBuffer.length > 30) this.fpsBuffer.shift();
        const avgDt = this.fpsBuffer.reduce((a,b) => a+b, 0) / this.fpsBuffer.length;
        ctx.fillStyle = rgb(Colors.green, 0.9);
        ctx.font = 'bold 10px Arial';
        ctx.textAlign = 'right';
        ctx.textBaseline = 'top';
        ctx.fillText(`${Math.round(1/avgDt)} fps`, DISPLAY_W - 4, 2);

        // Check game over
        if (!this.activeGame.isRunning) {
            this.enterResults();
        }
    },

    enterMenu() {
        this.state = 'menu';
        if (this.activeGame) {
            this.activeGame.cleanup();
            this.activeGame = null;
        }
        this.hitEffects.clear();
    },

    enterActive() {
        this.state = 'active';
    },

    enterPaused() {
        this.state = 'paused';
    },

    enterResults() {
        this.state = 'results';
        this.resultElapsed = performance.now() / 1000 - this.sessionStartTime;
        if (this.activeGame && this.score > 0) {
            ScoreStore.submit(this.activeGameName, this.score, this.maxCombo, this.resultElapsed);
        }
    },

    restartGame() {
        if (this.activeGame) this.activeGame.cleanup();
        this.hitEffects.clear();
        const idx = this.games.findIndex(g => g.name === this.activeGameName);
        if (idx >= 0) this.launchGame(idx);
    },

    playAgain() {
        this.restartGame();
    },

    drawPaused() {
        // Don't call game.update() — MATLAB doesn't update during pause.
        // Just draw the overlay on whatever was last rendered.
        ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
        ctx.fillRect(0, 0, DISPLAY_W, DISPLAY_H);
        ctx.fillStyle = rgb(Colors.gold, 0.9);
        ctx.font = 'bold 20px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('PAUSED', DISPLAY_W / 2, DISPLAY_H / 2);
    },

    drawResults() {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
        ctx.fillRect(0, 0, DISPLAY_W, DISPLAY_H);

        const cx = DISPLAY_W / 2;
        const cy = DISPLAY_H / 2;
        let results = { title: 'GAME OVER', lines: [] };
        if (this.activeGame && this.activeGame.getResults) {
            results = this.activeGame.getResults();
        }

        // Title
        ctx.fillStyle = rgb(Colors.gold);
        ctx.font = 'bold 20px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(results.title, cx, cy - DISPLAY_H * 0.15);

        // Game-specific lines
        ctx.fillStyle = rgb(Colors.white, 0.85);
        ctx.font = 'bold 9px Arial';
        let lineY = cy - DISPLAY_H * 0.05;
        for (const line of (results.lines || [])) {
            ctx.fillText(line, cx, lineY);
            lineY += 18;
        }

        // Score / combo / time
        ctx.fillText(`Score: ${this.score}  |  Max Combo: ${this.maxCombo}  |  Time: ${Math.round(this.resultElapsed)}s`, cx, lineY);
        lineY += 18;

        // High score
        const rec = ScoreStore.get(this.activeGameName);
        if (this.score >= rec.highScore && this.score > 0) {
            ctx.fillStyle = rgb(Colors.gold);
            ctx.fillText(`★  NEW HIGH SCORE: ${this.score}  ★`, cx, lineY);
        } else if (rec.highScore > 0) {
            ctx.fillText(`High Score: ${rec.highScore}`, cx, lineY);
        }
        lineY += 25;

        ctx.fillStyle = rgb(Colors.white, 0.5);
        ctx.fillText('[R] PLAY AGAIN   |   [ESC] MENU', cx, lineY);
    },
};

        this.hitEffects = new HitEffectSystem();
    }

    init(canvas, ctx, displayRange) {
        this.canvas = canvas;
        this.ctx = ctx;
        this.dr = displayRange; // {x:[0,854], y:[0,480]}
        const dx = displayRange.x;
        const dy = displayRange.y;
        const cx = (dx[0] + dx[1]) / 2;
        const cy = (dy[0] + dy[1]) / 2;
        const areaW = dx[1] - dx[0]; // 854
        const areaH = dy[1] - dy[0]; // 480

        // === SCALED CONSTANTS (Pong.m onInit, lines 107-114) ===
        this.paddleHalfH = Math.max(8, Math.round(areaH * 0.15));    // line 107
        this.paddleWidth = Math.max(3, Math.round(areaW * 0.025));    // line 108
        this.paddleMargin = Math.max(6, Math.round(areaW * 0.06));    // line 109
        this.ballRadius = Math.max(3, Math.round(Math.min(areaH, areaW) * 0.035)); // line 110
        this.ballBaseSpeed = Math.max(0.625, areaW * 0.00833);        // line 112
        this.aiBaseSpeed = Math.max(0.417, areaH * 0.00833);          // line 113
        this.aiErrorPx = Math.max(5, areaH * 0.12);                   // line 114

        // === DIRECT CONSTANTS (Pong.m lines 15-25) ===
        this.ballSpeedGain = 1.08;    // line 15
        this.winScore = 10;            // line 16
        this.restitution = 0.95;       // line 23
        this.trailLen = 20;            // line 24

        // Speed scale for flickSpeedColor mapping (line 119)
        this.speedScale = 4.8 / Math.max(this.ballBaseSpeed, 1);

        // === GAME STATE (Pong.m lines 31-66) ===
        this.ballPos = [cx, cy];
        this.ballVel = [0, 0];
        this.ballPhase = 0;
        this.playerScore = 0;
        this.opponentScore = 0;
        this.playerPaddleY = cy;
        this.aiPaddleY = cy;
        this.aiTargetY = cy;
        this.aiRecalcCD = 0;
        this.serveDir = 1;
        this.serveCountdown = 0;
        this.serving = false;
        this.rallyHits = 0;
        this.maxRally = 0;
        this.totalRallies = 0;

        // Trail circular buffer (lines 137-139)
        this.trailBufX = new Float64Array(this.trailLen).fill(NaN);
        this.trailBufY = new Float64Array(this.trailLen).fill(NaN);
        this.trailIdx = 0;

        // Combo state
        this.comboShowTime = null;
        this.comboFadeTime = null;
        this.comboFadeColor = Colors.Green;
        this.comboPos = [0, 0];
        this.comboText = '';
        this.comboVisible = false;

        this.score = 0;
        this.combo = 0;
        this.maxCombo = 0;

        // Start first serve (line 230)
        this.beginServe();
        this.isRunning = true;
    }

    // === beginServe — Pong.m lines 416-428 ===
    beginServe() {
        const cx = (this.dr.x[0] + this.dr.x[1]) / 2;
        const cy = (this.dr.y[0] + this.dr.y[1]) / 2;
        this.ballPos = [cx, cy];
        this.ballVel = [0, 0];
        this.serving = true;
        this.serveCountdown = 120;         // line 423: 120 frames
        this.serveDir = 1;                  // line 424: always serve toward player (right)
        this.trailBufX.fill(NaN);
        this.trailBufY.fill(NaN);
        this.trailIdx = 0;
    }

    // === launchBall — Pong.m lines 430-438 ===
    launchBall() {
        const launchAngle = (Math.random() - 0.5) * Math.PI / 3;   // line 432
        const speed = this.ballBaseSpeed;
        this.ballVel = [
            speed * this.serveDir * Math.cos(launchAngle),
            speed * Math.sin(launchAngle)
        ];
        this.serving = false;
    }

    // === computeDifficulty — Pong.m lines 560-568 ===
    computeDifficulty() {
        const totalPoints = this.playerScore + this.opponentScore;
        let d = Math.min(1.0, totalPoints / (this.winScore * 2 - 2));  // line 563
        const maxScore = Math.max(this.playerScore, this.opponentScore);
        if (maxScore >= 7) {                                     // line 565
            const urgency = (maxScore - 6) / 4;
            d = Math.max(d, urgency);
        }
        return d;
    }

    // === predictIntercept — Pong.m lines 571-612 ===
    predictIntercept() {
        const dx = this.dr.x;
        const dy = this.dr.y;
        const aiX = dx[0] + this.paddleMargin;

        let simX = this.ballPos[0];
        let simY = this.ballPos[1];
        let simVx = this.ballVel[0];
        let simVy = this.ballVel[1];

        if (simVx >= 0) return (dy[0] + dy[1]) / 2;  // line 582-584

        for (let bounce = 0; bounce < 10; bounce++) {   // line 587
            if (simVx === 0) break;
            const tPaddle = (aiX - simX) / simVx;      // line 589
            if (tPaddle < 0) break;

            let tWall = Infinity;
            if (simVy !== 0) {
                if (simVy < 0) {
                    tWall = (dy[0] - simY) / simVy;    // line 594
                } else {
                    tWall = (dy[1] - simY) / simVy;    // line 596
                }
            }

            if (tWall > 0 && tWall < tPaddle) {        // line 602
                simX += simVx * tWall;
                simY += simVy * tWall;
                simVy = -simVy;
            } else {
                return simY + simVy * tPaddle;          // line 607
            }
        }
        return simY;
    }

    // === updateAIPaddle — Pong.m lines 524-558 ===
    updateAIPaddle(dtScale) {
        const dy = this.dr.y;
        const d = this.computeDifficulty();

        // Derived parameters (lines 530-532)
        const paddleSpeed = this.aiBaseSpeed * (0.4 + d * 0.6);
        const reactionFrames = Math.round(20 - d * 16);
        const errorPx = this.aiErrorPx * (1.5 - d * 1.2);

        // Recalculate target periodically (lines 535-543)
        this.aiRecalcCD -= 1;
        if (this.aiRecalcCD <= 0) {
            this.aiRecalcCD = Math.max(2, reactionFrames);   // line 537
            if (this.ballVel[0] < 0) {

        // --- Paddle (lines 206-220) ---

        const ph = this.paddleHt;

        const pw = this.paddleW;

        // Breathing glow alpha (line 351)

        // Glow layer

        ctx.shadowBlur = 12;
        ctx.fillStyle = rgb(Colors.Cyan, glowAlpha);

                ctx.shadowBlur = 0;

                ctx.strokeStyle = rgb(trailColor, trailAlpha);
                ctx.lineWidth = trailWidth;
                ctx.beginPath();
                ctx.moveTo(trailX[0], trailY[0]);
                for (let i = 1; i < trailX.length; i++) ctx.lineTo(trailX[i], trailY[i]);

                if (!isNaN(eb.trailBufX[idx])) {

                    ty.push(eb.trailBufY[idx]);

                ctx.strokeStyle = rgb(ebColor, 0.3);
                ctx.lineWidth = 1;
                ctx.beginPath();

                ctx.stroke();

        if (!isNaN(this.ballPos[0])) {
            const bx = this.ballPos[0];
            const by = this.ballPos[1];
            const r = this.ballRadius;

            const auraColor = isFireball ? Colors.Red : ballColor;
            const auraAlpha = isFireball ? 0.25 : 0.15;
            const auraR = isFireball ? r * 3.5 : r * 2.5;

            ctx.arc(bx, by, auraR, 0, Math.PI * 2);
            ctx.fillStyle = rgb(auraColor, auraAlpha);
            ctx.shadowColor = rgb(auraColor, 0.3);
            ctx.shadowBlur = r * 3;
            ctx.fill();
            ctx.shadowBlur = 0;

            // Glow ring

            const glA = isFireball ? 0.7 : 0.5;
            ctx.beginPath();
            ctx.arc(bx, by, r * 1.25, 0, Math.PI * 2);
            ctx.fillStyle = rgb(glowColor, glA);
            ctx.shadowColor = rgb(glowColor, 0.6);
            ctx.shadowBlur = r * 2;
            ctx.fill();
            ctx.shadowBlur = 0;

            // Core
            ctx.beginPath();
            ctx.arc(bx, by, r, 0, Math.PI * 2);
            ctx.fillStyle = rgb(Colors.White, 1);
            ctx.fill();

        // --- Extra balls ---
        for (const eb of this.extraBalls) {
            const bx = eb.pos[0];
            const by = eb.pos[1];
            const r = this.ballRadius;
            const ebSpd = Math.hypot(eb.vel[0], eb.vel[1]);
            const ebRatio = ebSpd / Math.max(this.ballBaseSpeed, 1);

            ctx.arc(bx, by, r * 2, 0, Math.PI * 2);
            ctx.fillStyle = rgb(ebColor, 0.15);
            ctx.fill();

            ctx.beginPath();
            ctx.arc(bx, by, r * 1.1, 0, Math.PI * 2);
            ctx.fillStyle = rgb(ebColor, 0.4);
            ctx.fill();

            ctx.beginPath();
            ctx.arc(bx, by, r * 0.8, 0, Math.PI * 2);
            ctx.fillStyle = rgb(Colors.White, 1);
            ctx.fill();

        // --- Power-ups (falling capsules) ---
        for (const pu of this.powerUps) {
            // Glow
            ctx.beginPath();
            ctx.arc(pu.x, pu.y, pu.radius * 1.5, 0, Math.PI * 2);
            ctx.fillStyle = rgb(pu.color, 0.2);
            ctx.shadowColor = rgb(pu.color, 0.4);
            ctx.shadowBlur = 8;
            ctx.fill();
            ctx.shadowBlur = 0;

            // Capsule body
            ctx.beginPath();
            ctx.arc(pu.x, pu.y, pu.radius, 0, Math.PI * 2);
            ctx.fillStyle = rgb(pu.color, 0.6);
            ctx.strokeStyle = rgb(pu.color, 1);
            ctx.lineWidth = 0.8;
            ctx.fill();
            ctx.stroke();

            // Label
            ctx.font = 'bold 10px sans-serif';
            ctx.fillStyle = rgb(Colors.White, 1);
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(pu.type, pu.x, pu.y);
        }

        // --- Hit effects ---
        this.hitEffects.draw(ctx);

        // --- HUD: Level / Lives (line 237-240) ---
        ctx.font = 'bold 12px sans-serif';
        ctx.fillStyle = rgb(Colors.Cyan, 0.6);
        ctx.textAlign = 'left';
        ctx.textBaseline = 'bottom';
        ctx.fillText(`Level: ${Math.min(this.level, this.maxLevel)}/${this.maxLevel}  |  Lives: ${this.lives}`, dx[0] + 5, dy[1] - 5);

        // --- Level announce text (lines 246-250, 304-308) ---
        if (this.levelPhase === 'announce') {
            const tProg = 1 - Math.max(0, this.levelTransFrames) / 60;
            let alpha = 1;
            if (tProg > 0.7) alpha = Math.max(0, (1 - tProg) / 0.3);
            ctx.font = 'bold 39px sans-serif';
            ctx.fillStyle = rgb(Colors.Cyan, alpha);
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowColor = rgb(Colors.Cyan, alpha * 0.5);
            ctx.shadowBlur = 15;
            ctx.fillText(`LEVEL ${this.level}`, cx, cy);
            ctx.shadowBlur = 0;
        }

        // --- Lives flash (lines 507-522) ---
        if (this.livesFlashTime !== null) {
            const elapsed = (performance.now() - this.livesFlashTime) / 1000;
            const showDur = 0.6;   // line 510
            const fadeDur = 0.4;   // line 511
            let alpha;
            if (elapsed < showDur) {
                alpha = 1;
            } else if (elapsed < showDur + fadeDur) {
                alpha = 1 - (elapsed - showDur) / fadeDur;
            } else {
                this.livesFlashTime = null;
                alpha = 0;
            }
            if (alpha > 0) {
                ctx.font = 'bold 26px sans-serif';
                ctx.fillStyle = rgb(this.livesFlashColor, alpha);
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(this.livesFlashText, cx, cy);
            }
        }
    }

    onKeyPress(key) {
        return false; // Breakout.m line 589
    }

    onMouseDown() {
        // No click handling in Breakout
    }

    cleanup() {
        this.isRunning = false;
        this.hitEffects.cleanup();
    }

    getResults() {
        let statusStr;
        if (this.level > this.maxLevel) {
            statusStr = 'YOU WIN!';
        } else if (this.lives <= 0) {
            statusStr = 'GAME OVER';
        } else {
            statusStr = `SCORE: ${this.score}`;
        }
        return {
            title: 'BREAKOUT',
            lines: [
                statusStr,
                `Level: ${Math.min(this.level, this.maxLevel)}/${this.maxLevel}  |  Bricks: ${this.bricksDestroyed}`,
            ]
        };
    }
}

    init(canvas, ctx, displayRange) {
        this.canvas = canvas;
        this.ctx = ctx;
        this.dr = displayRange;

        const dy = displayRange.y;

        const areaH = dy[1] - dy[0];

        this.gridRows = Math.max(8, Math.round(25 * areaH / Math.max(areaW, areaH)));  // line 101
        this.cellW = areaW / this.gridCols;   // line 102
        this.cellH = areaH / this.gridRows;   // line 103

        // === Step timing (lines 106-107) ===
        this.stepAccum = 0;
        this.stepInterval = 4;    // line 107: DtScale units between steps

        // === Initial snake: 5 segments at center, moving right (lines 111-117) ===

        const cy = Math.round(this.gridRows / 2);

            this.body.push([cx - i, cy]);    // head at cx, tail extends left (line 115)
        }

        this.prevPos = [NaN, NaN];

        // === Colormap (Snake.m lines 514-541) ===
        // Default: cyan -> green gradient (lines 529-530)

        // Combo
        this.comboTimeout = 2.4;     // line 45

        this.score = 0;
        this.combo = 0;
        this.maxCombo = 0;

    }

    // === buildColormap — Snake.m lines 514-541 ===
    // Default: cyan * (1 - t*0.6) + green * (t*0.6) for 256 rows
    buildColormap() {
        const nRows = 256;
        const cmap = [];
        for (let i = 0; i < nRows; i++) {
            const t = i / (nRows - 1);
            cmap.push([
                Colors.Cyan[0] * (1 - t * 0.6) + Colors.Green[0] * (t * 0.6),
                Colors.Cyan[1] * (1 - t * 0.6) + Colors.Green[1] * (t * 0.6),
                Colors.Cyan[2] * (1 - t * 0.6) + Colors.Green[2] * (t * 0.6),
            ]);
        }
        return cmap;

    gridToData(gridPos) {
        const dx = this.dr.x;
        const dy = this.dr.y;

            dx[0] + (gridPos[0] - 0.5) * this.cellW,   // line 361
            dy[0] + (gridPos[1] - 0.5) * this.cellH,    // line 362

        const nC = this.gridCols;
        const nR = this.gridRows;

        // Try random positions up to 200 times (line 407)

            const candidate = [Math.floor(Math.random() * nC) + 1,
                               Math.floor(Math.random() * nR) + 1];
            let occupied = false;
            for (const seg of this.body) {
                if (seg[0] === candidate[0] && seg[1] === candidate[1]) {
                    occupied = true;
                    break;
                }
            }
            if (!occupied) {
                this.foodPos = candidate;
                return;
            }

        // Fallback: scan (lines 416-425)

            for (let r = 1; r <= nR; r++) {

                for (const seg of this.body) {

                    return;

            const delta = [pos[0] - this.prevPos[0], pos[1] - this.prevPos[1]];
            const dist = Math.hypot(delta[0], delta[1]);
            if (dist > cellData * 0.25) {   // line 215
                let newDir;

            if (this.queuedDir[0] + this.direction[0] !== 0 ||

                    this.render();
                    return;
                }
            }
        }

        // --- Food collision (lines 267-279) ---
        let ate = false;
        if (!isNaN(this.foodPos[0]) && newHead[0] === this.foodPos[0] && newHead[1] === this.foodPos[1]) {
            ate = true;
            this.incrementCombo();
            this.lastFoodTime = performance.now();
            const totalPoints = Math.round(100 * this.comboMultiplier()); // line 272
            this.addScore(totalPoints);

            const foodXY = this.gridToData(this.foodPos);
            this.hitEffects.spawnBounceEffect(foodXY, [0, -1], totalPoints, 5);  // line 275

            this.spawnFood();

            // Speed up (line 279)
            const bodyLen = nBody + 1;

        if (this.lastFoodTime !== null && (performance.now() - this.lastFoodTime) / 1000 > this.comboTimeout) {

        }

        if (ate) {

    }

    // === RENDERING ===
    render() {
        const ctx = this.ctx;
        const dx = this.dr.x;
        const dy = this.dr.y;
        const areaW = dx[1] - dx[0];

            ctx.fillStyle = rgb(this.colormapRGB[cmapSize - 1], 0.55);
            ctx.shadowColor = rgb(this.colormapRGB[cmapSize - 1], 0.6);
            ctx.shadowBlur = 8;
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        // --- Food (lines 183-188, with glow) ---
        if (!isNaN(this.foodPos[0])) {
            const foodXY = this.gridToData(this.foodPos);
            const foodR = cellData * 0.45;

            // Glow (line 183: MarkerFaceAlpha 0.18)
            ctx.beginPath();
            ctx.arc(foodXY[0], foodXY[1], foodR * 2.2, 0, Math.PI * 2);

            ctx.shadowBlur = 0;

            // Core (line 187)
            ctx.beginPath();
            ctx.arc(foodXY[0], foodXY[1], foodR, 0, Math.PI * 2);
            ctx.fillStyle = rgb(Colors.Red, 1);
            ctx.shadowColor = rgb(Colors.Red, 0.8);
            ctx.shadowBlur = 6;
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        // --- Hit effects ---
        this.hitEffects.draw(ctx);
    }

    // === onKeyPress — Snake.m lines 318-338 ===
    onKeyPress(key) {
        switch (key) {
            case 'ArrowUp':
                this.queuedDir = [0, -1];    // line 324
                this.keyboardMode = true;
                return true;
            case 'ArrowDown':
                this.queuedDir = [0, 1];     // line 327
                this.keyboardMode = true;
                return true;
            case 'ArrowLeft':
                this.queuedDir = [-1, 0];    // line 330
                this.keyboardMode = true;
                return true;
            case 'ArrowRight':
                this.queuedDir = [1, 0];     // line 333
                this.keyboardMode = true;
                return true;
            default:
                return false;
        }
    }

    onMouseDown() {
        // No click handling in Snake
    }

    cleanup() {
        this.isRunning = false;
        this.hitEffects.cleanup();
    }

    // === getResults — Snake.m lines 341-348 ===
    getResults() {
        return {
            title: 'SNAKE',
            lines: [
                `Length: ${this.body.length}`,
            ]
        };
    }
}

            case 3: cols = 10; rows = 3; rowTypes = [3, 2, 1]; break;            // Armada
            case 4: cols = 8;  rows = 4; rowTypes = [3, 3, 2, 1]; break;         // Elites

            // UFO dome — SpaceInvaders.m lines 930-935
            sx = [-0.3, -0.7, -1, -1, -0.65, -0.45, -0.7, -0.3, 0,
                   0.3,  0.7,  0.45,  0.65,  1,  1,  0.7,  0.3].map(v => v * aw2);
            sy = [-1, -0.8, -0.25, 0.2, 0.4, 0.3, 1, 0.55, 0.9,
                   0.55, 1, 0.3, 0.4, 0.2, -0.25, -0.8, -1].map(v => v * ah2);
        }
        return [sx, sy];
    }

    onKeyPress(key) {
        return false; // SpaceInvaders.m line 616: no mode-specific keys
    }

    onMouseDown() {
        // No click action
    }

    cleanup() {
        this.isRunning = false;
        this.hitEffects.clear();
    }

    getResults() {
        // SpaceInvaders.m getResults lines 620-630
        const title = (this.wave >= 5 && this.aliens.length === 0) ? 'YOU WIN!' : 'SPACE INVADERS';
        return {
            title,
            lines: [`Wave: ${this.wave}`],
        };
    }
}

if (typeof module !== 'undefined' && module.exports) {
    module.exports = { TetrisGame, AsteroidsGame, SpaceInvadersGame, HitEffectsManager };

class FlappyBirdGame {
    constructor() {
        this.name = "Flappy Bird";
        this.score = 0;
        this.combo = 0;
        this.maxCombo = 0;
        this.isRunning = false;

        // Pipe pool
        this.poolSize = 6;
        this.pipeX = new Float64Array(6);
        this.pipeGapY = new Float64Array(6);
        this.pipeGapHSlot = new Float64Array(6);
        this.pipeScored = new Uint8Array(6);
        this.pipeVisible = new Uint8Array(6);
        this.pipeIdx = []; // active slot indices (FIFO)

        // Pipe parameters
        this.pipeSpeed = 0;
        this.pipeBaseSpeed = 0;
        this.pipeTargetSpeed = 0;
        this.pipeSpeedDecay = 0.0021;
        this.pipeWidth = 0;
        this.pipeGapH = 0;
        this.pipeBaseGapH = 0;
        this.pipeSpacing = 0;

        // Session
        this.pipesCleared = 0;
        this.invulnFrames = 0;

        // Bird (gravity/flap mode — always in web version)
        this.birdY = 0;
        this.birdVelY = 0;
        this.birdFixedX = 0;
        this.gravity = 0;
        this.flapImpulse = 0;
        this.flapPending = false;

        // Bird rendering
        this.birdRadius = 8;
        this.collisionR = 4;
        this.birdColor = ColorCyan;

        // Display
        this.areaW = 854;
        this.areaH = 480;
        this.dx = [0, 854];
        this.dy = [0, 480];
        this.canvas = null;
        this.ctx = null;
    }

    init(canvas, ctx, displayRange) {
        this.canvas = canvas;
        this.ctx = ctx;
        this.dx = [displayRange.X[0], displayRange.X[1]];
        this.dy = [displayRange.Y[0], displayRange.Y[1]];
        this.areaW = this.dx[1] - this.dx[0];
        this.areaH = this.dy[1] - this.dy[0];

        this.score = 0;
        this.combo = 0;
        this.maxCombo = 0;
        this.isRunning = true;
        this.pipesCleared = 0;
        this.invulnFrames = 0;

        // Scale sizes to display area (matching MATLAB onInit)
        this.birdRadius = Math.max(6, Math.round(Math.min(this.areaW, this.areaH) * 0.06));
        // Collision radius: approximate scatter SizeData -> data units conversion
        // In MATLAB: coreSD = (max(8, birdRadius*2))^2, coreDiamPts = 2*sqrt(coreSD/pi)
        // Simplified for canvas: use ~40% of birdRadius as collision radius
        const coreSize = Math.max(8, this.birdRadius * 2);
        this.collisionR = coreSize * 0.35;

        this.pipeWidth = Math.max(12, Math.round(this.areaW * 0.08));
        this.pipeGapH = Math.max(35, Math.round(this.areaH * 0.35));
        this.pipeBaseGapH = this.pipeGapH;
        this.pipeSpacing = Math.max(40, Math.round(this.areaW * 0.35));
        this.pipeBaseSpeed = Math.max(0.333, this.areaW * 0.0033);
        this.pipeSpeed = this.pipeBaseSpeed;
        this.pipeTargetSpeed = this.pipeBaseSpeed;

        // Flap mode
        this.birdFixedX = this.dx[0] + this.areaW * 0.25;
        this.birdY = (this.dy[0] + this.dy[1]) / 2;
        this.birdVelY = 0;
        this.gravity = this.areaH * 0.0008;
        this.flapImpulse = -this.areaH * 0.013;
        this.flapPending = false;
        this.birdColor = ColorCyan;

        // Reset pipe pool
        this.pipeX.fill(NaN);
        this.pipeGapY.fill(NaN);
        this.pipeGapHSlot.fill(NaN);
        this.pipeScored.fill(0);
        this.pipeVisible.fill(0);
        this.pipeIdx = [];

        // Pipe edge colors (for gold flash)
        this.pipeEdgeColor = [];
        for (let i = 0; i < this.poolSize; i++) {
            this.pipeEdgeColor.push([...ColorGreen]);
        }

        // Hit effects pool
        this.hitEffects = [];

        // Spawn first pipe with initial offset
        this.spawnPipe(this.dx[1] + this.pipeSpacing * 0.5);
    }

    update(mousePos, dt, dtScale) {
        if (!this.isRunning) return;
        const ds = dtScale;
        const dx = this.dx;
        const dy = this.dy;
        const cr = this.collisionR;
        const pw = this.pipeWidth;
        let active = this.pipeIdx;
        const ctx = this.ctx;

        // ---- Bird position (flap mode) ----
        if (this.flapPending) {
            this.birdVelY = this.flapImpulse;
            this.flapPending = false;
        }

        this.birdVelY += this.gravity * ds;
        this.birdY += this.birdVelY * ds;

        let bx = this.birdFixedX;
        let by = this.birdY;

        // Clamp to display bounds + boundary collision
        if (by - cr < dy[0]) {
            by = dy[0] + cr;
            this.birdY = by;
            this.birdVelY = 0;
            if (this.invulnFrames <= 0) {
                this.loseLife(bx, by);
                this.render(bx, by);
                return;
            }
        } else if (by + cr > dy[1]) {
            by = dy[1] - cr;
            this.birdY = by;
            this.birdVelY = 0;
            if (this.invulnFrames <= 0) {
                this.loseLife(bx, by);
                this.render(bx, by);
                return;
            }
        }

        // ---- Smooth speed toward target ----
        if (this.pipeSpeed !== this.pipeTargetSpeed) {
            const step = this.pipeSpeedDecay * this.pipeSpeed * ds;
            if (this.pipeSpeed < this.pipeTargetSpeed) {
                this.pipeSpeed = Math.min(this.pipeTargetSpeed, this.pipeSpeed + step);
            } else {
                this.pipeSpeed = Math.max(this.pipeTargetSpeed, this.pipeSpeed - step);
            }
        }

        // ---- Move active pipes left ----
        const spd = this.pipeSpeed * ds;
        for (let j = 0; j < active.length; j++) {
            const s = active[j];
            this.pipeX[s] -= spd;
        }

        // ---- Recycle pipes that exited left ----
        while (active.length > 0 && this.pipeX[active[0]] + pw < dx[0]) {
            const s = active[0];
            this.pipeVisible[s] = 0;
            active.shift();
        }
        this.pipeIdx = active;

        // ---- Spawn new pipes ----
        if (active.length === 0) {
            this.spawnPipe(dx[1]);
            active = this.pipeIdx;
        } else if (this.pipeX[active[active.length - 1]] < dx[1] - this.pipeSpacing) {
            this.spawnPipe(dx[1]);
            active = this.pipeIdx;
        }

        // ---- Invulnerability blink ----
        let birdVisible = true;
        if (this.invulnFrames > 0) {
            this.invulnFrames -= ds;
            birdVisible = (this.invulnFrames % 8) < 4;
            if (this.invulnFrames <= 0) {
                this.birdColor = ColorCyan;
                birdVisible = true;
            }
        } else {
            // ---- Collision detection ----
            for (let j = 0; j < active.length; j++) {
                const s = active[j];
                const px = this.pipeX[s];
                if (bx + cr > px && bx - cr < px + pw) {
                    const gapTop = this.pipeGapY[s] - this.pipeGapHSlot[s] / 2;
                    const gapBot = this.pipeGapY[s] + this.pipeGapHSlot[s] / 2;
                    if (by - cr < gapTop || by + cr > gapBot) {
                        this.loseLife(bx, by);
                        this.render(bx, by);
                        return;
                    }
                }
            }
        }

        // ---- Mark pipes passed during invulnerability (no points) ----
        if (this.invulnFrames > 0) {
            for (let j = 0; j < active.length; j++) {
                const s = active[j];
                if (!this.pipeScored[s]) {
                    if (this.pipeX[s] + pw / 2 < bx) {
                        this.pipeScored[s] = 1;
                    }
                }
            }
        }

        // ---- Score pipe passes ----
        if (this.invulnFrames <= 0) {
            for (let j = 0; j < active.length; j++) {
                const s = active[j];
                if (!this.pipeScored[s]) {
                    if (this.pipeX[s] + pw / 2 < bx) {
                        this.pipeScored[s] = 1;
                        this.pipesCleared++;
                        this.incrementCombo();
                        const totalPts = Math.round(100 * this.comboMultiplier());
                        this.score += totalPts;

                        // Scaling
                        this.pipeTargetSpeed = this.pipeBaseSpeed * (1 + 0.06 * this.combo);
                        this.pipeGapH = Math.max(this.collisionR * 8,
                            this.pipeBaseGapH * Math.max(0.25, 1 - 0.05 * this.combo));

                        // Flash scored pipe gold
                        this.pipeEdgeColor[s] = [...ColorGold];

                        // Spawn hit effect
                        this.spawnHitEffect(this.pipeX[s] + pw / 2,
                            this.pipeGapY[s], ColorGreen, totalPts, this.pipeGapHSlot[s] / 3);
                    }
                }
            }
        }

        // Update hit effects
        this.updateHitEffects(ds);

        // Render
        this.render(bx, by, birdVisible);
    }

    render(bx, by, birdVisible) {
        const ctx = this.ctx;
        const dx = this.dx;
        const dy = this.dy;
        const pw = this.pipeWidth;
        const active = this.pipeIdx;

        // ---- Draw pipes ----
        for (let j = 0; j < active.length; j++) {
            const s = active[j];
            if (!this.pipeVisible[s]) continue;
            const px = this.pipeX[s];
            const gapTop = this.pipeGapY[s] - this.pipeGapHSlot[s] / 2;
            const gapBot = this.pipeGapY[s] + this.pipeGapHSlot[s] / 2;
            const ec = this.pipeEdgeColor[s];

            // Top pipe
            ctx.fillStyle = rgb(ec, 0.15);
            ctx.strokeStyle = rgb(ec, 1);
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.rect(px, dy[0] - 10, pw, gapTop - (dy[0] - 10));
            ctx.fill();
            ctx.stroke();

            // Bottom pipe
            ctx.beginPath();
            ctx.rect(px, gapBot, pw, dy[1] + 10 - gapBot);
            ctx.fill();
            ctx.stroke();

            // Neon glow on pipe edges
            ctx.save();
            ctx.shadowBlur = 12;
            ctx.shadowColor = rgb(ec, 0.6);
            ctx.strokeStyle = rgb(ec, 0.5);
            ctx.lineWidth = 1;
            // Top pipe bottom edge (gap edge)
            ctx.beginPath();
            ctx.moveTo(px, gapTop);
            ctx.lineTo(px + pw, gapTop);
            ctx.stroke();
            // Bottom pipe top edge (gap edge)
            ctx.beginPath();
            ctx.moveTo(px, gapBot);
            ctx.lineTo(px + pw, gapBot);
            ctx.stroke();
            ctx.restore();
        }

        // ---- Draw bird ----
        if (birdVisible !== false) {
            const glowSize = Math.max(15, this.birdRadius * 4);
            const coreSize = Math.max(8, this.birdRadius * 2);

            // Glow layer
            ctx.save();
            ctx.globalAlpha = 0.25;
            ctx.shadowBlur = glowSize;
            ctx.shadowColor = rgb(this.birdColor, 0.6);
            ctx.fillStyle = rgb(this.birdColor);
            ctx.beginPath();
            ctx.arc(bx, by, glowSize / 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();

            // Core
            ctx.save();
            ctx.shadowBlur = 8;
            ctx.shadowColor = rgb(this.birdColor, 0.8);
            ctx.fillStyle = rgb(this.birdColor);
            ctx.beginPath();
            ctx.arc(bx, by, coreSize / 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }

        // ---- Draw hit effects ----
        this.renderHitEffects(ctx);
    }

    onKeyPress(key) {
        if (key === ' ' || key === 'ArrowUp') {
            this.flapPending = true;
            return true;
        }
        return false;
    }

    onMouseDown() {
        this.flapPending = true;
    }

    cleanup() {
        this.isRunning = false;
        this.pipeIdx = [];
        this.hitEffects = [];
    }

    getResults() {
        return {
            title: "FLAPPY BIRD",
            lines: [`Pipes: ${this.pipesCleared}`]
        };
    }

    // ---- Private methods ----

    spawnPipe(spawnX) {
        const dy = this.dy;
        const pw = this.pipeWidth;
        const gapH = this.pipeGapH;

        // Find idle pool slot
        const allSlots = [];
        for (let i = 0; i < this.poolSize; i++) allSlots.push(i);
        const activeSet = new Set(this.pipeIdx);
        const idle = allSlots.filter(s => !activeSet.has(s));
        if (idle.length === 0) return;
        const s = idle[0];

        // Random gap Y (constrained so both pipe halves visible)
        const minPipeH = gapH * 0.3;
        const gapMinY = dy[0] + gapH / 2 + minPipeH;
        const gapMaxY = dy[1] - gapH / 2 - minPipeH;
        const gapY = gapMinY + Math.random() * (gapMaxY - gapMinY);

        this.pipeX[s] = spawnX;
        this.pipeGapY[s] = gapY;
        this.pipeGapHSlot[s] = gapH;
        this.pipeScored[s] = 0;
        this.pipeVisible[s] = 1;
        this.pipeEdgeColor[s] = [...ColorGreen];

        this.pipeIdx.push(s);
    }

    loseLife(bx, by) {
        this.resetCombo();
        this.pipeGapH = this.pipeBaseGapH;
        this.pipeTargetSpeed = this.pipeBaseSpeed;

        // Red burst at bird
        this.spawnBounceEffect(bx, by, 0, -1, 0, 15);

        // Invulnerability (96 frames)
        this.invulnFrames = 96;
        this.birdColor = [...ColorRed];

        // Reset velocity in flap mode
        this.birdVelY = 0;
    }

    incrementCombo() {
        this.combo++;
        this.maxCombo = Math.max(this.maxCombo, this.combo);
    }

    resetCombo() {
        this.combo = 0;
    }

    comboMultiplier() {
        return Math.max(1, this.combo / 10);
    }

    // Hit effects system (shared pattern from GameBase)
    spawnHitEffect(x, y, clr, points, effectRadius) {
        if (effectRadius === undefined) effectRadius = 20;
        const nRays = 8;
        const maxFrames = 18;
        const angles = [];
        for (let i = 0; i < nRays; i++) {
            angles.push((i / nRays) * Math.PI * 2);
        }
        this.hitEffects.push({
            x, y, color: clr, radius: effectRadius,
            frames: maxFrames, maxFrames,
            nRays, rayCos: angles.map(Math.cos), raySin: angles.map(Math.sin),
            points, type: 'hit'
        });
    }

    spawnBounceEffect(x, y, nx, ny, points, speed) {
        if (speed === undefined) speed = 5;
        const clr = this.flickSpeedColor(speed);
        const sparkLen = Math.min(30, 6 + speed * 1.5);
        const nRays = 5;
        const maxFrames = 22;
        const baseAngle = Math.atan2(ny, nx);
        const angles = [];
        for (let i = 0; i < nRays; i++) {
            angles.push(baseAngle + (-Math.PI / 3 + (2 * Math.PI / 3) * i / (nRays - 1)));
        }
        this.hitEffects.push({
            x, y, color: clr, radius: sparkLen,
            frames: maxFrames, maxFrames,
            nRays, rayCos: angles.map(Math.cos), raySin: angles.map(Math.sin),
            points, type: 'bounce'
        });
    }

    flickSpeedColor(speed) {
        if (speed < 3) return [...ColorCyan];
        if (speed < 7) { const t = (speed - 3) / 4; return lerpColor(ColorCyan, ColorGreen, t); }
        if (speed < 12) { const t = (speed - 7) / 5; return lerpColor(ColorGreen, ColorGold, t); }
        const t = Math.min(1, (speed - 12) / 5);
        return lerpColor(ColorGold, ColorRed, t);
    }

    updateHitEffects(ds) {
        for (let i = this.hitEffects.length - 1; i >= 0; i--) {
            this.hitEffects[i].frames -= ds;
            if (this.hitEffects[i].frames <= 0) {
                this.hitEffects.splice(i, 1);
            }
        }
    }

    renderHitEffects(ctx) {
        for (const fx of this.hitEffects) {
            const t = 1 - fx.frames / fx.maxFrames;
            const eased = 1 - (1 - t) * (1 - t); // ease-out
            const alpha = Math.max(0, 1 - eased * 1.5);
            const expandScale = 1 + eased * 2.5;
            const baseR = fx.radius;

            // Expanding ring
            const r = baseR * expandScale;
            ctx.save();
            ctx.strokeStyle = rgb(fx.color, alpha * 0.8);
            ctx.lineWidth = Math.max(0.5, 3 * (1 - eased));
            ctx.shadowBlur = 8;
            ctx.shadowColor = rgb(fx.color, alpha * 0.4);
            ctx.beginPath();
            ctx.arc(fx.x, fx.y, r, 0, Math.PI * 2);
            ctx.stroke();
            ctx.restore();

            // Burst rays
            const r0 = baseR * (0.5 + eased * 1.5);
            const r1 = baseR * (1.0 + eased * 3.0);
            ctx.strokeStyle = rgb(fx.color, alpha * 0.6);
            ctx.lineWidth = Math.max(0.5, 2 * (1 - eased));
            for (let j = 0; j < fx.nRays; j++) {
                ctx.beginPath();
                ctx.moveTo(fx.x + r0 * fx.rayCos[j], fx.y + r0 * fx.raySin[j]);
                ctx.lineTo(fx.x + r1 * fx.rayCos[j], fx.y + r1 * fx.raySin[j]);
                ctx.stroke();
            }

            // Points text
            if (fx.points > 0) {
                ctx.save();
                const textY = fx.y - baseR - 8 - eased * 20;
                ctx.fillStyle = rgb(fx.color, alpha);
                ctx.font = `bold ${Math.round(14 * (1 + eased * 0.3))}px monospace`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'bottom';
                ctx.shadowBlur = 6;
                ctx.shadowColor = rgb(fx.color, alpha * 0.5);
                ctx.fillText(`+${Math.round(fx.points)}`, fx.x, textY);
                ctx.restore();
            } else if (fx.points === 0 && fx.type === 'hit') {
                ctx.save();
                const textY = fx.y - baseR - 8 - eased * 20;
                ctx.fillStyle = rgb(fx.color, alpha);
                ctx.font = `bold ${Math.round(12 * (1 + eased * 0.3))}px monospace`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'bottom';
                ctx.fillText('MISS', fx.x, textY);
                ctx.restore();
            }
        }
    }
}

class FruitNinjaGame {
    constructor() {
        this.name = "Fruit Ninja";
        this.score = 0;
        this.combo = 0;
        this.maxCombo = 0;
        this.isRunning = false;
    }

    init(canvas, ctx, displayRange) {
        this.canvas = canvas;
        this.ctx = ctx;
        this.dx = [displayRange.X[0], displayRange.X[1]];
        this.dy = [displayRange.Y[0], displayRange.Y[1]];
        this.areaW = this.dx[1] - this.dx[0];
        this.areaH = this.dy[1] - this.dy[0];

        this.score = 0;
        this.combo = 0;
        this.maxCombo = 0;
        this.isRunning = true;

        this.Sc = Math.min(this.areaW, this.areaH) / 180;
        this.gravity = Math.max(0.025, this.areaH * 0.000333);
        this.spawnTimer = 60; // equals initial spawnInterval -> first fruit spawns immediately
        this.fruitsSliced = 0;
        this.fruitsDropped = 0;
        this.prevPos = [NaN, NaN];

        // Swipe tracking
        this.swipeActive = false;
        this.swipeGen = 0;
        this.swipeGenSliced = 0;

        // Pre-compute circle points (24-point)
        this.theta24 = [];
        for (let i = 0; i < 24; i++) {
            this.theta24.push((i / 23) * Math.PI * 2);
        }

        // Fruit pool (8 slots)
        this.fruitX = new Float64Array(8).fill(NaN);
        this.fruitY = new Float64Array(8).fill(NaN);
        this.fruitVx = new Float64Array(8);
        this.fruitVy = new Float64Array(8);
        this.fruitRadius = new Float64Array(8);
        this.fruitColor = new Array(8).fill(null).map(() => [...ColorWhite]);
        this.fruitSlashing = new Uint8Array(8);
        this.fruitEntryPos = new Array(8).fill(null).map(() => [NaN, NaN]);
        this.fruitSwipeGen = new Float64Array(8);
        this.fruitActive = new Uint8Array(8);

        // Half pool (16 slots)
        this.halfVerts = new Array(16).fill(null).map(() => []);
        this.halfVx = new Float64Array(16);
        this.halfVy = new Float64Array(16);
        this.halfSpin = new Float64Array(16);
        this.halfAlpha = new Float64Array(16);
        this.halfFrames = new Float64Array(16);
        this.halfColor = new Array(16).fill(null).map(() => [...ColorWhite]);
        this.halfActive = new Uint8Array(16);

        // Slash effect pool (6 slots)
        this.slashFrames = new Float64Array(6);
        this.slashAge = new Float64Array(6);
        this.slashFadeFrames = new Float64Array(6);
        this.slashIdxStart = new Float64Array(6);
        this.slashIdxEnd = new Float64Array(6);
        this.slashActive = new Uint8Array(6);

        // Multi-cut display
        this.multiCutText = '';
        this.multiCutX = 0;
        this.multiCutY = 0;
        this.multiCutFade = 0;

        // Trace buffer (shifting array, same as MATLAB)
        this.traceBufferMax = 200;
        this.traceBufferX = new Float64Array(200).fill(NaN);
        this.traceBufferY = new Float64Array(200).fill(NaN);
        this.traceBufferIdx = 0;
        this.smoothedX = [];
        this.smoothedY = [];

        // Slice history for results
        this.sliceHistory = [];

        // Hit effects
        this.hitEffects = [];

        // 8 fruit colors matching MATLAB
        this.fruitColors = [
            [...ColorRed],
            [...ColorGreen],
            [...ColorGold],
            [...ColorMagenta],
            [255, 153, 38],  // orange
            [153, 51, 204],  // purple
